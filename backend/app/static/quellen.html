<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📚 Dialectree – Quellensammlung</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }

    header {
      background: #161b22; color: #e6edf3; padding: 10px 20px;
      display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid #30363d;
    }
    header h1 { font-size: 1.05rem; margin: 0; white-space: nowrap; }
    header nav { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    header a {
      color: #58a6ff; font-size: 0.72rem; text-decoration: none;
      padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,.15);
    }
    header a:hover { background: rgba(255,255,255,.08); }
    header a.active { background: rgba(88,166,255,.18); color: #e6edf3; border-color: #58a6ff; }

    /* ── Filter bar ─────────────────────────────── */
    .filter-bar {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 10px 20px; display: flex; flex-direction: column; gap: 8px;
    }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .filter-row .label {
      font-size: 0.7rem; color: #8b949e; min-width: 56px; text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .filter-chip {
      font-size: 0.72rem; padding: 3px 10px; border-radius: 12px;
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      cursor: pointer; transition: all .12s;
    }
    .filter-chip:hover { border-color: #58a6ff; }
    .filter-chip.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .filter-chip .count { opacity: 0.6; margin-left: 4px; font-size: 0.65rem; }
    .filter-chip.topic { border-style: dashed; }

    .filter-search {
      flex: 1; min-width: 180px;
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      padding: 4px 10px; border-radius: 6px; font-size: 0.78rem;
    }
    .filter-search:focus { outline: none; border-color: #58a6ff; }

    .sort-select {
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      padding: 3px 6px; border-radius: 6px; font-size: 0.72rem;
    }

    /* ── Main layout ───────────────────────────── */
    main { padding: 16px 20px; }

    /* ── Grid (pr0gramm-style: 8 cols desktop, click expands inline) ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
    }
    @media (max-width: 1280px) { .grid { grid-template-columns: repeat(6, 1fr); } }
    @media (max-width: 900px)  { .grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 560px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
    .tile {
      position: relative; aspect-ratio: 1;
      background: #161b22; border: 1px solid #30363d;
      overflow: hidden; cursor: pointer; transition: all .1s;
    }
    .tile:hover { outline: 2px solid #58a6ff; outline-offset: -2px; z-index: 1; }
    .tile.selected { outline: 3px solid #d99922; outline-offset: -3px; z-index: 1; }
    .tile img {
      width: 100%; height: 100%; object-fit: cover; pointer-events: none;
    }
    .tile-overlay {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: linear-gradient(0deg, rgba(0,0,0,.9), rgba(0,0,0,0));
      padding: 18px 6px 4px; color: #fff; font-size: 0.62rem;
      display: flex; flex-direction: column; gap: 1px;
    }
    .tile-title { font-weight: 600; line-height: 1.15;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tile-meta { font-size: 0.55rem; opacity: 0.75; display: flex; gap: 4px; }
    .tile-kind {
      position: absolute; top: 2px; left: 2px;
      background: rgba(0,0,0,.7); color: #fff;
      font-size: 0.55rem; padding: 1px 4px; border-radius: 4px;
    }
    .tile-tags {
      position: absolute; top: 2px; right: 2px;
      display: flex; gap: 2px; flex-wrap: wrap; justify-content: flex-end;
      max-width: 70%;
    }
    .tile-tag {
      background: rgba(31,111,235,.85); color: #fff;
      font-size: 0.5rem; padding: 0 4px; border-radius: 3px; line-height: 1.4;
    }
    .tile-tag.topic { background: rgba(217,153,34,.85); }

    /* ── Inline detail row (spans full grid width) ──────────── */
    .detail-row {
      grid-column: 1 / -1;
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      padding: 12px 16px 18px;
      margin: 4px 0;
      position: relative;
      animation: detailIn .15s ease-out;
    }
    @keyframes detailIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .detail-row .detail-close {
      position: absolute; top: 6px; right: 8px;
      background: transparent; border: 1px solid #30363d; color: #c9d1d9;
      font-size: 1rem; line-height: 1; padding: 2px 8px; border-radius: 6px;
      cursor: pointer;
    }
    .detail-row .detail-close:hover { background: #161b22; border-color: #58a6ff; }
    .detail-row .detail-actions {
      position: absolute; top: 6px; right: 50px;
      display: flex; gap: 4px;
    }
    .detail-row .detail-actions button {
      background: transparent; border: 1px solid #30363d; color: #8b949e;
      padding: 2px 8px; border-radius: 6px; font-size: 0.72rem; cursor: pointer;
    }
    .detail-row .detail-actions button:hover { color: #c9d1d9; border-color: #58a6ff; }
    .detail-row .detail-actions button.danger:hover { color: #ff7b72; border-color: #ff7b72; }
    .item-del {
      background: transparent; border: none; color: #6e7681;
      cursor: pointer; font-size: 0.78rem; padding: 0 4px; margin-left: 6px;
      float: right;
    }
    .item-del:hover { color: #ff7b72; }
    .detail-row .detail-loading {
      color: #8b949e; font-style: italic; padding: 20px; text-align: center;
    }

    .empty {
      grid-column: 1 / -1; text-align: center; color: #8b949e;
      padding: 40px 20px; font-style: italic;
    }

    /* ── Detail view ───────────────────────────── */
    .detail-back {
      display: inline-block; margin-bottom: 12px;
      color: #58a6ff; text-decoration: none; font-size: 0.78rem;
      padding: 3px 10px; border-radius: 6px; border: 1px solid #30363d;
    }
    .detail-back:hover { background: #161b22; }

    /* ── Detail view (rendered inside .detail-row) ──────────── */
    .detail { max-width: 900px; margin: 0 auto; }
    .detail-media {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      overflow: hidden; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center;
      max-height: 55vh;
    }
    .detail-media img {
      max-width: 100%; max-height: 55vh; object-fit: contain; display: block;
    }

    /* Compact meta strip directly under the image (pr0gramm-style) */
    .detail-strip {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      font-size: 0.72rem; color: #8b949e; margin-bottom: 8px;
    }
    .detail-strip .kind {
      background: #161b22; border: 1px solid #30363d; color: #c9d1d9;
      padding: 2px 8px; border-radius: 10px;
    }

    /* Tags row — prominent, right under the image */
    .detail-tags { margin-bottom: 12px; }

    .detail-info h2 { font-size: 1.15rem; margin-bottom: 6px; color: #e6edf3; }
    .detail-info .description {
      font-size: 0.85rem; line-height: 1.5; color: #c9d1d9; margin-bottom: 14px;
      background: #161b22; padding: 10px 12px; border-radius: 6px;
      border-left: 3px solid #58a6ff;
    }

    .detail-section { margin-top: 18px; }
    .detail-section h3 {
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em;
      color: #8b949e; margin-bottom: 8px;
    }

    .tag-pill {
      display: inline-block; background: #1f6feb; color: #fff;
      font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
      margin-right: 4px; margin-bottom: 4px;
      cursor: pointer; text-decoration: none;
    }
    .tag-pill.topic { background: #d99922; }
    .tag-pill:hover { opacity: 0.85; }

    .source-link {
      display: inline-block; color: #58a6ff; font-size: 0.78rem;
      word-break: break-all; padding: 6px 10px;
      border: 1px solid #30363d; border-radius: 6px; text-decoration: none;
    }
    .source-link:hover { background: #161b22; }

    .usage-item, .comment-item {
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 8px 12px; margin-bottom: 6px; font-size: 0.78rem;
    }
    .usage-item .ctx { font-weight: 600; color: #e6edf3; }
    .usage-item .note { color: #8b949e; margin-top: 2px; font-size: 0.72rem; }
    .comment-item .author { font-weight: 600; color: #58a6ff; font-size: 0.72rem; }
    .comment-item .ts { color: #8b949e; font-size: 0.65rem; margin-left: 6px; }
    .comment-item .text { margin-top: 4px; }

    .empty-section { color: #6e7681; font-style: italic; font-size: 0.78rem; }

    /* ── Inline write forms (comment, usage) ──── */
    .write-form {
      display: flex; flex-direction: column; gap: 6px;
      margin-top: 8px; padding: 8px; background: #0d1117;
      border: 1px solid #30363d; border-radius: 6px;
    }
    .write-form input, .write-form textarea {
      background: #161b22; border: 1px solid #30363d; color: #c9d1d9;
      padding: 6px 8px; border-radius: 4px; font-size: 0.78rem; font-family: inherit;
    }
    .write-form input:focus, .write-form textarea:focus { outline: none; border-color: #58a6ff; }
    .write-form textarea { resize: vertical; min-height: 50px; }
    .write-form .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .write-form .row input { flex: 1; min-width: 120px; }
    .btn-primary {
      background: #1f6feb; color: #fff; border: 1px solid #1f6feb;
      padding: 4px 14px; border-radius: 4px; cursor: pointer; font-size: 0.78rem;
      align-self: flex-start;
    }
    .btn-primary:hover { background: #388bfd; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .toggle-form {
      background: transparent; border: 1px dashed #30363d; color: #8b949e;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.72rem;
      margin-top: 6px;
    }
    .toggle-form:hover { color: #58a6ff; border-color: #58a6ff; }

    /* ── "Neue Quelle" button + modal ─────────── */
    .new-source-btn {
      background: #1f6feb; color: #fff; border: none;
      padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78rem;
      font-weight: 600;
    }
    .new-source-btn:hover { background: #388bfd; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 20px; max-width: 520px; width: 100%;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { font-size: 1rem; margin-bottom: 12px; color: #e6edf3; }
    .modal label {
      display: block; font-size: 0.72rem; color: #8b949e;
      margin-top: 10px; margin-bottom: 3px;
    }
    .modal input, .modal textarea, .modal select {
      width: 100%;
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      padding: 6px 8px; border-radius: 4px; font-size: 0.85rem; font-family: inherit;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: #58a6ff; }
    .modal textarea { resize: vertical; min-height: 70px; }
    .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;
    }
    .modal-actions button {
      padding: 6px 14px; border-radius: 6px; font-size: 0.82rem; cursor: pointer; border: 1px solid #30363d;
      background: transparent; color: #c9d1d9;
    }
    .modal-actions .submit { background: #1f6feb; border-color: #1f6feb; color: #fff; font-weight: 600; }
    .modal-actions .submit:hover { background: #388bfd; }
    .modal-actions button:hover:not(.submit) { background: #21262d; }
    .modal .hint { font-size: 0.7rem; color: #6e7681; margin-top: 3px; }
    .modal .error {
      background: #3a1c1c; border: 1px solid #6e2828; color: #ffb4b4;
      padding: 6px 10px; border-radius: 4px; font-size: 0.78rem; margin-top: 10px;
    }

    .deferred-note {
      margin-top: 24px; padding: 10px 12px; background: #1c2128;
      border: 1px dashed #30363d; border-radius: 6px;
      color: #8b949e; font-size: 0.72rem;
    }
  </style>
</head>
<body>
<!-- DESIGN: pr0gramm-style source collection.
     Landing = grid of thumbnails. Click → detail view (#id=<n>).
     Filter chips toggle tags (AND-combined); search box filters title+description.
     Topic tags use TOPIC:<SLUG> namespace and render dashed/orange. -->
<header>
  <h1>📚 Quellensammlung</h1>
  <nav>
    <a href="/">⚡ Zickzack</a>
    <a href="/baum">🌳 Baum</a>
    <a href="/entscheidung">⚖️ Waage</a>
    <a href="/dialog">💬 Dialog</a>
    <a href="/konflikt">🔍 Konflikt</a>
    <a href="/quellen" class="active">📚 Quellen</a>
  </nav>
</header>

<div class="filter-bar" id="filter-bar">
  <div class="filter-row">
    <span class="label">Typen</span>
    <div id="kind-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>
  <div class="filter-row">
    <span class="label">Tags</span>
    <div id="tag-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>
  <div class="filter-row">
    <span class="label">Topics</span>
    <div id="topic-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>
  <div class="filter-row">
    <span class="label">Suche</span>
    <input id="q" type="search" class="filter-search" placeholder="Titel oder Beschreibung…" />
    <select id="sort" class="sort-select">
      <option value="neu">Neu zuerst</option>
      <option value="alt">Alt zuerst</option>
      <option value="titel">Alphabetisch</option>
    </select>
    <button class="new-source-btn" id="open-new-source">＋ Neue Quelle</button>
  </div>
</div>

<main id="main">
  <div class="grid" id="grid"></div>
</main>

<!-- DESIGN: New-source modal. Multipart form so the optional thumbnail file
     can be uploaded in the same request. If no thumbnail is provided the
     backend generates a placeholder SVG. -->
<div class="modal-overlay" id="new-source-modal" style="display:none">
  <div class="modal">
    <h2>＋ Neue Quelle hinzufügen</h2>
    <form id="new-source-form">
      <label for="ns-title">Titel *</label>
      <input id="ns-title" name="title" required />

      <label for="ns-kind">Typ *</label>
      <select id="ns-kind" name="kind" required>
        <option value="QUOTE">💬 Zitat</option>
        <option value="VIDEO">🎬 Video</option>
        <option value="AUDIO">🎧 Audio</option>
        <option value="PAPER">📄 Paper</option>
        <option value="TWEET">𝕏 Tweet</option>
        <option value="IMAGE">🖼️ Bild</option>
        <option value="TEXT">📝 Text</option>
      </select>

      <label for="ns-url">URL (optional)</label>
      <input id="ns-url" name="url" type="url" placeholder="https://…" />

      <label for="ns-tags">Tags (komma-getrennt)</label>
      <input id="ns-tags" name="tags" placeholder="QUELLE, GEGENSEITE, TOPIC:QUOTEN" />
      <div class="hint">Topics als <code>TOPIC:&lt;SLUG&gt;</code> kennzeichnen.</div>

      <label for="ns-description">Beschreibung</label>
      <textarea id="ns-description" name="description" rows="3"></textarea>

      <label for="ns-thumbnail">Thumbnail (Bild)</label>
      <input id="ns-thumbnail" name="thumbnail" type="file" accept="image/*,.svg" />
      <div class="hint">Optional. Ohne Datei wird ein einfacher Platzhalter erzeugt.</div>

      <div id="ns-error"></div>
      <div class="modal-actions">
        <button type="button" id="ns-cancel">Abbrechen</button>
        <button type="submit" class="submit">Speichern</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API = '/api';

  // ── State (mirrored in URL hash) ──────────────
  // Format: #q=…&kind=…&tag=A,B&id=<n>
  const state = { q: '', kind: '', tags: [], sort: 'neu', id: null };
  let allTags = [];
  const KIND_LABELS = {
    QUOTE: '💬 Zitat', VIDEO: '🎬 Video', AUDIO: '🎧 Audio',
    PAPER: '📄 Paper', TWEET: '𝕏 Tweet', IMAGE: '🖼️ Bild', TEXT: '📝 Text',
  };

  function isTopicTag(t) { return t.startsWith('TOPIC:'); }
  function tagDisplay(t) { return isTopicTag(t) ? t.slice(6) : t; }

  // ── Hash sync ─────────────────────────────────
  let _suppressHash = false;
  function parseHash() {
    const h = (location.hash || '').replace(/^#/, '');
    const out = {};
    h.split('&').filter(Boolean).forEach(p => {
      const [k, v] = p.split('=');
      if (k) out[decodeURIComponent(k)] = decodeURIComponent(v ?? '');
    });
    return out;
  }
  function writeHash() {
    const parts = [];
    if (state.id != null) parts.push(`id=${state.id}`);
    if (state.q) parts.push(`q=${encodeURIComponent(state.q)}`);
    if (state.kind) parts.push(`kind=${state.kind}`);
    if (state.tags.length) parts.push(`tag=${state.tags.map(encodeURIComponent).join(',')}`);
    if (state.sort && state.sort !== 'neu') parts.push(`sort=${state.sort}`);
    const newHash = parts.length ? '#' + parts.join('&') : '';
    if ((location.hash || '') !== newHash) {
      _suppressHash = true;
      history.replaceState(null, '', newHash || location.pathname);
      setTimeout(() => { _suppressHash = false; }, 0);
    }
  }
  function loadHash() {
    const h = parseHash();
    state.q = h.q || '';
    state.kind = h.kind || '';
    state.tags = h.tag ? h.tag.split(',').filter(Boolean) : [];
    state.sort = h.sort || 'neu';
    state.id = h.id ? parseInt(h.id) : null;
  }

  // ── API ────────────────────────────────────────
  async function fetchJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  }

  async function loadTags() {
    allTags = await fetchJSON(`${API}/sources/tags`);
    renderFilterBar();
  }

  async function loadList() {
    const params = new URLSearchParams();
    if (state.q) params.set('q', state.q);
    if (state.kind) params.set('kind', state.kind);
    state.tags.forEach(t => params.append('tag', t));
    if (state.sort) params.set('sort', state.sort);
    const url = `${API}/sources/?${params}`;
    const items = await fetchJSON(url);
    renderGrid(items);
    if (state.id != null) await expandInline(state.id);
  }

  async function loadDetail(id) {
    return fetchJSON(`${API}/sources/${id}`);
  }

  // ── Render: filter bar ─────────────────────────
  function renderFilterBar() {
    const kindChips = document.getElementById('kind-chips');
    const kinds = Object.keys(KIND_LABELS);
    kindChips.innerHTML = `
      <button class="filter-chip ${state.kind === '' ? 'active' : ''}" data-kind="">Alle</button>
      ${kinds.map(k => `<button class="filter-chip ${state.kind === k ? 'active' : ''}" data-kind="${k}">${KIND_LABELS[k]}</button>`).join('')}
    `;
    kindChips.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        state.kind = b.dataset.kind;
        writeHash(); renderFilterBar(); loadList();
      });
    });

    const tagChips = document.getElementById('tag-chips');
    const topicChips = document.getElementById('topic-chips');
    tagChips.innerHTML = '';
    topicChips.innerHTML = '';
    if (!allTags.length) {
      tagChips.innerHTML = '<span style="font-size:0.7rem;color:#6e7681">—</span>';
    }
    allTags.forEach(({ tag, count }) => {
      const isTopic = isTopicTag(tag);
      const active = state.tags.includes(tag);
      const btn = document.createElement('button');
      btn.className = `filter-chip ${isTopic ? 'topic' : ''} ${active ? 'active' : ''}`;
      btn.innerHTML = `${escapeHtml(tagDisplay(tag))}<span class="count">${count}</span>`;
      btn.addEventListener('click', () => {
        if (active) state.tags = state.tags.filter(t => t !== tag);
        else state.tags = [...state.tags, tag];
        writeHash(); renderFilterBar(); loadList();
      });
      (isTopic ? topicChips : tagChips).appendChild(btn);
    });

    document.getElementById('q').value = state.q;
    document.getElementById('sort').value = state.sort;
  }

  document.getElementById('q').addEventListener('input', (e) => {
    state.q = e.target.value;
    writeHash();
    clearTimeout(window._qTimer);
    window._qTimer = setTimeout(loadList, 200);
  });
  document.getElementById('sort').addEventListener('change', (e) => {
    state.sort = e.target.value;
    writeHash(); loadList();
  });

  // ── Render: grid ───────────────────────────────
  function renderGrid(items) {
    document.getElementById('filter-bar').style.display = '';
    const main = document.getElementById('main');
    if (!items.length) {
      main.innerHTML = '<div class="grid"><div class="empty">Keine Quellen gefunden.</div></div>';
      return;
    }
    main.innerHTML = `<div class="grid" id="grid">${items.map(tileHtml).join('')}</div>`;
    main.querySelectorAll('.tile').forEach(t => {
      t.addEventListener('click', async () => {
        const id = parseInt(t.dataset.id);
        if (state.id === id) {
          // Click on already-open tile collapses it.
          state.id = null;
          writeHash();
          collapseInline();
        } else {
          state.id = id;
          writeHash();
          await expandInline(id);
        }
      });
    });
  }

  // ── Inline detail expansion (pr0gramm-style) ──
  // Inserts a .detail-row element after the last tile of the row that contains
  // the selected tile. The row's offsetTop is used to find row siblings —
  // works regardless of column count (responsive breakpoints).
  async function expandInline(id) {
    collapseInline();
    const grid = document.getElementById('grid');
    if (!grid) return;
    const tile = grid.querySelector(`.tile[data-id="${id}"]`);
    if (!tile) return;
    tile.classList.add('selected');

    // Find last tile in the same visual row.
    const rowTop = tile.offsetTop;
    const tiles = Array.from(grid.querySelectorAll('.tile'));
    let lastInRow = tile;
    for (const t of tiles) {
      if (t.offsetTop === rowTop) lastInRow = t;
      else if (t.offsetTop > rowTop) break;
    }

    const detailRow = document.createElement('div');
    detailRow.className = 'detail-row';
    detailRow.id = 'detail-row';
    detailRow.innerHTML = '<div class="detail-loading">⏳ Lade…</div>';
    lastInRow.after(detailRow);
    detailRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    try {
      const src = await loadDetail(id);
      detailRow.innerHTML = detailInnerHtml(src);
      wireDetailEvents(detailRow);
    } catch (e) {
      detailRow.innerHTML = `<div class="detail-loading">❌ ${escapeHtml(e.message)}</div>`;
    }
  }

  function collapseInline() {
    document.querySelectorAll('.tile.selected').forEach(t => t.classList.remove('selected'));
    const old = document.getElementById('detail-row');
    if (old) old.remove();
  }

  // Reposition detail-row on resize (row may shift when column count changes).
  let _resizeTimer;
  window.addEventListener('resize', () => {
    if (state.id == null) return;
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => expandInline(state.id), 150);
  });

  function tileHtml(s) {
    const kind = KIND_LABELS[s.kind] || s.kind || '';
    const tags = (s.tags || []).slice(0, 3).map(t =>
      `<span class="tile-tag ${isTopicTag(t) ? 'topic' : ''}">${escapeHtml(tagDisplay(t))}</span>`
    ).join('');
    const counts = [];
    if (s.comment_count) counts.push(`💬 ${s.comment_count}`);
    if (s.usage_count) counts.push(`🔗 ${s.usage_count}`);
    return `
      <div class="tile" data-id="${s.id}">
        ${s.thumbnail ? `<img src="${escapeAttr(s.thumbnail)}" alt="" loading="lazy" />` : ''}
        <span class="tile-kind">${escapeHtml(kind)}</span>
        <div class="tile-tags">${tags}</div>
        <div class="tile-overlay">
          <div class="tile-title">${escapeHtml(s.title)}</div>
          <div class="tile-meta">${counts.join(' · ')}</div>
        </div>
      </div>`;
  }

  // ── Render: detail (HTML for inline expansion) ──
  function detailInnerHtml(s) {
    const tagsHtml = (s.tags || []).map(t => {
      const cls = isTopicTag(t) ? 'tag-pill topic' : 'tag-pill';
      return `<a class="${cls}" data-tag="${escapeAttr(t)}" href="#">${escapeHtml(tagDisplay(t))}</a>`;
    }).join('');
    const usagesHtml = (s.usages || []).length
      ? s.usages.map((u, i) => `
          <div class="usage-item">
            <button class="item-del" data-del-usage="${i}" title="Löschen">✕</button>
            <div class="ctx">${escapeHtml(u.context || 'Verwendung')}</div>
            ${u.argument_id ? `<div class="note">Argument #${u.argument_id}</div>` : ''}
            ${u.note ? `<div class="note">${escapeHtml(u.note)}</div>` : ''}
          </div>`).join('')
      : '<div class="empty-section">Noch keine Verwendungsnachweise.</div>';
    const commentsHtml = (s.comments || []).length
      ? s.comments.map((c, i) => `
          <div class="comment-item">
            <button class="item-del" data-del-comment="${i}" title="Löschen">✕</button>
            <span class="author">${escapeHtml(c.user || 'anonym')}</span>
            <span class="ts">${escapeHtml(c.created_at || '')}</span>
            <div class="text">${escapeHtml(c.text)}</div>
          </div>`).join('')
      : '<div class="empty-section">Noch keine Kommentare.</div>';

    return `
      <button class="detail-close" id="detail-close" title="Schließen">✕</button>
      <div class="detail-actions">
        <button data-edit-id="${s.id}" title="Bearbeiten">✏️ Bearbeiten</button>
        <button class="danger" data-delete-id="${s.id}" title="Löschen">🗑️ Löschen</button>
      </div>
      <div class="detail">
        <div class="detail-media">
          ${s.thumbnail ? `<img src="${escapeAttr(s.thumbnail)}" alt="${escapeAttr(s.title)}"/>` : ''}
        </div>
        <div class="detail-strip">
          <span class="kind">${escapeHtml(KIND_LABELS[s.kind] || s.kind || '')}</span>
          ${s.created_at ? `<span>📅 ${escapeHtml(s.created_at)}</span>` : ''}
          ${(s.comments || []).length ? `<span>💬 ${s.comments.length}</span>` : ''}
          ${(s.usages || []).length ? `<span>🔗 ${s.usages.length}</span>` : ''}
        </div>
        ${tagsHtml ? `<div class="detail-tags">${tagsHtml}</div>` : ''}
        <div class="detail-info">
          <h2>${escapeHtml(s.title)}</h2>
          ${s.description ? `<div class="description">${escapeHtml(s.description)}</div>` : ''}
          ${s.url ? `<div class="detail-section"><h3>Quelle</h3><a class="source-link" href="${escapeAttr(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.url)}</a></div>` : ''}
          <div class="detail-section">
            <h3>Verwendung in Diskussionen</h3>
            ${usagesHtml}
            <button class="toggle-form" data-toggle="usage-form-${s.id}">＋ Verwendung hinzufügen</button>
            <form class="write-form" id="usage-form-${s.id}" data-source-id="${s.id}" style="display:none">
              <input type="text" name="context" placeholder="Kontext (z.B. „Quotendiskussion")" required />
              <div class="row">
                <input type="number" name="argument_id" placeholder="Argument-ID (optional)" min="1" />
                <input type="text" name="note" placeholder="Notiz (optional)" />
              </div>
              <button type="submit" class="btn-primary">Speichern</button>
            </form>
          </div>
          <div class="detail-section">
            <h3>Kommentare</h3>
            ${commentsHtml}
            <form class="write-form" data-source-id="${s.id}" id="comment-form-${s.id}">
              <textarea name="text" placeholder="Kommentar schreiben…" required></textarea>
              <div class="row">
                <input type="text" name="user" placeholder="Name (optional)" />
                <button type="submit" class="btn-primary">Abschicken</button>
              </div>
            </form>
          </div>
        </div>
      </div>`;
  }

  function wireDetailEvents(root) {
    const sid = state.id;
    const close = root.querySelector('#detail-close');
    if (close) close.addEventListener('click', () => {
      state.id = null;
      writeHash();
      collapseInline();
    });
    // Edit / Delete source actions
    const editBtn = root.querySelector('[data-edit-id]');
    if (editBtn) editBtn.addEventListener('click', () => openEditModal(sid));
    const delBtn = root.querySelector('[data-delete-id]');
    if (delBtn) delBtn.addEventListener('click', async () => {
      if (!confirm('Quelle wirklich löschen?')) return;
      const r = await fetch(`${API}/sources/${sid}`, { method: 'DELETE' });
      if (!r.ok) { alert('Fehler: ' + await r.text()); return; }
      state.id = null;
      writeHash();
      collapseInline();
      await loadTags();
      await loadList();
    });
    // Per-item delete (comments / usages)
    root.querySelectorAll('[data-del-comment]').forEach(b => {
      b.addEventListener('click', async () => {
        if (!confirm('Kommentar löschen?')) return;
        const r = await fetch(`${API}/sources/${sid}/comments/${b.dataset.delComment}`, { method: 'DELETE' });
        if (!r.ok) { alert('Fehler: ' + await r.text()); return; }
        await expandInline(sid);
      });
    });
    root.querySelectorAll('[data-del-usage]').forEach(b => {
      b.addEventListener('click', async () => {
        if (!confirm('Verwendung löschen?')) return;
        const r = await fetch(`${API}/sources/${sid}/usages/${b.dataset.delUsage}`, { method: 'DELETE' });
        if (!r.ok) { alert('Fehler: ' + await r.text()); return; }
        await expandInline(sid);
      });
    });
    // Tag pills → filter (collapses detail, applies tag).
    root.querySelectorAll('.tag-pill[data-tag]').forEach(p => {
      p.addEventListener('click', (e) => {
        e.preventDefault();
        const t = p.dataset.tag;
        state.id = null;
        if (!state.tags.includes(t)) state.tags.push(t);
        writeHash();
        render();
      });
    });
    // Toggleable forms (Usage)
    root.querySelectorAll('.toggle-form[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const f = root.querySelector(`#${btn.dataset.toggle}`);
        if (f) f.style.display = f.style.display === 'none' ? 'flex' : 'none';
      });
    });
    // Comment / usage submit
    root.querySelectorAll('form.write-form').forEach(f => {
      f.addEventListener('submit', async (e) => {
        e.preventDefault();
        const sourceId = parseInt(f.dataset.sourceId);
        const fd = new FormData(f);
        const isComment = f.id.startsWith('comment-form-');
        const url = isComment
          ? `${API}/sources/${sourceId}/comments`
          : `${API}/sources/${sourceId}/usages`;
        const body = {};
        for (const [k, v] of fd.entries()) {
          if (v === '') continue;
          body[k] = k === 'argument_id' ? parseInt(v) : v;
        }
        const btn = f.querySelector('button[type="submit"]');
        btn.disabled = true;
        try {
          const r = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) throw new Error(await r.text());
          await expandInline(sourceId);
        } catch (err) {
          alert('Fehler: ' + err.message);
        } finally {
          btn.disabled = false;
        }
      });
    });
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function escapeAttr(s) {
    return escapeHtml(s).replace(/"/g, '&quot;');
  }

  // ── "Neue Quelle" / Edit modal ────────────────
  // Same modal serves both modes. editingId == null → create, else PATCH.
  const modal = document.getElementById('new-source-modal');
  const nsForm = document.getElementById('new-source-form');
  const nsError = document.getElementById('ns-error');
  const nsTitle = modal.querySelector('h2');
  let editingId = null;

  function openCreateModal() {
    editingId = null;
    nsTitle.textContent = '＋ Neue Quelle hinzufügen';
    nsError.innerHTML = '';
    nsForm.reset();
    // Re-show thumbnail field for create mode (hidden in edit mode).
    nsForm.querySelector('[name="thumbnail"]').closest('label, div')?.classList.remove('hidden');
    nsForm.querySelector('#ns-thumbnail').style.display = '';
    modal.style.display = 'flex';
  }

  async function openEditModal(id) {
    editingId = id;
    nsTitle.textContent = '✏️ Quelle bearbeiten';
    nsError.innerHTML = '';
    // Pre-fill from API.
    try {
      const s = await fetchJSON(`${API}/sources/${id}`);
      nsForm.elements.title.value = s.title || '';
      nsForm.elements.kind.value = s.kind || 'TEXT';
      nsForm.elements.url.value = s.url || '';
      nsForm.elements.tags.value = (s.tags || []).join(', ');
      nsForm.elements.description.value = s.description || '';
      nsForm.elements.thumbnail.value = '';
      // Thumbnail field hidden in edit mode (separate replace flow tbd).
      nsForm.querySelector('#ns-thumbnail').style.display = 'none';
    } catch (e) {
      nsError.innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
    }
    modal.style.display = 'flex';
  }

  document.getElementById('open-new-source').addEventListener('click', openCreateModal);
  document.getElementById('ns-cancel').addEventListener('click', () => {
    modal.style.display = 'none';
  });
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.style.display = 'none';
  });
  nsForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    nsError.innerHTML = '';
    const submit = nsForm.querySelector('button[type="submit"]');
    submit.disabled = true;
    try {
      let r;
      if (editingId != null) {
        // PATCH (JSON): partial update.
        const body = {
          title: nsForm.elements.title.value,
          kind: nsForm.elements.kind.value,
          url: nsForm.elements.url.value || null,
          description: nsForm.elements.description.value || null,
          tags: nsForm.elements.tags.value
            .split(',').map(s => s.trim()).filter(Boolean),
        };
        r = await fetch(`${API}/sources/${editingId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
      } else {
        // POST (multipart): create with optional thumbnail upload.
        const fd = new FormData(nsForm);
        const thumb = fd.get('thumbnail');
        if (thumb && (!thumb.name || thumb.size === 0)) fd.delete('thumbnail');
        r = await fetch(`${API}/sources/`, { method: 'POST', body: fd });
      }
      if (!r.ok) {
        const t = await r.text();
        throw new Error(t || `${r.status} ${r.statusText}`);
      }
      const saved = await r.json();
      modal.style.display = 'none';
      state.id = saved.id;
      if (editingId == null) {
        // Reset filters so the new source is visible.
        state.q = ''; state.kind = ''; state.tags = []; state.sort = 'neu';
      }
      editingId = null;
      writeHash();
      await loadTags();
      await render();
    } catch (err) {
      nsError.innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
    } finally {
      submit.disabled = false;
    }
  });

  // ── Router ─────────────────────────────────────
  // Grid is always rendered; inline detail is added on top of it.
  async function render() {
    renderFilterBar();
    await loadList();
  }

  window.addEventListener('hashchange', () => {
    if (_suppressHash) return;
    loadHash(); render();
  });

  // ── Init ───────────────────────────────────────
  (async () => {
    loadHash();
    await loadTags();
    await render();
  })();
</script>
</body>
</html>
