  // ── Relayout for chrono mode ───────────────────

  function relayout() {
    if (!renderState || renderState.mode !== 'chrono') return;
    const { items, CX, topicBottom, CARD_W, V_PAD } = renderState;
    const canvas = document.getElementById('canvas');
    const svg = document.getElementById('zz-svg');
    const W = Math.max(canvas.clientWidth, 700);

    let currentY = topicBottom + V_PAD;

    items.forEach((item) => {
      const visibleH = item.el.getBoundingClientRect().height;
      item.el.style.top = currentY + 'px';
      item.y = currentY;
      item.topY = currentY;
      item.botY = currentY + visibleH;

      let blockHeight = visibleH;

      let sibCurY = currentY + visibleH + 24;
      item.siblings.forEach((sibItem) => {
        const sibH = sibItem.el.getBoundingClientRect().height;
        sibItem.el.style.top = sibCurY + 'px';
        sibItem.y = sibCurY;
        sibItem.topY = sibCurY;
        sibItem.botY = sibCurY + sibH;
        sibItem.height = sibH;
        sibCurY += sibH + 4;
      });

      if (item.siblings.length > 0) {
        blockHeight = sibCurY - 4 - currentY;
      }
      currentY += blockHeight + V_PAD;
    });

    const finalH = currentY + 80;
    canvas.style.minHeight = finalH + 'px';
    svg.setAttribute('height', finalH);
    svg.setAttribute('viewBox', `0 0 ${W} ${finalH}`);

    // Update SVG connections after repositioning
    updateDragLines();
  }

  // ── Polygon selection mode ──────────────────────
  function startPolygonSelection() {
    isSelectingPolygon = true;
    pendingPolygonSelection.clear();
    document.querySelectorAll('.zz-card').forEach(c => c.classList.add('polygon-selectable'));
    const toolbar = document.getElementById('polygon-select-toolbar');
    toolbar.classList.add('visible');
    updateSelectionToolbar();
    renderLegendPanel();
  }

  function toggleCardSelection(cardEl) {
    const stepId = parseInt(cardEl.dataset.stepId);
    if (!stepId) return;
    if (pendingPolygonSelection.has(stepId)) {
      pendingPolygonSelection.delete(stepId);
      cardEl.classList.remove('polygon-selected');
    } else {
      pendingPolygonSelection.add(stepId);
      cardEl.classList.add('polygon-selected');
    }
    updateSelectionToolbar();
  }

  function updateSelectionToolbar() {
    const count = pendingPolygonSelection.size;
    const countEl = document.getElementById('polygon-select-count');
    const createBtn = document.getElementById('polygon-btn-create');
    if (countEl) countEl.innerHTML = ` <strong>${count}</strong> Argument${count !== 1 ? 'e' : ''}`;
    if (createBtn) createBtn.disabled = count < 2;
  }

  function createCustomPolygonGroup() {
    if (pendingPolygonSelection.size < 2) return;
    const nameInput = document.getElementById('polygon-group-name');
    const name = nameInput?.value?.trim() || `Bereich ${nextCustomGroupId}`;
    const colorIdx = (activePolygonGroups.length) % POLYGON_COLORS.length;
    customPolygonGroups.push({
      key: `custom_${nextCustomGroupId}`,
      name,
      nodeIds: [...pendingPolygonSelection],
      color: POLYGON_COLORS[colorIdx],
    });
    nextCustomGroupId++;
    exitPolygonSelection();
    render();
  }

  function cancelPolygonSelection() {
    exitPolygonSelection();
  }

  function exitPolygonSelection() {
    isSelectingPolygon = false;
    pendingPolygonSelection.clear();
    document.querySelectorAll('.zz-card.polygon-selected').forEach(c => c.classList.remove('polygon-selected'));
    document.querySelectorAll('.zz-card.polygon-selectable').forEach(c => c.classList.remove('polygon-selectable'));
    const toolbar = document.getElementById('polygon-select-toolbar');
    if (toolbar) toolbar.classList.remove('visible');
    const nameInput = document.getElementById('polygon-group-name');
    if (nameInput) nameInput.value = '';
    renderLegendPanel();
  }

  // Wire up toolbar buttons
  document.getElementById('polygon-btn-create')?.addEventListener('click', createCustomPolygonGroup);
  document.getElementById('polygon-btn-cancel')?.addEventListener('click', cancelPolygonSelection);

  // ── Drag system with live SVG line updates ──
  let dragInfo = null;

  function findItemByCard(card) {
    if (!renderState || renderState.mode !== 'chrono') return null;
    for (const item of renderState.items) {
      if (item.el === card) return { item, type: 'primary' };
      for (const sib of item.siblings) {
        if (sib.el === card) return { item, sibItem: sib, type: 'sibling' };
      }
    }
    return null;
  }

  function updateDragLines() {
    if (!renderState || renderState.mode !== 'chrono') return;
    const { items, CX, topicBottom, CARD_W, extraLines } = renderState;

    // Recalculate positions for ALL items (primary + siblings)
    items.forEach((item) => {
      const curLeft = parseFloat(item.el.style.left);
      const curTop = parseFloat(item.el.style.top);
      const curH = item.el.getBoundingClientRect().height;
      item.x = curLeft;
      item.y = curTop;
      item.topY = curTop;
      item.botY = curTop + curH;
      item.height = curH;
      item.edgeX = item.side === 'L' ? curLeft + CARD_W : curLeft;

      item.siblings.forEach((sibItem) => {
        const sibLeft = parseFloat(sibItem.el.style.left);
        const sibTop = parseFloat(sibItem.el.style.top);
        const sibH = sibItem.el.getBoundingClientRect().height;
        sibItem.x = sibLeft;
        sibItem.y = sibTop;
        sibItem.topY = sibTop;
        sibItem.botY = sibTop + sibH;
        sibItem.height = sibH;
        sibItem.edgeX = sibItem.side === 'L' ? sibLeft + CARD_W : sibLeft;
      });
    });

    // Update main lines (primary → srcItem or Topic)
    items.forEach((item) => {
      const srcItem = item.srcItem;
      const fromX = srcItem ? srcItem.edgeX : CX;
      const fromY = srcItem ? (srcItem.botY - 4) : topicBottom;
      const toX = item.edgeX;
      const toY = item.topY + 8;

      if (item.mainLine) {
        item.mainLine.setAttribute('x1', fromX);
        item.mainLine.setAttribute('y1', fromY);
        item.mainLine.setAttribute('x2', toX);
        item.mainLine.setAttribute('y2', toY);
      }

      if (item.markerEl) {
        item.markerEl.style.left = ((fromX + toX) / 2) + 'px';
        item.markerEl.style.top = ((fromY + toY) / 2) + 'px';
      }

      // Update sibling lines — dock at card bottom (Ursprungs-Argument connections)
      if (item.siblings.length > 0) {
        const dockX = item.edgeX;
        const dockY = (currentStage === 2) ? item.botY + 2 : item.botY;

        item.siblings.forEach((sibItem) => {
          if (sibItem.line) {
            const sibToX = sibItem.edgeX;
            const sibToY = sibItem.topY + 8;
            const cx1 = dockX, cy1 = (dockY + sibToY) / 2;
            const cx2 = sibToX, cy2 = (dockY + sibToY) / 2;
            sibItem.line.setAttribute('d', `M${dockX},${dockY} C${cx1},${cy1} ${cx2},${cy2} ${sibToX},${sibToY}`);
          }
        });
      }
    });

    // Update semantic extra lines (stage 2/3)
    if (extraLines && extraLines.length > 0) {
      extraLines.forEach(conn => {
        const src = conn.srcItem;
        const tgt = conn.tgtItem;
        if (!tgt) return;

        if (conn.type === 'chrono') {
          setCurvedFlowPath(
            conn.el,
            getCenterAnchor(src, CARD_W, CX, topicBottom),
            getCenterAnchor(tgt, CARD_W, CX, topicBottom),
          );
        } else if (conn.type === 'split' || conn.type === 'logical') {
          setStraightLine(
            conn.el,
            getLogicalSourceAnchor(src, CX, topicBottom),
            getLogicalTargetAnchor(tgt),
          );
        }
      });
    }

    // Update polygon overlays during drag
    const { polygonState, allItemById: aidMap } = renderState;
    if (polygonState && polygonState.length > 0 && aidMap) {
      polygonState.forEach(pg => {
        const gItems = pg.nodeIds.map(id => aidMap[id]).filter(Boolean);
        if (gItems.length < 2) return;
        const hull = computePaddedHull(gItems, CARD_W, 18);
        if (hull.length < 3) return;
        pg.el.setAttribute('d', smoothHullPath(hull));
      });
    }
  }

  if (DRAG_ENABLED) {
    document.getElementById('canvas').addEventListener('mousedown', (e) => {
      const card = e.target.closest('.zz-card');
      if (!card || e.target.closest('.collapse-toggle') || e.target.closest('button') || e.target.closest('.inline-form')) return;

      // Polygon selection mode: toggle card instead of drag
      if (isSelectingPolygon) {
        e.preventDefault();
        toggleCardSelection(card);
        return;
      }

      dragInfo = {
        card,
        startX: e.clientX, startY: e.clientY,
        origX: parseFloat(card.style.left), origY: parseFloat(card.style.top),
        moved: false,
      };
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragInfo) return;
      const dx = e.clientX - dragInfo.startX;
      const dy = e.clientY - dragInfo.startY;
      if (!dragInfo.moved && Math.abs(dx) < 3 && Math.abs(dy) < 3) return;
      if (!dragInfo.moved) { dragInfo.moved = true; dragInfo.card.classList.add('dragging'); }
      dragInfo.card.style.left = (dragInfo.origX + dx) + 'px';
      dragInfo.card.style.top = (dragInfo.origY + dy) + 'px';
      updateDragLines();
    });

    document.addEventListener('mouseup', () => {
      if (dragInfo) {
        dragInfo.card.classList.remove('dragging');
        updateDragLines();
        dragInfo = null;
      }
    });
  }

  // ── Init ───────────────────────────────────────
  (async () => {
    updateStageDescription();
    renderLegendPanel();
    await loadUsers();
    await loadTopics();
  })();

  window.addEventListener('resize', () => render());
</script>
</body>
</html>
