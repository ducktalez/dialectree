  // ══════════════════════════════════════════════════════════════
  //  CHRONOLOGICAL VIEW (zigzag layout, API-backed)
  // ══════════════════════════════════════════════════════════════

  function createCardEl(step, isSibling) {
    const side = step.position === 'PRO' ? 'L' : (step.position === 'CONTRA' ? 'R' : 'L');
    const card = document.createElement('div');
    card.className = `zz-card ${side}`;
    card.dataset.stepId = step.id;
    if (isSibling) card.classList.add('sibling-card');
    if (step.is_edge_attack && currentStage >= 4) card.classList.add('edge-attack');
    // Stage 1: all cards raw. Stage 2 (Split-Prozess): stage_added=1 cards stay raw.
    if (currentStage === 1 || (currentStage === 2 && step.stage_added === 1)) card.classList.add('stage-raw');

    const isStage2Raw = currentStage === 2 && step.stage_added === 1;
    const isStage2Split = currentStage === 2 && step.stage_added === 2;
    const shouldHaveToggle = currentStage >= 3;
    // Z.2b / Z.4 polish: a split-origin revealed by the user (Stages 3 + 4)
    // should start expanded — they explicitly asked to see its content.
    const isRevealedOrigin = currentStage >= 3 && revealedSplitOrigins.has(step.id);
    const shouldStartCollapsed = (currentStage >= 3 && !isRevealedOrigin && currentStage <= 3)
      || (isSibling && currentStage >= 4);

    // Stage 1: single merged text block — no title/body distinction, no interactive features.
    // Stage 2: Split-Prozess — originals in raw style + splits with badge (working step).
    // Stage 3: Verfeinerung — only splits visible (originals filtered out before card creation).
    // Stage 4+: full features (TODO: post-dev).
    let html = '';

    if (currentStage === 1) {
      // Raw style: merge title and description into one continuous text
      const fullText = step.description
        ? `${step.title} — ${step.description}`
        : step.title;
      html += `<div class="card-text">${esc(fullText)}</div>`;
    } else if (isStage2Raw) {
      // Stage 2 originals stay visually raw and open by default, like a direct
      // carry-over from the basis step.
      const fullText = step.description
        ? `${step.title} — ${step.description}`
        : step.title;
      html += `<div class="card-text">${esc(fullText)}</div>`;
      // Z.2c — "Aufteilen" only if this original has not been split yet.
      // (Splitting an already-split base would create ambiguous origin chains.)
      const alreadySplit = currentData && currentData.steps
        && currentData.steps.some(s => s.split_from_id === step.id);
      if (!alreadySplit) {
        html += `<button class="split-create" data-base-id="${step.id}" title="In Teilargumente aufteilen" style="display:inline-block;margin-top:6px;padding:2px 8px;border-radius:6px;font-size:0.55rem;font-weight:600;background:#1f2937;color:#3fb950;border:1px solid #374151;cursor:pointer">✂ Aufteilen</button>`;
      }
    } else {
      // Stage 2 split cards are title-only. Stage 3+ shows title + body.
      html += `<div class="card-header">`;
      html += `<div class="card-title">${esc(step.title)}</div>`;
      html += `</div>`;
      // Collapse-divider sits BETWEEN header and content; clicking it folds
      // the content up. When the card is collapsed, .collapse-divider is
      // hidden via CSS and the chevron lives "outside" — the new card-title
      // single-line view doubles as the click target via the new collapse
      // class added below to keep the same UX.
      if (shouldHaveToggle && !isStage2Split) {
        html += `<div class="collapse-divider" title="Auf-/Zuklappen"><span class="collapse-arrow"></span></div>`;
      }
      if (!isStage2Split) {
        html += `<div class="card-content">`;
        if (step.description) html += `<div class="card-body">${esc(step.description)}</div>`;
      }

      // Stage 3+: split badge
      if (step.stage_added === 2 && currentStage >= 3) {
        html += `<span style="display:inline-block;margin-top:3px;padding:0 5px;border-radius:6px;font-size:0.52rem;font-weight:600;background:#1e2a1e;color:#3fb950" title="Stufe-2-Split">✂ Split</span>`;
      }

      // Z.2c — "Verbinden" on Stage-2 split cards: lets the user (re)wire the
      // logical reference (parent_id) to a specific opponent argument. Only
      // shown in the work step (Stage 2) where splits and originals coexist.
      if (isStage2Split) {
        const targetLabel = step.parent_id ? `→ #${step.parent_id}` : 'kein Ziel';
        html += `<button class="split-connect" data-split-id="${step.id}" title="Logische Referenz setzen" style="display:inline-block;margin:3px 0 0 4px;padding:1px 6px;border-radius:6px;font-size:0.52rem;font-weight:600;background:#1f2937;color:#93c5fd;border:1px solid #374151;cursor:pointer">🔗 ${esc(targetLabel)}</button>`;
      }

      // Z.2b — Split-Toggle (Stages 3 + 4):
      // - On a split card: button "🔄 Original" reveals the origin and hides
      //   all sibling splits of the same set.
      // - On a revealed-origin card: button "↩ Splits" restores the split view.
      if (currentStage >= 3) {
        if (step.split_from_id) {
          html += `<button class="split-toggle" data-origin-id="${step.split_from_id}" title="Original-Argument anzeigen" style="display:inline-block;margin:3px 0 0 4px;padding:1px 6px;border-radius:6px;font-size:0.52rem;font-weight:600;background:#1f2937;color:#93c5fd;border:1px solid #374151;cursor:pointer">🔄 Original</button>`;
        } else if (currentData && currentData.steps && currentData.steps.some(s => s.split_from_id === step.id)) {
          // This is a split-origin currently being shown (i.e. revealed by user)
          html += `<button class="split-toggle" data-origin-id="${step.id}" data-mode="restore" title="Splits zurückholen" style="display:inline-block;margin:3px 0 0 4px;padding:1px 6px;border-radius:6px;font-size:0.52rem;font-weight:600;background:#1f2937;color:#fcd34d;border:1px solid #374151;cursor:pointer">↩ Splits</button>`;
        }
      }

      // Z.5 (preview) — Definition-Fork badge (Stage 3+ only):
      // Shows ⑂ <count> if this argument has competing term interpretations
      // attached. Clicking opens an inline panel (list + add/delete form).
      // Always render the badge in Stage 3+ so users can ALSO add a first fork
      // — the count is just 0 in that case.
      if (currentStage >= 3) {
        const forkCount = forksForNode(step.id).length;
        const badgeBg = forkCount > 0 ? '#2a1f3d' : '#1f2937';
        const badgeColor = forkCount > 0 ? '#d8b4fe' : '#9ca3af';
        const label = forkCount > 0 ? `⑂ ${forkCount}` : '⑂ +';
        html += `<button class="fork-toggle" data-node-id="${step.id}" title="Definitionen / Begriffslesarten" style="display:inline-block;margin:3px 0 0 4px;padding:1px 6px;border-radius:6px;font-size:0.52rem;font-weight:600;background:${badgeBg};color:${badgeColor};border:1px solid #374151;cursor:pointer">${label}</button>`;
      }

      // Stage 4+: conflict zone, opens_conflict (TODO: post-dev)
      if (currentStage >= 4) {
        const zone = step.conflict_zone;
        if (zone) {
          html += `<span class="card-zone" style="background:${ZONE_BG[zone]||'#161b22'};color:${ZONE_COLORS[zone]||'#8b949e'}">${ZONE_LABEL[zone]||''}</span>`;
        }
        if (step.opens_conflict) html += `<div class="new-conflict">→ ${esc(step.opens_conflict)}</div>`;
      }

      // Z.4 — Labels as chips on the card (Stage 4+).
      // Bulk-fetched by the zigzag endpoint, so no per-card request.
      // FALLACY-style labels get a warning hue; everything else a neutral grey.
      if (currentStage >= 4 && Array.isArray(step.labels) && step.labels.length > 0) {
        html += `<div class="label-strip">`;
        for (const lb of step.labels) {
          const severe = ['FALLACY','MANIPULATION','SPAM','INVALID','CIRCULAR','DOUBLE_STANDARD'].includes(lb.label_type);
          const bg = severe ? '#3b1d1d' : '#1f2937';
          const fg = severe ? '#fca5a5' : '#cbd5e1';
          html += `<span class="label-chip" data-label-id="${lb.id}" title="${esc(lb.justification || '')}" style="background:${bg};color:${fg}">${esc(lb.label_type)}</span>`;
        }
        html += `</div>`;
      }

      // Z.4 — Late-addition marker (`stage_added=4` arguments only become
      // visible in this stage). Helps the reviewer distinguish "noticed only
      // in retrospect" from primary debate turns.
      if (currentStage >= 4 && step.stage_added >= 4) {
        html += `<span class="late-add-badge" title="Nachträglich in Stufe ${step.stage_added} ergänzt">＋ Nachtrag</span>`;
      }

      // Stage 2/3 split cards should remain visually identical full cards.
      // No collapsed or "alternative stub" treatment in the refined/work views.

      // Stage 4+: action buttons (TODO: post-dev)
      // Note: the "Antworten" (+) button is rendered as a separate FLOATING
      // pill below the card (.btn-reply-float) — see end of createCardEl —
      // so it visually grows out of the box and implies a new outgoing edge.
      if (currentStage >= 4) {
        html += `<div class="card-actions">`;
        html += `<button class="btn-vote-up" data-id="${step.id}" title="Upvote">▲</button>`;
        html += `<span class="vote-score">${step.vote_score || 0}</span>`;
        html += `<button class="btn-vote-down" data-id="${step.id}" title="Downvote">▼</button>`;
        // Z.4 — Label set + comment-count badge. Comment count goes on the
        // comment button so the chrome stays compact; click to add a new one.
        const cnt = step.comment_count || 0;
        const cntBadge = cnt > 0 ? ` <span class="action-count">${cnt}</span>` : '';
        html += `<button class="btn-comment" data-id="${step.id}" title="Kommentare (${cnt})">💬${cntBadge}</button>`;
        html += `<button class="btn-label" data-id="${step.id}" title="Label hinzufügen">🏷</button>`;
        // Z.4b — Verbindung-zum-Eltern markieren (nur sinnvoll wenn überhaupt
        // ein Eltern-Knoten existiert; Root-Knoten haben keine eingehende
        // Verbindung). Button-Status spiegelt aktuelle Markierung wider.
        if (step.parent_id) {
          const admMark = step.edge_admissibility && step.edge_admissibility !== 'ADMISSIBLE';
          const admStyle = admMark ? ' style="color:#f85149;border-color:#f85149"' : '';
          html += `<button class="btn-edge-adm" data-id="${step.id}" title="Verbindung zum Eltern-Argument markieren"${admStyle}>⊘</button>`;
        }
        html += `</div>`;
      }
      if (!isStage2Split) html += `</div>`;
    }

    card.innerHTML = html;

    // Short-ID plate (e.g. #2) appended AFTER innerHTML so it can be
    // absolutely positioned over the top-right corner without affecting the
    // header layout (= without pushing the title to the right).
    const shortId = nodeShortIds[step.id];
    if (shortId) {
      const idBadge = document.createElement('span');
      idBadge.className = 'card-shortid';
      idBadge.textContent = `#${shortId}`;
      idBadge.title = `Argument #${shortId}`;
      card.appendChild(idBadge);
    }

    // Drag handle: bigger 24×24 grip in the top-LEFT corner so it doesn't
    // collide with the short-ID badge in the top-right and stays easy to hit.
    if (DRAG_ENABLED) {
      const handle = document.createElement('span');
      handle.className = 'card-drag-handle';
      handle.title = 'Karte verschieben';
      handle.textContent = '⠿';
      card.appendChild(handle);
    }

    // Floating "+" reply button — Stage 4+ only. Lives outside the actions
    // row, anchored below the card so it visually creates a new connection.
    if (currentStage >= 4) {
      const replyBtn = document.createElement('button');
      replyBtn.className = 'btn-reply-float';
      replyBtn.dataset.id = step.id;
      replyBtn.title = 'Antworten – neues Argument anhängen';
      replyBtn.textContent = '＋';
      card.appendChild(replyBtn);
    }

    // Z.4b — Inadmissible-edge badge sits in the bottom-left corner of the
    // CHILD card (the card that owns the rejected incoming edge). Click
    // re-opens the edit form. Only shown in Stage 4 where the marker is
    // editable, but the *line* styling itself applies in any stage that
    // draws connections so the rejection isn't invisible while scrolling
    // back to earlier views.
    if (currentStage >= 4 && step.parent_id && step.edge_admissibility && step.edge_admissibility !== 'ADMISSIBLE') {
      const admBadge = document.createElement('span');
      admBadge.className = 'edge-inadmissible-badge';
      const meta = EDGE_ADMISSIBILITY_OPTIONS.find(o => o.value === step.edge_admissibility);
      admBadge.textContent = meta ? meta.label : '⊘';
      admBadge.title = meta ? `${meta.label} – ${meta.desc}` : 'Verbindung markiert';
      admBadge.addEventListener('click', (e) => {
        e.stopPropagation();
        showEdgeAdmissibilityForm(step.id, card, step.edge_admissibility);
      });
      card.appendChild(admBadge);
    }

    if (shouldStartCollapsed) {
      card.classList.add('collapsed');
    }

    // Collapse divider (Stage-3+ cards). Toggles the .collapsed class on the
    // card, which hides .card-content via CSS. Stops propagation so the card
    // doesn't also get picked up as a drag/select target.
    const collapseDivider = card.querySelector('.collapse-divider');
    if (collapseDivider) {
      collapseDivider.addEventListener('click', (e) => {
        e.stopPropagation();
        card.classList.toggle('collapsed');
        if (typeof relayout === 'function') relayout();
      });
    }
    // When collapsed, clicking the title (the only visible element) should
    // expand the card back — gives users the same one-click affordance the
    // old ▸-toggle had.
    const titleEl = card.querySelector('.card-title');
    if (titleEl && shouldHaveToggle) {
      titleEl.addEventListener('click', (e) => {
        if (!card.classList.contains('collapsed')) return;
        e.stopPropagation();
        card.classList.remove('collapsed');
        if (typeof relayout === 'function') relayout();
      });
    }

    // Action handlers (only stages 3+)
    card.querySelector('.btn-vote-up')?.addEventListener('click', (e) => { e.stopPropagation(); vote(step.id, 1); });
    card.querySelector('.btn-vote-down')?.addEventListener('click', (e) => { e.stopPropagation(); vote(step.id, -1); });
    card.querySelector('.btn-reply-float')?.addEventListener('click', (e) => { e.stopPropagation(); showReplyForm(step.id, card); });
    card.querySelector('.btn-comment')?.addEventListener('click', (e) => { e.stopPropagation(); showCommentForm(step.id, card); });
    card.querySelector('.btn-label')?.addEventListener('click', (e) => { e.stopPropagation(); showLabelForm(step.id, card); });
    // Z.4b — opens the edge-admissibility editor (Stage 4 only).
    card.querySelector('.btn-edge-adm')?.addEventListener('click', (e) => {
      e.stopPropagation();
      showEdgeAdmissibilityForm(step.id, card, step.edge_admissibility);
    });
    // Z.4 — clicking an existing label chip offers to delete it (no edit yet).
    card.querySelectorAll('.label-chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        const lid = parseInt(chip.dataset.labelId);
        if (!Number.isFinite(lid)) return;
        if (!confirm(`Label "${chip.textContent}" entfernen?`)) return;
        deleteLabel(lid);
      });
    });

    // Z.2b — Split toggle click handler
    card.querySelector('.split-toggle')?.addEventListener('click', (e) => {
      e.stopPropagation();
      const originId = parseInt(e.currentTarget.dataset.originId);
      if (!Number.isFinite(originId)) return;
      if (revealedSplitOrigins.has(originId)) revealedSplitOrigins.delete(originId);
      else revealedSplitOrigins.add(originId);
      render();
    });

    // Z.2c — Open split-creation form for Stage-2 raw cards.
    card.querySelector('.split-create')?.addEventListener('click', (e) => {
      e.stopPropagation();
      const baseId = parseInt(e.currentTarget.dataset.baseId);
      if (Number.isFinite(baseId)) showSplitCreateForm(baseId, card);
    });

    // Z.2c — Open connect picker for Stage-2 split cards.
    card.querySelector('.split-connect')?.addEventListener('click', (e) => {
      e.stopPropagation();
      const splitId = parseInt(e.currentTarget.dataset.splitId);
      if (Number.isFinite(splitId)) showSplitConnectForm(splitId, card);
    });

    // Z.5 (preview) — Open definition-fork panel for Stage-3+ cards.
    card.querySelector('.fork-toggle')?.addEventListener('click', (e) => {
      e.stopPropagation();
      const nodeId = parseInt(e.currentTarget.dataset.nodeId);
      if (Number.isFinite(nodeId)) showDefinitionForkPanel(nodeId, card);
    });

    return card;
  }

  // ── Helper functions for layout ────────────────
  function getVisibleTopY(item) {
    const canvas = document.getElementById('canvas');
    return item.el.getBoundingClientRect().top - canvas.getBoundingClientRect().top - canvas.clientTop;
  }
  function getVisibleBotY(item) {
    const canvas = document.getElementById('canvas');
    return item.el.getBoundingClientRect().bottom - canvas.getBoundingClientRect().top - canvas.clientTop;
  }

  // ── Shared anchor / connection helpers ─────────
  // DESIGN: The zigzag UI has one shared geometric core across stages.
  // Stages differ in WHICH connections they render, but anchor resolution and
  // SVG updates should be centralized so drag behaviour stays stable.
  function getCenterAnchor(item, CARD_W, CX, topicBottom) {
    if (!item) return { x: CX, y: topicBottom };
    return {
      x: item.x + CARD_W / 2,
      y: item.topY + (item.height || 40) / 2,
    };
  }

  function getLogicalSourceAnchor(item, CX, topicBottom) {
    if (!item) return { x: CX, y: topicBottom };
    return { x: item.edgeX, y: item.botY - 4 };
  }

  function getLogicalTargetAnchor(item) {
    return { x: item.edgeX, y: item.topY + 8 };
  }

  function setCurvedFlowPath(pathEl, sourceAnchor, targetAnchor) {
    const cpY1 = sourceAnchor.y + (targetAnchor.y - sourceAnchor.y) * 0.4;
    const cpY2 = sourceAnchor.y + (targetAnchor.y - sourceAnchor.y) * 0.6;
    pathEl.setAttribute(
      'd',
      `M${sourceAnchor.x},${sourceAnchor.y} C${sourceAnchor.x},${cpY1} ${targetAnchor.x},${cpY2} ${targetAnchor.x},${targetAnchor.y}`,
    );
  }

  function setStraightLine(lineEl, sourceAnchor, targetAnchor) {
    lineEl.setAttribute('x1', sourceAnchor.x);
    lineEl.setAttribute('y1', sourceAnchor.y);
    lineEl.setAttribute('x2', targetAnchor.x);
    lineEl.setAttribute('y2', targetAnchor.y);
  }

  // ── Polygon overlay helpers ─────────────────────
  // DESIGN: Polygon overlays highlight argumentative branches/sub-discussions.
  // Stage 2: groups are split-sets (same split_from_id + origin).
  // Stage 3: groups are subtrees from branching points (parent with 2+ children).
  // Visual: very subtle convex hull with rounded corners — like a highlighter pen.

  function cross2D(O, A, B) {
    return (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
  }

  function convexHull(points) {
    if (points.length < 3) return points.slice();
    points.sort((a, b) => a.x - b.x || a.y - b.y);
    const lower = [];
    for (const p of points) {
      while (lower.length >= 2 && cross2D(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
      lower.push(p);
    }
    const upper = [];
    for (let i = points.length - 1; i >= 0; i--) {
      const p = points[i];
      while (upper.length >= 2 && cross2D(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
      upper.push(p);
    }
    lower.pop(); upper.pop();
    return lower.concat(upper);
  }

  function computePaddedHull(itemList, cardW, padding) {
    const pts = [];
    itemList.forEach(it => {
      const x = it.x, y = it.topY, h = it.height || 40, w = cardW;
      pts.push(
        { x: x - padding, y: y - padding },
        { x: x + w + padding, y: y - padding },
        { x: x - padding, y: y + h + padding },
        { x: x + w + padding, y: y + h + padding },
      );
    });
    return convexHull(pts);
  }

  function smoothHullPath(hull, r = 14) {
    if (hull.length < 3) return '';
    const n = hull.length;
    let d = '';
    for (let i = 0; i < n; i++) {
      const prev = hull[(i - 1 + n) % n], curr = hull[i], next = hull[(i + 1) % n];
      const dxP = prev.x - curr.x, dyP = prev.y - curr.y, lenP = Math.hypot(dxP, dyP);
      const dxN = next.x - curr.x, dyN = next.y - curr.y, lenN = Math.hypot(dxN, dyN);
      const cr = Math.min(r, lenP / 3, lenN / 3);
      const p1x = curr.x + dxP / lenP * cr, p1y = curr.y + dyP / lenP * cr;
      const p2x = curr.x + dxN / lenN * cr, p2y = curr.y + dyN / lenN * cr;
      d += i === 0 ? `M${p1x.toFixed(1)},${p1y.toFixed(1)}` : ` L${p1x.toFixed(1)},${p1y.toFixed(1)}`;
      d += ` Q${curr.x.toFixed(1)},${curr.y.toFixed(1)} ${p2x.toFixed(1)},${p2y.toFixed(1)}`;
    }
    return d + ' Z';
  }

  function computePolygonGroups(displaySteps, allItemById, stage) {
    if (stage < 2) return [];
    const groups = [];
    let ci = 0;

    // Helper: readable short name from a node ID
    function nodeName(id) {
      const it = allItemById[id];
      if (!it) return '?';
      const t = it.step.title || '';
      return t.length > 28 ? t.substring(0, 25) + '…' : t;
    }

    if (stage === 2) {
      // Stage 2: group by split_from_id (split-sets + their origin)
      const splitGroups = {};
      displaySteps.forEach(s => {
        if (s.split_from_id) {
          if (!splitGroups[s.split_from_id]) splitGroups[s.split_from_id] = [];
          splitGroups[s.split_from_id].push(s.id);
        }
      });
      Object.entries(splitGroups).forEach(([oid, sids]) => {
        if (sids.length < 2) return;
        const nids = [...sids];
        const oidNum = parseInt(oid);
        if (allItemById[oidNum]) nids.push(oidNum);
        const originName = nodeName(oidNum);
        groups.push({
          key: `auto_s2_${oidNum}`,
          name: `Splits: ${originName}`,
          nodeIds: nids,
          color: POLYGON_COLORS[ci++ % POLYGON_COLORS.length],
          isAuto: true,
        });
      });
    } else {
      // Stage 3+: group by parent_id branching (subtrees from branch points)
      const displayedIds = new Set(Object.keys(allItemById).map(Number));
      const childrenOf = {};
      displaySteps.forEach(s => {
        if (s.parent_id && displayedIds.has(s.parent_id)) {
          if (!childrenOf[s.parent_id]) childrenOf[s.parent_id] = [];
          childrenOf[s.parent_id].push(s.id);
        }
      });
      function subtree(id) {
        const res = [id];
        (childrenOf[id] || []).forEach(c => res.push(...subtree(c)));
        return res;
      }
      Object.values(childrenOf).forEach(children => {
        if (children.length < 2) return;
        children.forEach(cid => {
          const ids = subtree(cid);
          if (ids.length < 2) return;
          groups.push({
            key: `auto_s3_${cid}`,
            name: nodeName(cid),
            nodeIds: ids,
            color: POLYGON_COLORS[ci++ % POLYGON_COLORS.length],
            isAuto: true,
          });
        });
      });
    }
    return groups;
  }

  function renderChrono(data) {
    const canvas = document.getElementById('canvas');
    canvas.querySelectorAll('.zz-card,.zz-topic,.zz-deadend,.edge-marker,.zz-side-label,.inline-form,.loading,.error').forEach(e => e.remove());

    const W = Math.max(canvas.clientWidth, 700);
    const CX = W / 2;
    const CARD_W = 220;
    const GAP = 20;
    const MAX_OFFSET = 50;
    const V_PAD = 12;
    const TOPIC_Y = 35;

    // Topic pill
    const topicEl = document.createElement('div');
    topicEl.className = 'zz-topic';
    topicEl.style.left = CX + 'px';
    topicEl.style.top = TOPIC_Y + 'px';
    topicEl.textContent = data.topic.title;
    canvas.appendChild(topicEl);
    const topicH = topicEl.getBoundingClientRect().height;
    const topicBottom = TOPIC_Y + topicH / 2 + 4;

    // Side labels
    const sideL = document.createElement('div');
    sideL.className = 'zz-side-label';
    sideL.style.left = '16px'; sideL.style.top = '10px'; sideL.style.color = PRO_C;
    sideL.textContent = '◀ PRO';
    canvas.appendChild(sideL);

    const sideR = document.createElement('div');
    sideR.className = 'zz-side-label';
    sideR.style.right = '16px'; sideR.style.top = '10px'; sideR.style.color = CON_C;
    sideR.style.textAlign = 'right';
    sideR.textContent = 'CONTRA ▶';
    canvas.appendChild(sideR);

    // Build step map
    const steps = data.steps;
    const stepMap = {};
    steps.forEach(s => { stepMap[s.id] = s; });

    // ── Stages 3 + 4 (Verfeinerung / Einordnung): filter out originals that
    // have been split — never show "original + splits" simultaneously. ──
    const splitOriginIds = new Set();
    if (currentStage >= 3) {
      steps.forEach(s => { if (s.split_from_id) splitOriginIds.add(s.split_from_id); });
    }

    // Filter steps for display
    // Z.2b: a split-origin can be temporarily revealed by the user. While
    // revealed, the origin is shown and its splits are hidden — preserving the
    // "never show original + splits simultaneously" rule from the design doc.
    const displaySteps = currentStage >= 3
      ? steps.filter(s => {
          if (splitOriginIds.has(s.id)) {
            // It's a split-origin: show only if user revealed it
            return revealedSplitOrigins.has(s.id);
          }
          if (s.split_from_id && revealedSplitOrigins.has(s.split_from_id)) {
            // It's a split whose origin is currently revealed → hide
            return false;
          }
          return true;
        })
      : steps;

    // ── Stage 1: simple linear chain — every step is primary, no siblings ──
    // ── Stage 2 (Split-Prozess): originals are primary chain, splits are siblings of their origin ──
    // ── Stage 3 (Verfeinerung): split originals filtered out, remaining grouped by parent_id ──
    const primarySteps = [];
    const siblingSteps = {};

    if (currentStage === 1) {
      // Stage 1: ALL steps form a single chronological chain, no siblings
      displaySteps.forEach(s => primarySteps.push(s));
    } else if (currentStage === 2) {
      // Stage 2 (Split-Prozess): originals are primary, splits group by split_from_id
      displaySteps.forEach(s => {
        if (s.split_from_id) {
          // Split → sibling of its origin (grouped under origin's ID)
          if (!siblingSteps[s.split_from_id]) siblingSteps[s.split_from_id] = [];
          siblingSteps[s.split_from_id].push(s);
        } else {
          primarySteps.push(s);
        }
      });
    } else {
      // Stage 2+: group by parent_id — first = primary, rest = siblings
      const seenParents = new Set();
      displaySteps.forEach(s => {
        const key = s.parent_id ?? '__root__';
        if (!seenParents.has(key)) {
          seenParents.add(key);
          primarySteps.push(s);
        } else {
          if (!siblingSteps[key]) siblingSteps[key] = [];
          siblingSteps[key].push(s);
        }
      });
    }

    // Create card items
    const items = [];

    primarySteps.forEach((s, i) => {
      const card = createCardEl(s, false);
      card.style.width = CARD_W + 'px';
      card.style.position = 'absolute';
      card.style.visibility = 'hidden';
      canvas.appendChild(card);
      const h = card.getBoundingClientRect().height;

      const side = s.position === 'PRO' ? 'L' : 'R';
      const item = { el: card, step: s, side, index: i, height: h, siblings: [] };

      // Siblings for this step
      // Stage 2: splits grouped by split_from_id = this item's id
      // Stage 3+: grouped by parent_id
      const key = currentStage === 2 ? s.id : (s.parent_id ?? '__root__');
      const sibs = siblingSteps[key] || [];
      sibs.forEach(sib => {
        const sibCard = createCardEl(sib, true);
        sibCard.style.width = CARD_W + 'px';
        sibCard.style.position = 'absolute';
        sibCard.style.visibility = 'hidden';
        canvas.appendChild(sibCard);
        const sibH = sibCard.getBoundingClientRect().height;
        const sibSide = sib.position === 'PRO' ? 'L' : 'R';
        item.siblings.push({ el: sibCard, step: sib, side: sibSide, height: sibH });
      });

      items.push(item);
    });

    // Calculate positions
    let currentY = topicBottom + V_PAD;

    items.forEach((item) => {
      const weight = item.step.position_score ?? 0.5;
      const offset = weight * MAX_OFFSET;
      let cardX = item.side === 'L'
        ? CX - GAP - CARD_W - offset
        : CX + GAP + offset;

      item.el.style.left = cardX + 'px';
      item.el.style.top = currentY + 'px';
      item.el.style.visibility = 'visible';

      item.x = cardX;
      item.y = currentY;
      item.edgeX = item.side === 'L' ? cardX + CARD_W : cardX;
      item.topY = currentY;
      item.botY = currentY + item.height;

      let blockHeight = item.height;

      // Position siblings
      let sibCurY = currentY + item.height + 24;
      item.siblings.forEach((sibItem) => {
        const sibWeight = sibItem.step.position_score ?? 0.3;
        const sibOffset = sibWeight * MAX_OFFSET;
        let sibX;
        if (currentStage === 3) {
          // Refined Stage 3 keeps split cards directly underneath each other
          // in the same semantic side column.
          sibX = cardX;
        } else {
          sibX = sibItem.side === 'L'
            ? CX - GAP - CARD_W - sibOffset - 40
            : CX + GAP + sibOffset + 40;
        }

        sibItem.el.style.left = sibX + 'px';
        sibItem.el.style.top = sibCurY + 'px';
        sibItem.el.style.visibility = 'visible';

        sibItem.x = sibX;
        sibItem.y = sibCurY;
        sibItem.edgeX = sibItem.side === 'L' ? sibX + CARD_W : sibX;
        sibItem.topY = sibCurY;
        sibItem.botY = sibCurY + sibItem.height;

        sibCurY += sibItem.height + 4;
      });

      if (item.siblings.length > 0) {
        blockHeight = sibCurY - 4 - currentY;
      }

      currentY += blockHeight + V_PAD;
    });

    // Draw SVG
    const totalHeight = currentY + 80;
    const svg = document.getElementById('zz-svg');
    svg.innerHTML = '';
    svg.setAttribute('width', W);
    svg.setAttribute('height', totalHeight);
    svg.setAttribute('viewBox', `0 0 ${W} ${totalHeight}`);

    svg.innerHTML =
      `<rect x="0" y="0" width="${CX}" height="${totalHeight}" fill="${PRO_C}" opacity="0.04"/>` +
      `<rect x="${CX}" y="0" width="${CX}" height="${totalHeight}" fill="${CON_C}" opacity="0.04"/>` +
      `<line x1="${CX}" y1="${topicBottom}" x2="${CX}" y2="${totalHeight - 30}" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>`;

    // Build item-by-id map for connection lookups (primaries only)
    const itemById = {};
    items.forEach(item => { itemById[item.step.id] = item; });

    // Comprehensive lookup including siblings (for Stage 2 split-to-split connections)
    const allItemById = {};
    items.forEach(item => {
      allItemById[item.step.id] = item;
      item.siblings.forEach(sib => { allItemById[sib.step.id] = sib; });
    });

    // ── Polygon overlays (argumentative branches) ────────────────────
    // Merge auto-computed groups with user-created custom groups.
    // Each group has per-group visibility via polygonGroupVisibility.
    const autoGroups = computePolygonGroups(displaySteps, allItemById, currentStage);
    const allGroups = [
      ...autoGroups,
      ...customPolygonGroups.map((g, i) => ({
        ...g,
        color: g.color || POLYGON_COLORS[(autoGroups.length + i) % POLYGON_COLORS.length],
        isAuto: false,
      })),
    ];
    activePolygonGroups = allGroups;

    const polygonState = [];
    allGroups.forEach(g => {
      const isVisible = polygonGroupVisibility[g.key] ?? true;
      if (!isVisible) return;
      const gItems = g.nodeIds.map(id => allItemById[id]).filter(Boolean);
      if (gItems.length < 2) return;
      const hull = computePaddedHull(gItems, CARD_W, 18);
      if (hull.length < 3) return;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', smoothHullPath(hull));
      path.setAttribute('fill', g.color);
      path.setAttribute('fill-opacity', '0.10');
      path.setAttribute('stroke', g.color);
      path.setAttribute('stroke-opacity', '0.30');
      path.setAttribute('stroke-width', '2');
      path.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(path);
      polygonState.push({ el: path, nodeIds: g.nodeIds, color: g.color });
    });

    // ── Multi-Node-Pattern overlays (dashed, by pattern_type colour) ──
    // Drawn as a second hull layer with a wider padding so they sit visibly
    // outside polygon overlays. Single-member patterns still render as a small
    // ring around the lone card.
    const patternState = [];
    currentPatterns.forEach(p => {
      if (patternVisibility[p.id] === false) return;
      const pItems = p.member_ids.map(id => allItemById[id]).filter(Boolean);
      if (pItems.length === 0) return;
      const meta = patternMeta(p.pattern_type);
      const hull = computePaddedHull(pItems, CARD_W, 28);
      if (hull.length < 3) return; // single-card hulls would degenerate; skip for now
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', smoothHullPath(hull, 18));
      path.setAttribute('fill', meta.color);
      path.setAttribute('fill-opacity', '0.05');
      path.setAttribute('stroke', meta.color);
      path.setAttribute('stroke-opacity', '0.65');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('stroke-dasharray', '6,4');
      path.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(path);
      patternState.push({ el: path, nodeIds: p.member_ids, meta });
    });

    items.forEach((item, idx) => {
      const color = item.side === 'L' ? PRO_C : CON_C;
      const toX = item.edgeX;
      const toY = item.topY + 8;

      // Stage 1: connect to PREVIOUS card (simple zigzag chain)
      // Stage 2+: connect to parent_id (structural reference)
      let srcItem = null;
      if (currentStage === 1) {
        srcItem = idx > 0 ? items[idx - 1] : null;
      } else {
        if (item.step.parent_id && itemById[item.step.parent_id]) {
          srcItem = itemById[item.step.parent_id];
        }
      }
      const fromX = srcItem ? srcItem.edgeX : CX;
      const fromY = srcItem ? (srcItem.botY - 4) : topicBottom;
      item.srcItem = srcItem;

      // Stage 2: raw connections (between stage_added=1 items) are thicker and dimmer
      // to represent proportionally more consolidated information
      const isRawConn = currentStage === 2 && item.step.stage_added === 1
        && (!srcItem || srcItem.step.stage_added === 1);
      const lineWidth = isRawConn ? 4 : 2;
      const lineOpacity = isRawConn ? 0.18 : 0.4;

      // Stage 3 renders its own dual-connection system below.
      if (currentStage !== 3) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', fromX); line.setAttribute('y1', fromY);
        line.setAttribute('x2', toX); line.setAttribute('y2', toY);
        line.setAttribute('stroke', color);
        line.setAttribute('stroke-width', String(lineWidth));
        line.setAttribute('stroke-opacity', String(lineOpacity));
        // Z.4b — recolour as dashed red when this child's incoming edge is
        // marked inadmissible. The child stays on canvas; only the line
        // changes appearance.
        applyEdgeAdmissibilityToLine(line, item.step);
        svg.appendChild(line);
        item.mainLine = line;
      } else {
        item.mainLine = null;
      }

      // Edge type marker (only stages 3+, clean stages have no edge annotations)
      const et = currentStage >= 4 && item.step.edge_type && EDGE_TYPES[item.step.edge_type];
      if (et) {
        const eMidX = (fromX + toX) / 2;
        const eMidY = (fromY + toY) / 2;
        const marker = document.createElement('div');
        marker.className = 'edge-marker collapsed';
        marker.style.left = eMidX + 'px'; marker.style.top = eMidY + 'px';
        marker.innerHTML =
          `<span class="edge-marker-emoji">${et.emoji}</span>` +
          `<span class="edge-marker-plus">⊕</span>` +
          `<span class="edge-marker-label">${esc(et.label)}</span>`;
        canvas.appendChild(marker);
        item.markerEl = marker;
        marker.addEventListener('click', (ev) => { ev.stopPropagation(); marker.classList.toggle('collapsed'); });
      }

      // Sibling lines — branch FROM the primary card's edge, not the connection midpoint.
      // Splits are attached to their base argument, not to the connection between arguments.
      // Stage 2: sibling lines become "Ursprungs-Argument" connections (neutral grey),
      // attaching slightly lower on the origin card to distinguish from parent connections.
      // Stage 4: siblings share the same parent_id as the primary — draw a regular
      // parent→child line from the parent (or topic if root) so they don't appear
      // disconnected on the canvas.
      if (currentStage === 4 && item.siblings.length > 0) {
        item.siblings.forEach((sibItem) => {
          const sibColor = sibItem.side === 'L' ? PRO_C : CON_C;
          // Connect from the same source the primary uses (parent_id or topic).
          const parentItem = sibItem.step.parent_id ? itemById[sibItem.step.parent_id] : null;
          const sFromX = parentItem ? parentItem.edgeX : CX;
          const sFromY = parentItem ? (parentItem.botY - 4) : topicBottom;
          const sToX = sibItem.edgeX;
          const sToY = sibItem.topY + 8;
          const sLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          sLine.setAttribute('x1', sFromX); sLine.setAttribute('y1', sFromY);
          sLine.setAttribute('x2', sToX);   sLine.setAttribute('y2', sToY);
          sLine.setAttribute('stroke', sibColor);
          sLine.setAttribute('stroke-width', '2');
          sLine.setAttribute('stroke-opacity', '0.4');
          applyEdgeAdmissibilityToLine(sLine, sibItem.step);
          svg.appendChild(sLine);
          sibItem.line = sLine;
          sibItem.parentItemRef = parentItem || null;
        });
      }

      if (currentStage === 2 && item.siblings.length > 0) {
        const defaultSibColor = item.side === 'L' ? PRO_C : CON_C;
        // Dock point = bottom of the primary card (where splits branch off)
        const dockX = item.edgeX;
        // Stage 2: attach a bit lower than parent connections (botY instead of botY-4)
        const dockY = (currentStage === 2) ? item.botY + 2 : item.botY;

        item.siblings.forEach((sibItem) => {
          const sibToX = sibItem.edgeX;
          const sibToY = sibItem.y + 8;
          // Stage 2 + split: neutral grey = Ursprungs-Argument connection
          const sibColor = (currentStage === 2 && sibItem.step.split_from_id)
            ? '#8b949e'
            : defaultSibColor;
          // Curved dashed path: base card → sibling card
          const cx1 = dockX, cy1 = (dockY + sibToY) / 2;
          const cx2 = sibToX, cy2 = (dockY + sibToY) / 2;
          const sibPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          sibPath.setAttribute('d', `M${dockX},${dockY} C${cx1},${cy1} ${cx2},${cy2} ${sibToX},${sibToY}`);
          sibPath.setAttribute('stroke', sibColor);
          sibPath.setAttribute('stroke-width', '1.5');
          sibPath.setAttribute('stroke-opacity', (currentStage === 2 && sibItem.step.split_from_id) ? '0.45' : '0.35');
          sibPath.setAttribute('stroke-dasharray', '5,3');
          sibPath.setAttribute('fill', 'none');
          // Only add to SVG if showOriginLines is enabled
          if (showOriginLines) svg.appendChild(sibPath);
          sibItem.line = sibPath;
        });
      }
    });

    // ── Stage 2/3: additional semantic connections ─────────────────────────────
    // Stage 2 = work view with origin + raw-chain + chrono + split references.
    // Stage 3 = refined view with two connection types only:
    //   - chronological flow (topic-blue, dashed, through card centers)
    //   - logical reference (green/red, straight, side-docked)
    // TODO: post-dev — smooth branching from chronological line to source argument in split view
    const extraLines = [];

    // ── Stage 2: Blue chronological flow + split-to-split connections ──────────
    // Four connection types in Stage 2:
    //   1. Raw chain (thick, dimmed) — handled above in main lines
    //   2. Ursprungs-Argument (grey dashed) — handled above in sibling lines
    //   3. Blue chronological flow: curvy path through card CENTERS (not edges)
    //      Topic → R1 → L2.1 → L2.2 → R3.1 → R3.2 → L4.1 → ...
    //      Semantically separated from argument connections by running through midpoints.
    //   4. Split-to-split: bright green/red STRAIGHT lines — specific connections via parent_id
    if (currentStage === 2) {
      // ─ 3. Blue chronological flow (curvy, through card centers) ─
      // Build the unfolded sequence: for each stage-1 original, substitute with its splits (if any)
      const originals = items.filter(it => it.step.stage_added === 1);
      const chronoSequence = []; // array of item refs (from allItemById)
      originals.forEach(orig => {
        if (orig.siblings.length > 0 && orig.siblings.some(s => s.step.split_from_id)) {
          // Has splits → insert splits in order (they are already ordered from API)
          orig.siblings.forEach(sib => {
            if (sib.step.split_from_id) chronoSequence.push(sib);
          });
        } else {
          // No splits → keep original in sequence
          chronoSequence.push(orig);
        }
      });

      if (showBlueChronoFlow) {
        const TOPIC_BLUE = '#1f6feb';
        for (let i = 0; i < chronoSequence.length; i++) {
          const target = chronoSequence[i];
          const bLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const sourceAnchor = getCenterAnchor(i > 0 ? chronoSequence[i - 1] : null, CARD_W, CX, topicBottom);
          const targetAnchor = getCenterAnchor(target, CARD_W, CX, topicBottom);
          setCurvedFlowPath(bLine, sourceAnchor, targetAnchor);
          bLine.setAttribute('stroke', TOPIC_BLUE);
          bLine.setAttribute('stroke-width', '2.5');
          bLine.setAttribute('stroke-opacity', '0.45');
          bLine.setAttribute('stroke-dasharray', '6,4');
          bLine.setAttribute('fill', 'none');
          svg.appendChild(bLine);
          extraLines.push({
            el: bLine, type: 'chrono',
            srcItem: i > 0 ? chronoSequence[i - 1] : null,
            tgtItem: target,
          });
        }
      }

      // ─ 4. Split-to-split connections (bright green/red, straight) ─
      // Each split's parent_id points to the specific opponent split it responds to.
      // Drawn as bright, straight lines — the core argumentative connections.
      const allSplits = [];
      items.forEach(it => {
        it.siblings.forEach(sib => {
          if (sib.step.stage_added === 2 && sib.step.parent_id) allSplits.push(sib);
        });
      });

      allSplits.forEach(splitItem => {
        const targetItem = allItemById[splitItem.step.parent_id];
        if (!targetItem) return;
        // Draw connection to parent_id target — whether it's a split or an unsplit original.
        // Example: L2.1 responds to R1 (unsplit), R3.1 responds to L2.1 (split).

        const color = splitItem.side === 'L' ? PRO_C : CON_C;
        const sLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        setStraightLine(
          sLine,
          getLogicalSourceAnchor(targetItem, CX, topicBottom),
          getLogicalTargetAnchor(splitItem),
        );
        sLine.setAttribute('stroke', color);
        sLine.setAttribute('stroke-width', '2');
        sLine.setAttribute('stroke-opacity', '0.6');
        applyEdgeAdmissibilityToLine(sLine, splitItem.step);
        svg.appendChild(sLine);
        extraLines.push({
          el: sLine, type: 'split',
          srcItem: targetItem,
          tgtItem: splitItem,
        });
      });
    }

    // ── Stage 3: refined dual-connection view ─────────────────────────────────
    if (currentStage === 3) {
      const visibleSequence = displaySteps
        .map(step => allItemById[step.id])
        .filter(Boolean);

      if (showBlueChronoFlow) {
        const TOPIC_BLUE = '#1f6feb';
        visibleSequence.forEach((target, idx) => {
          const chronoPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          setCurvedFlowPath(
            chronoPath,
            getCenterAnchor(idx > 0 ? visibleSequence[idx - 1] : null, CARD_W, CX, topicBottom),
            getCenterAnchor(target, CARD_W, CX, topicBottom),
          );
          chronoPath.setAttribute('stroke', TOPIC_BLUE);
          chronoPath.setAttribute('stroke-width', '2');
          chronoPath.setAttribute('stroke-opacity', '0.38');
          chronoPath.setAttribute('stroke-dasharray', '6,4');
          chronoPath.setAttribute('fill', 'none');
          svg.appendChild(chronoPath);
          extraLines.push({
            el: chronoPath, type: 'chrono',
            srcItem: idx > 0 ? visibleSequence[idx - 1] : null,
            tgtItem: target,
          });
        });
      }

      visibleSequence.forEach(item => {
        const src = item.step.parent_id ? allItemById[item.step.parent_id] : null;
        const refLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        setStraightLine(
          refLine,
          getLogicalSourceAnchor(src, CX, topicBottom),
          getLogicalTargetAnchor(item),
        );
        refLine.setAttribute('stroke', item.side === 'L' ? PRO_C : CON_C);
        refLine.setAttribute('stroke-width', '2');
        refLine.setAttribute('stroke-opacity', '0.58');
        applyEdgeAdmissibilityToLine(refLine, item.step);
        svg.appendChild(refLine);
        extraLines.push({
          el: refLine, type: 'logical',
          srcItem: src,
          tgtItem: item,
        });
      });
    }

    // Dead end pill
    const deY = currentY + 6;
    const de = document.createElement('div');
    de.className = 'zz-deadend';
    de.style.left = CX + 'px'; de.style.top = deY + 'px';
    de.innerHTML = `<div class="de-icon"></div>
      <div class="de-label">Ende des Strangs</div>
      <div class="de-desc">${steps.length} Argumente</div>`;
    canvas.appendChild(de);

    const finalH = deY + 70;
    canvas.style.minHeight = finalH + 'px';
    svg.setAttribute('height', finalH);
    svg.setAttribute('viewBox', `0 0 ${W} ${finalH}`);

    renderState = { items, CX, topicBottom, CARD_W, V_PAD, mode: 'chrono', allItemById, extraLines, polygonState, patternState };
  }

  // ── Z.4b — Edge admissibility (taxonomy §27) ────────────────────────
  // Marks the parent→child *connection* as inadmissible (not the child).
  // Stage 4 only — earlier stages don't show enough structure to make the
  // distinction meaningful.
  const EDGE_ADMISSIBILITY_OPTIONS = [
    { value: 'OFF_TOPIC',       label: '⊘ Off-Topic',          desc: 'Inhalt unverbunden zum Eltern-Argument' },
    { value: 'SCOPE_VIOLATION', label: '🚧 Scope-Bruch',        desc: 'Springt auf eine andere Ebene (z.B. von Politik zu Anekdote)' },
    { value: 'NON_SEQUITUR',    label: '↯ Folgt nicht',         desc: 'Stützt / widerlegt das Eltern-Argument nicht wirklich' },
  ];

  /** Apply Z.4b styling to an SVG parent→child line element. No-op when
   *  the child's edge is ADMISSIBLE (default). Idempotent. */
  function applyEdgeAdmissibilityToLine(line, step) {
    if (!line || !step) return;
    const adm = step.edge_admissibility || 'ADMISSIBLE';
    if (adm === 'ADMISSIBLE') return;
    // Override colour + style without touching the dashed/curved variants:
    // we keep the existing stroke-width and let the dash + colour change
    // signal the rejection.
    line.setAttribute('stroke', '#f85149');
    line.setAttribute('stroke-opacity', '0.55');
    line.setAttribute('stroke-dasharray', '5,4');
  }

  function showEdgeAdmissibilityForm(nodeId, anchorCard, currentValue) {

  function removeInlineForms() {
    document.querySelectorAll('.inline-form').forEach(f => f.remove());
  }

  /**
   * "Dirty" check used by the outside-click / Escape dismissers.
   * A form counts as dirty as soon as the user has typed anything into an
   * <input type="text"> or <textarea> — explicit select changes are not
   * counted because selects always have a value (defaults shouldn't block
   * dismissal). Submission and the explicit "Abbrechen" button always close
   * regardless of dirty state.
   */
  function _isInlineFormDirty(form) {
    const fields = form.querySelectorAll('textarea, input[type="text"], input:not([type])');
    for (const f of fields) {
      if ((f.value || '').trim().length > 0) return true;
    }
    return false;
  }

  function _tryDismissInlineForms(triggerEl) {
    const forms = document.querySelectorAll('.inline-form');
    if (forms.length === 0) return;
    // If the user clicked inside one of the forms, don't dismiss.
    if (triggerEl && triggerEl.closest && triggerEl.closest('.inline-form')) return;
    let anyDirty = false;
    forms.forEach(f => { if (_isInlineFormDirty(f)) anyDirty = true; });
    if (anyDirty) return; // preserve in-progress input
    forms.forEach(f => f.remove());
  }

  // Click outside an open inline form (e.g. reply / comment / label) closes
  // it — unless the user has already started typing. The Cancel button keeps
  // working as before. Mousedown is used (not click) so the dismissal beats
  // any focus-loss issues on inputs.
  document.addEventListener('mousedown', (e) => {
    _tryDismissInlineForms(e.target);
  }, true);

  // Esc also closes the form when nothing has been typed yet.
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    _tryDismissInlineForms(null);
  });

  function _opponentOptions(currentSplitId, selectedParentId) {
    // Candidates: all Stage-1 raw nodes in the topic except the base from
    // which this split originates (a split must not point back at its own
    // origin or at itself). The base is implicitly excluded because splits
    // do not list their own origin as a target.
    if (!currentData || !currentData.steps) return '';
    const split = currentData.steps.find(s => s.id === currentSplitId);
    const ownBaseId = split ? split.split_from_id : null;
    const opts = currentData.steps
      .filter(s => s.stage_added === 1 && s.id !== ownBaseId)
      .map(s => {
        const sel = (s.id === selectedParentId) ? ' selected' : '';
        const title = (s.title || '').slice(0, 60);
        return `<option value="${s.id}"${sel}>#${s.id} · ${s.position} · ${title}</option>`;
      })
      .join('');
    return `<option value=""${selectedParentId ? '' : ' selected'}>— kein Ziel —</option>` + opts;
  }

  // ── Z.5 (preview) — Definition-Fork panel ───────────────────────
  // DESIGN: forks are competing interpretations of a disputed term used inside
  // the argument. The panel shows existing forks (term + variant + optional
  // description) with delete buttons, and an add row. After mutation we reload
  // the topic-wide fork list and only redraw the badge counters — the SVG
  // connection layout doesn't depend on forks, so a full `loadZigzag()` would
  // be overkill (and would also collapse all cards).
  function showDefinitionForkPanel(nodeId, anchorCard, editingForkId = null) {
    removeInlineForms();
    const node = currentData?.steps?.find(s => s.id === nodeId);
    const forks = forksForNode(nodeId);

    const form = document.createElement('div');
    form.className = 'inline-form';
    const rect = anchorCard.getBoundingClientRect();
    const canvasRect = document.getElementById('canvas').getBoundingClientRect();
    form.style.left = (rect.left - canvasRect.left) + 'px';
    form.style.top = (rect.bottom - canvasRect.top + 8) + 'px';
    form.style.width = '340px';

    // Re-open the panel anchored to the (possibly re-rendered) card.
    const reopen = (nextEditingId = null) => {
      if (typeof render === 'function') render();
      const newAnchor = document.querySelector(`.zz-card[data-step-id="${nodeId}"]`);
      if (newAnchor) showDefinitionForkPanel(nodeId, newAnchor, nextEditingId);
    };

    // Render a single fork row — either as a static read-only entry with
    // ✏ Edit / 🗑 Delete actions, or as an inline edit form when this row's
    // id matches `editingForkId`. Only ONE row can be in edit mode at a time
    // so the panel stays simple.
    const renderForkRow = (f) => {
      const isEditing = f.id === editingForkId;
      if (!isEditing) {
        return `
          <li style="display:flex;align-items:flex-start;gap:6px;padding:4px 6px;background:#161b22;border-radius:6px;border-left:3px solid #8b5cf6">
            <div style="flex:1;font-size:0.64rem;color:#e6edf3;line-height:1.35">
              <span style="font-weight:700;color:#d8b4fe">${esc(f.term)}</span>
              <span style="color:#9ca3af"> = </span>
              <span>${esc(f.definition_variant)}</span>
              ${f.description ? `<div style="color:#8b949e;font-size:0.58rem;margin-top:2px">${esc(f.description)}</div>` : ''}
            </div>
            <button class="fork-edit" data-fork-id="${f.id}" title="Bearbeiten" type="button"
              style="background:#1f2937;color:#93c5fd;border:1px solid #374151;border-radius:4px;padding:1px 5px;font-size:0.6rem;cursor:pointer">✏</button>
            <button class="fork-delete" data-fork-id="${f.id}" title="Löschen" type="button"
              style="background:#1f2937;color:#f87171;border:1px solid #374151;border-radius:4px;padding:1px 5px;font-size:0.6rem;cursor:pointer">🗑</button>
          </li>`;
      }
      // Inline edit form for this single fork. Inputs are prefilled; PATCH
      // sends only changed fields (the backend treats unset fields as
      // unchanged, but we send all three to keep client logic minimal).
      const termVal = esc(f.term).replace(/"/g, '&quot;');
      const variantVal = esc(f.definition_variant).replace(/"/g, '&quot;');
      const descVal = esc(f.description || '');
      return `
        <li style="padding:6px 8px;background:#1c2030;border-radius:6px;border-left:3px solid #fbbf24">
          <label style="font-size:0.58rem;color:#9ca3af">Begriff</label>
          <input class="fork-edit-term" data-fork-id="${f.id}" value="${termVal}" maxlength="200"
            style="width:100%;padding:3px 5px;font-size:0.62rem;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#e6edf3;margin-bottom:4px" />
          <label style="font-size:0.58rem;color:#9ca3af">Lesart / Definition</label>
          <input class="fork-edit-variant" data-fork-id="${f.id}" value="${variantVal}" maxlength="300"
            style="width:100%;padding:3px 5px;font-size:0.62rem;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#e6edf3;margin-bottom:4px" />
          <label style="font-size:0.58rem;color:#9ca3af">Beschreibung (optional)</label>
          <textarea class="fork-edit-desc" data-fork-id="${f.id}"
            style="width:100%;height:42px;padding:3px 5px;font-size:0.6rem;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#e6edf3;resize:vertical">${descVal}</textarea>
          <div style="display:flex;gap:4px;justify-content:flex-end;margin-top:4px">
            <button class="fork-edit-cancel" type="button"
              style="background:#30363d;color:#c9d1d9;border:none;border-radius:4px;padding:2px 8px;font-size:0.6rem;cursor:pointer">Abbrechen</button>
            <button class="fork-edit-save" data-fork-id="${f.id}" type="button"
              style="background:#1f6feb;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:0.6rem;cursor:pointer">Speichern</button>
          </div>
        </li>`;
    };

    const listHtml = forks.length === 0
      ? `<div style="font-size:0.62rem;color:#6e7681;font-style:italic;margin:4px 0 8px">Noch keine Definitionsvarianten.</div>`
      : `<ul style="list-style:none;padding:0;margin:4px 0 8px;display:flex;flex-direction:column;gap:4px">${forks.map(renderForkRow).join('')}</ul>`;

    form.innerHTML = `
      <h4>⑂ Begriffslesarten</h4>
      <div style="font-size:0.62rem;color:#8b949e;margin-bottom:4px">
        Knoten #${nodeId}: <em>${esc((node?.title || '').slice(0, 80))}</em>
      </div>
      ${listHtml}
      <div style="border-top:1px solid #30363d;padding-top:6px">
        <label>Begriff</label>
        <input id="fork-term" placeholder="z.B. Rassismus" maxlength="200" />
        <label>Lesart / Definition</label>
        <input id="fork-variant" placeholder="z.B. Vorurteil + institutionelle Macht" maxlength="300" />
        <label>Beschreibung (optional)</label>
        <textarea id="fork-desc" placeholder="Wann gilt diese Lesart, was unterscheidet sie?"></textarea>
        <div class="form-actions">
          <button class="btn-cancel" type="button">Schließen</button>
          <button class="btn-submit" id="fork-submit" type="button">Hinzufügen</button>
        </div>
      </div>
    `;
    document.getElementById('canvas').appendChild(form);

    form.addEventListener('click', (e) => {
      if (e.target.classList.contains('btn-cancel')) removeInlineForms();
    });

    form.querySelectorAll('.fork-delete').forEach(btn => {
      btn.addEventListener('click', async () => {
        const forkId = parseInt(btn.dataset.forkId);
        if (!Number.isFinite(forkId)) return;
        try {
          await deleteJSON(`${API}/definition-forks/${forkId}`);
          await loadDefinitionForksForCurrentTopic();
          reopen();
        } catch (err) {
          alert('Löschen fehlgeschlagen: ' + err.message);
        }
      });
    });

    // ✏-Button switches the row to edit mode (single-row edit only).
    form.querySelectorAll('.fork-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        const forkId = parseInt(btn.dataset.forkId);
        if (Number.isFinite(forkId)) reopen(forkId);
      });
    });

    // Cancel/save handlers for the inline edit row.
    form.querySelector('.fork-edit-cancel')?.addEventListener('click', () => reopen(null));
    form.querySelector('.fork-edit-save')?.addEventListener('click', async (e) => {
      const forkId = parseInt(e.currentTarget.dataset.forkId);
      const term = form.querySelector(`.fork-edit-term[data-fork-id="${forkId}"]`).value.trim();
      const variant = form.querySelector(`.fork-edit-variant[data-fork-id="${forkId}"]`).value.trim();
      const descRaw = form.querySelector(`.fork-edit-desc[data-fork-id="${forkId}"]`).value.trim();
      if (!term || !variant) {
        alert('Begriff und Lesart dürfen nicht leer sein.');
        return;
      }
      try {
        await patchJSON(`${API}/definition-forks/${forkId}`, {
          term,
          definition_variant: variant,
          description: descRaw || null,
        });
        await loadDefinitionForksForCurrentTopic();
        reopen(null);
      } catch (err) {
        alert('Speichern fehlgeschlagen: ' + err.message);
      }
    });

    form.querySelector('#fork-submit').addEventListener('click', async () => {
      const term = form.querySelector('#fork-term').value.trim();
      const variant = form.querySelector('#fork-variant').value.trim();
      const description = form.querySelector('#fork-desc').value.trim() || null;
      if (!term || !variant) {
        alert('Begriff und Lesart sind Pflichtfelder.');
        return;
      }
      try {
        await postJSON(`${API}/definition-forks/`, {
          argument_node_id: nodeId,
          term,
          definition_variant: variant,
          description,
        });
        await loadDefinitionForksForCurrentTopic();
        reopen();
      } catch (err) {
        alert('Speichern fehlgeschlagen: ' + err.message);
      }
    });
  }

  // ── Relayout for chrono mode ───────────────────

  function relayout() {
    if (!renderState || renderState.mode !== 'chrono') return;
    const { items, CX, topicBottom, CARD_W, V_PAD } = renderState;
    const canvas = document.getElementById('canvas');
    const svg = document.getElementById('zz-svg');
    const W = Math.max(canvas.clientWidth, 700);

    let currentY = topicBottom + V_PAD;

    items.forEach((item) => {
      const visibleH = item.el.getBoundingClientRect().height;
      item.el.style.top = currentY + 'px';
      item.y = currentY;
      item.topY = currentY;
      item.botY = currentY + visibleH;

      let blockHeight = visibleH;

      let sibCurY = currentY + visibleH + 24;
      item.siblings.forEach((sibItem) => {
        const sibH = sibItem.el.getBoundingClientRect().height;
        sibItem.el.style.top = sibCurY + 'px';
        sibItem.y = sibCurY;
        sibItem.topY = sibCurY;
        sibItem.botY = sibCurY + sibH;
        sibItem.height = sibH;
        sibCurY += sibH + 4;
      });

      if (item.siblings.length > 0) {
        blockHeight = sibCurY - 4 - currentY;
      }
      currentY += blockHeight + V_PAD;
    });

    const finalH = currentY + 80;
    canvas.style.minHeight = finalH + 'px';
    svg.setAttribute('height', finalH);
    svg.setAttribute('viewBox', `0 0 ${W} ${finalH}`);

    // Update SVG connections after repositioning
    updateDragLines();
  }

  // ── Polygon selection mode ──────────────────────
  function startPolygonSelection() {
    isSelectingPolygon = true;
    pendingPolygonSelection.clear();
    document.querySelectorAll('.zz-card').forEach(c => c.classList.add('polygon-selectable'));
    const toolbar = document.getElementById('polygon-select-toolbar');
    toolbar.classList.add('visible');
    updateSelectionToolbar();
    renderLegendPanel();
  }

  function toggleCardSelection(cardEl) {
    const stepId = parseInt(cardEl.dataset.stepId);
    if (!stepId) return;
    if (pendingPolygonSelection.has(stepId)) {
      pendingPolygonSelection.delete(stepId);
      cardEl.classList.remove('polygon-selected');
    } else {
      pendingPolygonSelection.add(stepId);
      cardEl.classList.add('polygon-selected');
    }
    updateSelectionToolbar();
  }

  function updateSelectionToolbar() {
    const count = pendingPolygonSelection.size;
    const countEl = document.getElementById('polygon-select-count');
    const createBtn = document.getElementById('polygon-btn-create');
    if (countEl) countEl.innerHTML = ` <strong>${count}</strong> Argument${count !== 1 ? 'e' : ''}`;
    if (createBtn) createBtn.disabled = count < 2;
  }

  function createCustomPolygonGroup() {
    if (pendingPolygonSelection.size < 2) return;
    const nameInput = document.getElementById('polygon-group-name');
    const name = nameInput?.value?.trim() || `Bereich ${nextCustomGroupId}`;
    const colorIdx = (activePolygonGroups.length) % POLYGON_COLORS.length;
    customPolygonGroups.push({
      key: `custom_${nextCustomGroupId}`,
      name,
      nodeIds: [...pendingPolygonSelection],
      color: POLYGON_COLORS[colorIdx],
    });
    nextCustomGroupId++;
    exitPolygonSelection();
    render();
  }

  function cancelPolygonSelection() {
    exitPolygonSelection();
  }

  function exitPolygonSelection() {
    isSelectingPolygon = false;
    pendingPolygonSelection.clear();
    document.querySelectorAll('.zz-card.polygon-selected').forEach(c => c.classList.remove('polygon-selected'));
    document.querySelectorAll('.zz-card.polygon-selectable').forEach(c => c.classList.remove('polygon-selectable'));
    const toolbar = document.getElementById('polygon-select-toolbar');
    if (toolbar) toolbar.classList.remove('visible');
    const nameInput = document.getElementById('polygon-group-name');
    if (nameInput) nameInput.value = '';
    renderLegendPanel();
  }

  // Wire up toolbar buttons
  document.getElementById('polygon-btn-create')?.addEventListener('click', createCustomPolygonGroup);
  document.getElementById('polygon-btn-cancel')?.addEventListener('click', cancelPolygonSelection);

  // ── Multi-Node-Pattern selection mode ───────────
  // Mirrors polygon selection but creates a persisted pattern via the API.
  function startPatternSelection() {
    if (isSelectingPolygon) exitPolygonSelection();
    isSelectingPattern = true;
    pendingPatternSelection.clear();
    document.querySelectorAll('.zz-card').forEach(c => c.classList.add('pattern-selectable'));
    const toolbar = document.getElementById('pattern-select-toolbar');
    toolbar.classList.add('visible');
    updatePatternToolbar();
    renderLegendPanel();
  }

  function togglePatternCardSelection(cardEl) {
    const stepId = parseInt(cardEl.dataset.stepId);
    if (!stepId) return;
    if (pendingPatternSelection.has(stepId)) {
      pendingPatternSelection.delete(stepId);
      cardEl.classList.remove('pattern-selected');
    } else {
      pendingPatternSelection.add(stepId);
      cardEl.classList.add('pattern-selected');
    }
    updatePatternToolbar();
  }

  function updatePatternToolbar() {
    const count = pendingPatternSelection.size;
    const countEl = document.getElementById('pattern-select-count');
    const createBtn = document.getElementById('pattern-btn-create');
    if (countEl) countEl.textContent = String(count);
    // A pattern needs at least one member (backend allows zero, but for UX
    // we require ≥1 so the user sees something on the canvas).
    if (createBtn) createBtn.disabled = count < 1;
  }

  async function submitPendingPattern() {
    if (pendingPatternSelection.size < 1) return;
    const nameInput = document.getElementById('pattern-name');
    const typeSel = document.getElementById('pattern-type-select');
    const name = (nameInput?.value || '').trim() || patternMeta(typeSel?.value || 'OTHER').label;
    const pattern_type = typeSel?.value || 'OTHER';
    const member_ids = [...pendingPatternSelection];
    try {
      const created = await createPattern({ name, pattern_type, member_ids });
      currentPatterns.push(created);
      exitPatternSelection();
      render();
    } catch (e) {
      alert('Muster konnte nicht gespeichert werden: ' + e.message);
    }
  }

  function exitPatternSelection() {
    isSelectingPattern = false;
    pendingPatternSelection.clear();
    document.querySelectorAll('.zz-card.pattern-selected').forEach(c => c.classList.remove('pattern-selected'));
    document.querySelectorAll('.zz-card.pattern-selectable').forEach(c => c.classList.remove('pattern-selectable'));
    const toolbar = document.getElementById('pattern-select-toolbar');
    if (toolbar) toolbar.classList.remove('visible');
    const nameInput = document.getElementById('pattern-name');
    if (nameInput) nameInput.value = '';
    renderLegendPanel();
  }

  document.getElementById('pattern-btn-create')?.addEventListener('click', submitPendingPattern);
  document.getElementById('pattern-btn-cancel')?.addEventListener('click', exitPatternSelection);

  // ── Drag system with live SVG line updates ──
  let dragInfo = null;

  function findItemByCard(card) {
    if (!renderState || renderState.mode !== 'chrono') return null;
    for (const item of renderState.items) {
      if (item.el === card) return { item, type: 'primary' };
      for (const sib of item.siblings) {
        if (sib.el === card) return { item, sibItem: sib, type: 'sibling' };
      }
    }
    return null;
  }

  function updateDragLines() {
    if (!renderState || renderState.mode !== 'chrono') return;
    const { items, CX, topicBottom, CARD_W, extraLines } = renderState;

    // Recalculate positions for ALL items (primary + siblings)
    items.forEach((item) => {
      const curLeft = parseFloat(item.el.style.left);
      const curTop = parseFloat(item.el.style.top);
      const curH = item.el.getBoundingClientRect().height;
      item.x = curLeft;
      item.y = curTop;
      item.topY = curTop;
      item.botY = curTop + curH;
      item.height = curH;
      item.edgeX = item.side === 'L' ? curLeft + CARD_W : curLeft;

      item.siblings.forEach((sibItem) => {
        const sibLeft = parseFloat(sibItem.el.style.left);
        const sibTop = parseFloat(sibItem.el.style.top);
        const sibH = sibItem.el.getBoundingClientRect().height;
        sibItem.x = sibLeft;
        sibItem.y = sibTop;
        sibItem.topY = sibTop;
        sibItem.botY = sibTop + sibH;
        sibItem.height = sibH;
        sibItem.edgeX = sibItem.side === 'L' ? sibLeft + CARD_W : sibLeft;
      });
    });

    // Update main lines (primary → srcItem or Topic)
    items.forEach((item) => {
      const srcItem = item.srcItem;
      const fromX = srcItem ? srcItem.edgeX : CX;
      const fromY = srcItem ? (srcItem.botY - 4) : topicBottom;
      const toX = item.edgeX;
      const toY = item.topY + 8;

      if (item.mainLine) {
        item.mainLine.setAttribute('x1', fromX);
        item.mainLine.setAttribute('y1', fromY);
        item.mainLine.setAttribute('x2', toX);
        item.mainLine.setAttribute('y2', toY);
      }

      if (item.markerEl) {
        item.markerEl.style.left = ((fromX + toX) / 2) + 'px';
        item.markerEl.style.top = ((fromY + toY) / 2) + 'px';
      }

      // Update sibling lines — dock at card bottom (Ursprungs-Argument connections)
      if (item.siblings.length > 0) {
        const dockX = item.edgeX;
        const dockY = (currentStage === 2) ? item.botY + 2 : item.botY;

        item.siblings.forEach((sibItem) => {
          if (!sibItem.line) return;
          if (currentStage === 4) {
            // Stage-4 siblings render a straight line from their parent (not
            // from the primary's dock point) — keep it in sync during drag.
            const parentItem = sibItem.parentItemRef || null;
            const sFromX = parentItem ? parentItem.edgeX : CX;
            const sFromY = parentItem ? (parentItem.botY - 4) : renderState.topicBottom;
            const sToX = sibItem.edgeX;
            const sToY = sibItem.topY + 8;
            sibItem.line.setAttribute('x1', sFromX);
            sibItem.line.setAttribute('y1', sFromY);
            sibItem.line.setAttribute('x2', sToX);
            sibItem.line.setAttribute('y2', sToY);
          } else {
            const sibToX = sibItem.edgeX;
            const sibToY = sibItem.topY + 8;
            const cx1 = dockX, cy1 = (dockY + sibToY) / 2;
            const cx2 = sibToX, cy2 = (dockY + sibToY) / 2;
            sibItem.line.setAttribute('d', `M${dockX},${dockY} C${cx1},${cy1} ${cx2},${cy2} ${sibToX},${sibToY}`);
          }
        });
      }
    });

    // Update semantic extra lines (stage 2/3)
    if (extraLines && extraLines.length > 0) {
      extraLines.forEach(conn => {
        const src = conn.srcItem;
        const tgt = conn.tgtItem;
        if (!tgt) return;

        if (conn.type === 'chrono') {
          setCurvedFlowPath(
            conn.el,
            getCenterAnchor(src, CARD_W, CX, topicBottom),
            getCenterAnchor(tgt, CARD_W, CX, topicBottom),
          );
        } else if (conn.type === 'split' || conn.type === 'logical') {
          setStraightLine(
            conn.el,
            getLogicalSourceAnchor(src, CX, topicBottom),
            getLogicalTargetAnchor(tgt),
          );
        }
      });
    }

    // Update polygon overlays during drag
    const { polygonState, patternState, allItemById: aidMap } = renderState;
    if (polygonState && polygonState.length > 0 && aidMap) {
      polygonState.forEach(pg => {
        const gItems = pg.nodeIds.map(id => aidMap[id]).filter(Boolean);
        if (gItems.length < 2) return;
        const hull = computePaddedHull(gItems, CARD_W, 18);
        if (hull.length < 3) return;
        pg.el.setAttribute('d', smoothHullPath(hull));
      });
    }
    // Update multi-node pattern overlays during drag (wider padding, smaller r)
    if (patternState && patternState.length > 0 && aidMap) {
      patternState.forEach(p => {
        const pItems = p.nodeIds.map(id => aidMap[id]).filter(Boolean);
        if (pItems.length === 0) return;
        const hull = computePaddedHull(pItems, CARD_W, 28);
        if (hull.length < 3) return;
        p.el.setAttribute('d', smoothHullPath(hull, 18));
      });
    }
  }

  if (DRAG_ENABLED) {
    document.getElementById('canvas').addEventListener('mousedown', (e) => {
      const card = e.target.closest('.zz-card');
      if (!card || e.target.closest('.inline-form')) return;

      // Polygon selection mode: toggle card instead of drag
      if (isSelectingPolygon) {
        if (e.target.closest('button') || e.target.closest('.collapse-toggle')) return;
        e.preventDefault();
        toggleCardSelection(card);
        return;
      }

      // Pattern selection mode: toggle card for persistent multi-node pattern
      if (isSelectingPattern) {
        if (e.target.closest('button') || e.target.closest('.collapse-toggle')) return;
        e.preventDefault();
        togglePatternCardSelection(card);
        return;
      }

      // Drag only when grabbing the dedicated handle — keeps the card body
      // text-selectable so users can copy quotes.
      const handle = e.target.closest('.card-drag-handle');
      if (!handle) return;

      dragInfo = {
        card,
        startX: e.clientX, startY: e.clientY,
        origX: parseFloat(card.style.left), origY: parseFloat(card.style.top),
        moved: false,
      };
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragInfo) return;
      const dx = e.clientX - dragInfo.startX;
      const dy = e.clientY - dragInfo.startY;
      if (!dragInfo.moved && Math.abs(dx) < 3 && Math.abs(dy) < 3) return;
      if (!dragInfo.moved) { dragInfo.moved = true; dragInfo.card.classList.add('dragging'); }
      dragInfo.card.style.left = (dragInfo.origX + dx) + 'px';
      dragInfo.card.style.top = (dragInfo.origY + dy) + 'px';
      updateDragLines();
    });

    document.addEventListener('mouseup', () => {
      if (dragInfo) {
        dragInfo.card.classList.remove('dragging');
        updateDragLines();
        dragInfo = null;
      }
    });
  }

  // ── Init ───────────────────────────────────────
  (async () => {
    updateStageDescription();
    renderLegendPanel();
    await loadUsers();
    await loadTopics();
  })();

  window.addEventListener('resize', () => render());
</script>
