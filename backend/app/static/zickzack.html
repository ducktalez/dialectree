<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ Dialectree – Zickzack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; }

    header {
      background: #161b22; color: #e6edf3; padding: 10px 20px;
      display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid #30363d;
    }
    header h1 { font-size: 1.05rem; margin: 0; white-space: nowrap; }
    header nav { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    header a {
      color: #58a6ff; font-size: 0.72rem; text-decoration: none;
      padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,.15);
    }
    header a:hover { background: rgba(255,255,255,.08); }
    header a.active { background: rgba(88,166,255,.18); color: #e6edf3; border-color: #58a6ff; }
    header .user-selector { margin-left: auto; }

    .page { margin: 0 auto; padding: 12px 16px; }

    .topic-tabs { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .topic-tab {
      padding: 5px 14px; border-radius: 16px; border: 2px solid #30363d;
      background: #1c2128; color: #c9d1d9; cursor: pointer; font-size: 0.82rem; transition: all .15s;
    }
    .topic-tab:hover { border-color: #58a6ff; }
    .topic-tab.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }

    /* ── Mode toggle ── */
    .mode-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
    .mode-btn {
      padding: 4px 12px; border-radius: 12px; border: 1px solid #30363d;
      background: #1c2128; color: #8b949e; cursor: pointer; font-size: 0.78rem; transition: all .15s;
    }
    .mode-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
    .mode-btn.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }

    /* ── Canvas ── */
    .zz-canvas {
      position: relative;
      width: 100%; background: #0d1117;
      overflow: visible;
    }
    .zz-canvas svg {
      display: block; width: 100%;
      pointer-events: none;
    }

    /* ── Edge marker ── */
    .edge-marker {
      position: absolute; transform: translate(-50%, -50%);
      z-index: 3;
      display: flex; flex-direction: column; align-items: center;
      gap: 1px; cursor: pointer; user-select: none;
      transition: transform .15s;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,.4));
    }
    .edge-marker:hover { transform: translate(-50%, -50%) scale(1.2); }
    .edge-marker-emoji { font-size: 14px; line-height: 1; }
    .edge-marker-label {
      font-size: 0.52rem; font-weight: 600; color: #8b949e;
      background: rgba(22,27,34,0.92); border-radius: 3px; padding: 0 3px;
      white-space: nowrap; line-height: 1.4;
      cursor: pointer; border: 1px solid #30363d;
    }
    .edge-marker-label:hover { color: #58a6ff; }
    .edge-marker-plus { font-size: 0.5rem; color: #484f58; line-height: 1; }
    .edge-marker.collapsed .edge-marker-label { display: none; }
    .edge-marker:not(.collapsed) .edge-marker-plus { display: none; }

    /* ── Argument cards ── */
    .zz-card {
      position: absolute; z-index: 2;
      background: #1c2128; border: 1.5px solid #30363d; border-radius: 7px;
      padding: 7px 10px; width: 220px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      line-height: 1.3; user-select: none; cursor: grab;
    }
    .zz-card.dragging { cursor: grabbing; z-index: 10; box-shadow: 0 4px 16px rgba(0,0,0,.4); opacity: 0.9; transition: none; }
    .zz-card.L { border-right: 4px solid #3fb950; }
    .zz-card.R { border-left: 4px solid #f85149; }

    /* ── DESIGN: Stage-1 raw transcript style ──
       Stage 1 cards look like raw data / notepad — colorless, monospace,
       no position coloring. Clearly distinguishable from refined Stage-2 cards.
       See implementation-plan.md § Phase Z. -->  */
    .zz-card.stage-raw {
      background: #161b22;
      border: 1px dashed #30363d;
      border-left: none; border-right: none;
      font-family: 'Courier New', Courier, monospace;
      box-shadow: none;
      opacity: 0.92;
    }
    .zz-card.stage-raw.L { border-right: none; }
    .zz-card.stage-raw.R { border-left: none; }
    .zz-card.stage-raw .card-text {
      color: #8b949e; font-size: 0.74rem;
    }
    .zz-card .card-header { display: flex; align-items: flex-start; gap: 4px; }
    .zz-card .card-title { font-size: 0.78rem; font-weight: 600; color: #e6edf3; flex: 1; }
    .zz-card .card-body  { font-size: 0.64rem; color: #8b949e; margin-top: 2px; }
    /* Stage 1: single merged text block */
    .zz-card .card-text  { font-size: 0.75rem; color: #e6edf3; line-height: 1.45; }
    .zz-card .card-zone  {
      display: inline-block; margin-top: 3px; padding: 0 5px; border-radius: 6px;
      font-size: 0.58rem; font-weight: 600;
    }
    .zz-card .card-alts {
      margin-top: 3px; font-size: 0.56rem; color: #484f58; font-style: italic;
    }

    /* ── Card action buttons ── */
    .card-actions {
      display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap;
    }
    .card-actions button {
      padding: 2px 6px; border-radius: 6px; border: 1px solid #30363d;
      background: #161b22; color: #8b949e; cursor: pointer; font-size: 0.6rem;
      transition: all .1s;
    }
    .card-actions button:hover { border-color: #58a6ff; color: #e6edf3; }
    .card-actions .vote-score { font-size: 0.6rem; color: #58a6ff; font-weight: 600; margin: 0 2px; align-self: center; }

    /* ── Collapse toggle ── */
    .collapse-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; min-width: 18px;
      font-size: 0.65rem; color: #484f58;
      cursor: pointer; user-select: none;
      transition: transform .15s, color .15s, background .1s;
      flex-shrink: 0; border-radius: 4px;
    }
    .collapse-toggle:hover { color: #e6edf3; background: rgba(255,255,255,.08); }
    .zz-card:not(.collapsed) .collapse-toggle { transform: rotate(90deg); }
    .zz-card.collapsed { padding: 4px 8px; }
    .zz-card.collapsed .card-content { display: none; }
    .zz-card.collapsed .card-title { font-size: 0.7rem; }

    /* ── Smooth relayout transition ── */
    .zz-card, .zz-deadend, .zz-card.edge-attack { transition: top 0.3s ease; }
    .zz-card.dragging { transition: none; }

    .inactive-label { display: block; font-size: 0.56rem; color: #484f58; font-style: italic; margin-top: 3px; }

    /* ── Edge attack card ── */
    .zz-card.edge-attack {
      width: 180px; padding: 4px 8px;
      border: 1.5px dashed #f85149; background: #1a0d0d;
    }
    .zz-card.edge-attack .card-title { font-size: 0.7rem; }
    .zz-card.edge-attack .card-body  { font-size: 0.58rem; }

    /* ── New conflict badge ── */
    .new-conflict {
      display: inline-block; margin-top: 2px; padding: 0 5px; border-radius: 8px;
      font-size: 0.52rem; font-weight: 600;
      background: #0d2240; color: #58a6ff; white-space: nowrap;
    }

    /* ── Topic pill ── */
    .zz-topic {
      position: absolute; transform: translate(-50%, -50%); z-index: 2;
      background: #1f6feb; color: #fff; border-radius: 14px; padding: 7px 18px;
      font-size: 0.88rem; font-weight: 600; text-align: center;
      box-shadow: 0 3px 12px rgba(31,111,235,.3);
    }

    /* ── Dead end pill ── */
    .zz-deadend {
      position: absolute; transform: translate(-50%, -50%); z-index: 2;
      background: #1c2128; border-radius: 12px; padding: 8px 16px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.3); font-size: 0.78rem; color: #c9d1d9;
      border: 1px solid #30363d;
    }
    .zz-deadend .de-icon  { font-size: 1.2rem; }
    .zz-deadend .de-label { font-weight: 600; font-size: 0.8rem; }
    .zz-deadend .de-desc  { font-size: 0.64rem; color: #8b949e; margin-top: 2px; }

    /* ── Side labels ── */
    .zz-side-label {
      position: absolute; z-index: 1;
      font-size: 0.7rem; font-weight: 600; opacity: 0.35;
    }

    /* ── Inline form ── */
    .inline-form {
      position: absolute; z-index: 20;
      background: #1c2128; border: 2px solid #58a6ff; border-radius: 8px;
      padding: 10px; width: 280px; box-shadow: 0 4px 16px rgba(0,0,0,.5);
    }
    .inline-form h4 { font-size: 0.82rem; color: #e6edf3; margin-bottom: 6px; }
    .inline-form label { display: block; font-size: 0.64rem; color: #8b949e; margin-top: 4px; }
    .inline-form input, .inline-form select, .inline-form textarea {
      width: 100%; padding: 4px 6px; border-radius: 4px; border: 1px solid #30363d;
      background: #0d1117; color: #c9d1d9; font-size: 0.72rem; margin-top: 2px;
    }
    .inline-form textarea { height: 48px; resize: vertical; }
    .inline-form .form-row { display: flex; gap: 6px; }
    .inline-form .form-row > * { flex: 1; }
    .inline-form .form-actions { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
    .inline-form .form-actions button {
      padding: 4px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.72rem;
    }
    .inline-form .btn-submit { background: #1f6feb; color: #fff; }
    .inline-form .btn-submit:hover { background: #388bfd; }
    .inline-form .btn-cancel { background: #30363d; color: #c9d1d9; }
    .inline-form .btn-cancel:hover { background: #484f58; }

    /* ── Stage selector ── */
    .stage-selector { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
    .stage-label { font-size: 0.7rem; color: #484f58; margin-right: 4px; }
    .stage-btn {
      padding: 3px 10px; border-radius: 12px; border: 1px solid #30363d;
      background: #1c2128; color: #8b949e; cursor: pointer; font-size: 0.75rem; transition: all .15s;
    }
    .stage-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
    .stage-btn.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
    .stage-btn.deferred { opacity: 0.5; cursor: not-allowed; }
    .stage-btn.deferred:hover { border-color: #30363d; color: #8b949e; }

    /* ── Stage description banner ── */
    .stage-description {
      font-size: 0.75rem; color: #8b949e; margin-bottom: 8px; padding: 6px 12px;
      background: #1c2128; border-radius: 6px; border: 1px solid #30363d;
      line-height: 1.5;
    }
    .stage-description:empty { display: none; }
    .stage-description strong { color: #c9d1d9; }

    .stage-topbar { margin-bottom: 8px; }
    .stage-topbar .stage-description { margin-bottom: 0; }
      .zz-frame {
        position: relative;
        background: #0d1117;
        border-radius: 10px;
        border: 1px solid #30363d;
        overflow: hidden;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .legend-panel {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(22, 27, 34, 0.92);
        border: 1px solid #30363d;
        border-radius: 5px;
        padding: 4px 8px;
        font-size: 0.62rem;
        color: #8b949e;
        max-width: 280px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      }
    .legend-panel.hidden { display: none; }
    .legend-title { font-size: 0.62rem; font-weight: 600; color: #c9d1d9; margin-bottom: 3px; }
    .legend-divider { font-size: 0.55rem; font-weight: 600; color: #484f58; margin-top: 5px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .legend-list { display: flex; flex-direction: column; gap: 2px; }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      padding: 1px 3px; border-radius: 3px; border: 1px solid rgba(255,255,255,.04);
      transition: all .12s;
    }
    .legend-item.inactive { opacity: 0.45; }
    .legend-item.toggleable {
      cursor: pointer; background: #161b22; border-color: #30363d; transition: all .12s;
    }
    .legend-item.toggleable:hover { border-color: #58a6ff; color: #c9d1d9; }
    .legend-item.toggleable.off { opacity: 0.6; border-color: #30363d; color: #484f58; }
    .legend-item.toggleable.off .legend-line { border-top-color: #484f58; }
    .legend-item-main { flex: 1; display: flex; align-items: baseline; gap: 4px; min-width: 0; }
    .legend-item-label { font-weight: 600; color: #c9d1d9; white-space: nowrap; flex-shrink: 0; }
    .legend-item-desc { display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #8b949e; flex: 1; min-width: 0; }
    .legend-toggle-label { font-size: 0.55rem; color: #8b949e; white-space: nowrap; flex-shrink: 0; }
    .legend-line {
      width: 20px; height: 0; border-top: 2px solid #8b949e; flex-shrink: 0;
    }
    .legend-line.raw { border-top-width: 4px; border-top-color: rgba(88,166,255,0.35); }
    .legend-line.origin { border-top: 2px dashed #8b949e; }
    .legend-line.chrono { border-top: 2px dashed #1f6feb; }
    .legend-line.logical {
      border: none;
      height: 2px;
      background: linear-gradient(to right, #3fb950 0%, #3fb950 50%, #f85149 50%, #f85149 100%);
    }
    .legend-swatch {
      width: 14px; height: 10px; border-radius: 3px; flex-shrink: 0;
      opacity: 0.5; border: 1px solid rgba(255,255,255,0.15);
    }

    /* ── Polygon group items in legend ── */
    .legend-group-item {
      display: flex; align-items: center; gap: 5px;
      padding: 2px 4px; border-radius: 3px;
      cursor: pointer; transition: all .12s;
    }
    .legend-group-item:hover { background: rgba(255,255,255,.06); }
    .legend-group-item.off .legend-swatch { opacity: 0.2; }
    .legend-group-item.off .legend-group-name { opacity: 0.4; text-decoration: line-through; }
    .legend-group-name {
      font-size: 0.55rem; color: #c9d1d9; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .legend-group-delete {
      font-size: 0.6rem; color: #484f58; cursor: pointer; padding: 0 2px;
      line-height: 1; flex-shrink: 0;
    }
    .legend-group-delete:hover { color: #f85149; }
    .legend-add-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px; border-radius: 4px; border: 1px dashed #30363d;
      background: transparent; color: #8b949e; cursor: pointer;
      font-size: 0.55rem; transition: all .12s; margin-top: 2px;
    }
    .legend-add-btn:hover { border-color: #58a6ff; color: #c9d1d9; }

    /* ── Polygon selection mode ── */
    .zz-card.polygon-selectable { cursor: crosshair !important; }
    .zz-card.polygon-selectable:hover { box-shadow: 0 0 0 2px rgba(88,166,255,0.35) !important; }
    .zz-card.polygon-selected { box-shadow: 0 0 0 3px #58a6ff !important; }
    .polygon-select-toolbar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1c2128; border: 2px solid #58a6ff; border-radius: 10px;
      padding: 8px 16px; display: none; align-items: center; gap: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5); z-index: 100;
      font-size: 0.75rem; color: #c9d1d9;
    }
    .polygon-select-toolbar.visible { display: flex; }
    .polygon-select-toolbar button {
      padding: 4px 12px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 0.72rem;
    }
    .polygon-select-toolbar .btn-create { background: #1f6feb; color: #fff; }
    .polygon-select-toolbar .btn-create:hover { background: #388bfd; }
    .polygon-select-toolbar .btn-create:disabled { opacity: 0.4; cursor: not-allowed; }
    .polygon-select-toolbar .btn-cancel { background: #30363d; color: #c9d1d9; }
    .polygon-select-toolbar .btn-cancel:hover { background: #484f58; }
    .polygon-select-toolbar input {
      padding: 3px 8px; border-radius: 4px; border: 1px solid #30363d;
      background: #0d1117; color: #c9d1d9; font-size: 0.72rem; width: 130px;
    }

    /* ── Transcript viewer / editor (Stage 0) ── */
    .transcript-edit {
      width: 100%; min-height: 420px; resize: vertical;
      font-family: 'Courier New', monospace; font-size: 0.72rem;
      line-height: 1.6; color: #c9d1d9; background: #161b22;
      border: 1px solid #30363d; border-radius: 8px;
      padding: 16px 20px; box-sizing: border-box;
      white-space: pre; overflow-x: auto;
    }
    .transcript-edit:focus { outline: none; border-color: #58a6ff; }
    .transcript-actions {
      display: flex; align-items: center; gap: 8px; margin-top: 6px;
    }
    .transcript-actions button {
      padding: 5px 14px; border-radius: 6px; border: none;
      background: #1f6feb; color: #fff; cursor: pointer; font-size: 0.78rem;
    }
    .transcript-actions button:hover { background: #388bfd; }
    .transcript-actions button.btn-secondary {
      background: #30363d; color: #c9d1d9;
    }
    .transcript-actions button.btn-secondary:hover { background: #484f58; }
    .save-status { font-size: 0.72rem; color: #8b949e; }

    /* ── SRT Import Modal ── */
    .srt-modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .srt-modal {
      background: #161b22; border: 1px solid #30363d; border-radius: 10px;
      padding: 20px 24px; width: 560px; max-width: 92vw; max-height: 85vh;
      overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .srt-modal h3 { font-size: 0.95rem; color: #e6edf3; margin-bottom: 12px; }
    .srt-modal label { display: block; font-size: 0.72rem; color: #8b949e; margin: 8px 0 3px; }
    .srt-modal textarea {
      width: 100%; min-height: 180px; resize: vertical;
      font-family: 'Courier New', monospace; font-size: 0.68rem; line-height: 1.5;
      color: #c9d1d9; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      padding: 10px 12px; box-sizing: border-box;
    }
    .srt-modal textarea:focus { outline: none; border-color: #58a6ff; }
    .srt-modal input[type="text"] {
      width: 100%; padding: 5px 10px; border-radius: 6px;
      border: 1px solid #30363d; background: #0d1117; color: #c9d1d9;
      font-size: 0.72rem; box-sizing: border-box;
    }
    .srt-modal input[type="text"]:focus { outline: none; border-color: #58a6ff; }
    .srt-modal-actions {
      display: flex; gap: 8px; margin-top: 14px; align-items: center;
    }
    .srt-modal-actions button {
      padding: 5px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.78rem;
    }
    .srt-modal-actions .btn-import { background: #1f6feb; color: #fff; }
    .srt-modal-actions .btn-import:hover { background: #388bfd; }
    .srt-modal-actions .btn-import:disabled { opacity: 0.4; cursor: not-allowed; }
    .srt-modal-actions .btn-close { background: #30363d; color: #c9d1d9; }
    .srt-modal-actions .btn-close:hover { background: #484f58; }
    .srt-modal-status { font-size: 0.72rem; color: #8b949e; margin-left: 8px; }

    .transcript-info {
      font-size: 0.75rem; color: #8b949e; margin-bottom: 8px; padding: 6px 10px;
      background: #1c2128; border-radius: 6px; border: 1px solid #30363d;
    }
    .stage-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 20px; text-align: center; color: #8b949e;
      border: 1px dashed #30363d; border-radius: 10px; min-height: 200px;
    }
    .stage-placeholder .ph-icon { font-size: 2rem; margin-bottom: 8px; }
    .stage-placeholder .ph-title { font-size: 0.95rem; font-weight: 600; color: #c9d1d9; margin-bottom: 4px; }
    .stage-placeholder .ph-desc { font-size: 0.78rem; max-width: 400px; line-height: 1.5; }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 40px; color: #8b949e; font-size: 0.9rem; }
    .error { text-align: center; padding: 20px; color: #f85149; font-size: 0.85rem; }

    /* ── User selector ── */
    .user-selector {
      display: flex; align-items: center; gap: 6px; font-size: 0.72rem;
    }
    .user-selector select {
      padding: 2px 6px; border-radius: 6px; border: 1px solid #30363d;
      background: #0d1117; color: #c9d1d9; font-size: 0.72rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ Zickzack-Dialog</h1>
    <nav>
      <a href="/" class="active">⚡ Zickzack</a>
      <a href="/baum"> Baum</a>
      <a href="/entscheidung">⚖️ Waage</a>
      <a href="/dialog"> Dialog</a>
      <a href="/konflikt"> Konflikt</a>
      <a href="/quellen"> Quellen</a>
    </nav>
    <div class="user-selector">
      <label for="user-select"></label>
      <select id="user-select"><option value="1">alice</option></select>
    </div>
  </header>

<div class="page">
  <div class="topic-tabs" id="tabs"></div>
  <div class="stage-selector" id="stage-selector">
    <span class="stage-label">Stufe:</span>
    <button class="stage-btn" data-stage="0"> Transkript</button>
    <button class="stage-btn active" data-stage="1">1️⃣ Basis</button>
    <button class="stage-btn" data-stage="2">2️⃣ Split-Prozess</button>
    <button class="stage-btn" data-stage="3">3️⃣ Verfeinerung</button>
    <button class="stage-btn deferred" data-stage="4" title="Noch nicht implementiert">4️⃣ Einordnung</button>
    <button class="stage-btn deferred" data-stage="5" title="Noch nicht implementiert">5️⃣ Meta</button>
    <button class="stage-btn deferred" data-stage="6" title="Noch nicht spezifiziert">6️⃣ Netz</button>
  </div>
  <!-- DESIGN: Stage description shows what THIS stage adds vs the previous one -->
  <div class="stage-topbar">
    <div class="stage-description" id="stage-description"></div>
  </div>
  <div class="mode-toggle" id="mode-toggle" style="display:none">
    <button class="mode-btn active" data-mode="chrono"> Chronologisch</button>
    <!-- TODO: post-dev – re-enable when fan layout is ready
    <button class="mode-btn" data-mode="fan"> Fächer</button>
    -->
  </div>
  <div id="stage-content">
    <div class="zz-frame">
      <div class="zz-canvas" id="canvas">
        <svg id="zz-svg"></svg>
      </div>
      <div class="legend-panel hidden" id="legend-panel"></div>
    </div>
  </div>
</div>

<!-- Polygon selection toolbar (fixed at bottom during selection mode) -->
<div class="polygon-select-toolbar" id="polygon-select-toolbar">
  <span id="polygon-select-count"> <strong>0</strong> Argumente</span>
  <input type="text" id="polygon-group-name" placeholder="Bereichsname…" />
  <button class="btn-create" id="polygon-btn-create" disabled>✓ Erstellen</button>
  <button class="btn-cancel" id="polygon-btn-cancel">✗ Abbrechen</button>
</div>

<script>
  // ── Constants ──────────────────────────────────
  const API = '/api';
  const DRAG_ENABLED = true;

  const EDGE_TYPES = {
    COMMUNITY_NOTE: { emoji:'', label:'Unwahr!' },
    CONSEQUENCES:   { emoji:'⚠️', label:'Folgen' },
    WEAKENING:      { emoji:'', label:'Schwach' },
    REFRAME:        { emoji:'', label:'Reframing' },
    CONCESSION:     { emoji:'', label:'Konsens' },
  };

  const ZONE_COLORS = { FACT:'#58a6ff', CAUSAL:'#d29922', VALUE:'#a371f7' };
  const ZONE_BG     = { FACT:'#0d2240', CAUSAL:'#2d1e00', VALUE:'#1e0d3e' };
  const ZONE_LABEL  = { FACT:'Fakten', CAUSAL:'Kausalität', VALUE:'Werte' };
  const PRO_C = '#3fb950', CON_C = '#f85149';

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── State ──────────────────────────────────────
  let currentTopicId = null;
  let currentMode = 'chrono';
  let currentStage = 1;
  // Z.2b — Split-Toggle: in Stage 3, IDs of split-origin nodes the user has
  // chosen to reveal. While an origin is revealed, its splits are hidden, so
  // the "never show original + splits simultaneously" rule still holds.
  let revealedSplitOrigins = new Set();

  // ── URL deep-linking (hash-based) ──────────────
  // The page state (selected topic + stage) is reflected in location.hash so that
  // reload and back/forward restore the view. Format: #topic=<id>&stage=<n>
  // Hash is used (not query string) to avoid round-trips to the server.
  let _suppressHashHandler = false;
  function parseHash() {
    const h = (location.hash || '').replace(/^#/, '');
    const out = {};
    h.split('&').filter(Boolean).forEach(p => {
      const [k, v] = p.split('=');
      if (k) out[decodeURIComponent(k)] = decodeURIComponent(v ?? '');
    });
    return out;
  }
  function updateHash() {
    const parts = [];
    if (currentTopicId != null) parts.push(`topic=${currentTopicId}`);
    parts.push(`stage=${currentStage}`);
    const newHash = '#' + parts.join('&');
    if (location.hash !== newHash) {
      _suppressHashHandler = true;
      history.replaceState(null, '', newHash);
      // Microtask reset so genuine user-driven hashchange events still fire.
      setTimeout(() => { _suppressHashHandler = false; }, 0);
    }
  }
  let currentData = null;
  let renderState = null;
  let showBlueChronoFlow = true;
  let showOriginLines = true;

  // ── Polygon group state ──
  let customPolygonGroups = [];     // User-created groups: { key, name, nodeIds, color }
  let polygonGroupVisibility = {};  // groupKey → boolean (default true)
  let activePolygonGroups = [];     // All groups (auto + custom) from last render
  let isSelectingPolygon = false;
  let pendingPolygonSelection = new Set();
  let nextCustomGroupId = 1;

  const POLYGON_COLORS = ['#58a6ff', '#d29922', '#a371f7', '#3fb950', '#f0883e'];

  // ── Stage descriptions: what THIS stage adds vs the previous ──
  const STAGE_DESCRIPTIONS = {
    0: '<strong>Rohdaten</strong> — Die Diskussion als lesbarer Text. Kein Canvas, keine Visualisierung.',
    1: '<strong>Basiszuordnung</strong> — Jedes Argument chronologisch einer Seite zugeordnet. Einfacher Zickzack zwischen PRO und CONTRA.',
    2: '<strong>2️⃣ Split-Prozess</strong> — Arbeitsschritt: Originale offen im Rohformat. Split-Karten zeigen nur ihre Titel; Inhalte folgen erst in Stufe 3.',
    3: '<strong>Verfeinerung</strong> — Nur Split-Argumente sichtbar. Gesplittete Originale verschwinden; die Split-Inhalte werden jetzt sichtbar.',
    4: '<strong>+ Einordnung</strong> — Bewertungen, Labels, Kommentare auf Argumente. <em>[Noch nicht implementiert]</em>',
    5: '<strong>+ Meta</strong> — Argumentgruppen, Klassifizierung als Quelle / Grundannahme. <em>[Noch nicht implementiert]</em>',
    6: '<strong>+ Netz</strong> — Einordnung in allgemeines Diskussionsnetz. <em>[Geplant — separate Spezifikation]</em>',
  };

  function updateStageDescription() {
    document.getElementById('stage-description').innerHTML = STAGE_DESCRIPTIONS[currentStage] || '';
  }

  function renderLegendPanel() {
    const panel = document.getElementById('legend-panel');
    if (!panel) return;

    const visible = currentStage === 2 || currentStage === 3;
    panel.classList.toggle('hidden', !visible);
    if (!visible) {
      panel.innerHTML = '';
      return;
    }

      // ── Connection types (non-toggleable) ──
      const connItems = [
        { label: 'Roh-Kette', desc: 'Ursprüngliche Reihenfolge', active: currentStage === 2, lineClass: 'raw' },
        { label: 'Logische Referenz', desc: 'Inhaltliche Antwort', active: true, lineClass: 'logical' },
      ];

      // ── Polygon groups (individual toggles) ──
      const groupsHtml = activePolygonGroups.map(g => {
        const isOff = polygonGroupVisibility[g.key] === false;
        const deleteBtn = !g.isAuto
          ? `<span class="legend-group-delete" data-delete-group="${g.key}" title="Löschen">✕</span>`
          : '';
        return `
          <div class="legend-group-item ${isOff ? 'off' : ''}" data-toggle-group="${g.key}">
            <span class="legend-swatch" style="background:${g.color}"></span>
            <span class="legend-group-name" title="${esc(g.name)}">${esc(g.name)}</span>
            ${deleteBtn}
          </div>`;
      }).join('');

      const addBtnHtml = isSelectingPolygon
        ? `<span style="font-size:0.55rem;color:#58a6ff;font-style:italic">Argumente wählen…</span>`
        : `<button class="legend-add-btn" id="legend-add-polygon">＋ Neuer Bereich</button>`;

      // ── Toggleable connections ──
      const toggleItems = [
        { key: 'origin', label: 'Ursprungs-Argument', desc: 'Gehört zu Original', active: currentStage === 2, lineClass: 'origin' },
        { key: 'chrono', label: 'Chronologischer Fluss', desc: 'Ablauf', active: true, lineClass: 'chrono' },
      ];

      panel.innerHTML = `
        <div class="legend-title">Verbindungen</div>
        <div class="legend-list">
          ${connItems.filter(i => i.active).map(item => `
            <div style="cursor:default" class="legend-item">
              <span class="legend-line ${item.lineClass}"></span>
              <div class="legend-item-main">
                <span class="legend-item-label">${item.label}</span>
                <span class="legend-item-desc">- ${item.desc}</span>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="legend-divider">Bereiche</div>
        <div class="legend-list">
          ${groupsHtml || '<span style="font-size:0.52rem;color:#484f58;font-style:italic">Keine Bereiche</span>'}
          ${addBtnHtml}
        </div>
        <div class="legend-divider">Abwählbar</div>
        <div class="legend-list">
          ${toggleItems.filter(i => i.active).map(item => {
            const isOff = (item.key === 'chrono' && !showBlueChronoFlow) || (item.key === 'origin' && !showOriginLines);
            return `
            <div style="cursor:pointer" class="legend-item toggleable ${isOff ? 'off' : ''}" data-legend-toggle="${item.key}">
              <span class="legend-line ${item.lineClass}"></span>
              <div class="legend-item-main">
                <span class="legend-item-label">${item.label}</span>
                <span class="legend-item-desc">- ${item.desc}</span>
              </div>
            </div>`;
          }).join('')}
        </div>`;

    // ── Event: toggle connection types ──
    panel.querySelector('[data-legend-toggle="chrono"]')?.addEventListener('click', () => {
      showBlueChronoFlow = !showBlueChronoFlow;
      renderLegendPanel();
      if (currentData && currentStage > 0 && currentStage < 4) render();
    });

    panel.querySelector('[data-legend-toggle="origin"]')?.addEventListener('click', () => {
      showOriginLines = !showOriginLines;
      renderLegendPanel();
      if (currentData && currentStage > 0 && currentStage < 4) render();
    });

    // ── Event: toggle individual polygon groups ──
    panel.querySelectorAll('[data-toggle-group]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.legend-group-delete')) return; // don't toggle on delete click
        const key = el.dataset.toggleGroup;
        polygonGroupVisibility[key] = !(polygonGroupVisibility[key] ?? true);
        if (currentData && currentStage > 0 && currentStage < 4) render();
      });
    });

    // ── Event: delete custom polygon group ──
    panel.querySelectorAll('[data-delete-group]').forEach(el => {
      el.addEventListener('click', () => {
        const key = el.dataset.deleteGroup;
        customPolygonGroups = customPolygonGroups.filter(g => g.key !== key);
        delete polygonGroupVisibility[key];
        if (currentData && currentStage > 0 && currentStage < 4) render();
      });
    });

    // ── Event: start polygon selection ──
    panel.querySelector('#legend-add-polygon')?.addEventListener('click', () => {
      startPolygonSelection();
    });
  }

  function getUserId() {
    return parseInt(document.getElementById('user-select').value) || 1;
  }

  // ── API Helpers ────────────────────────────────
  async function fetchJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  }

  async function postJSON(url, body) {
    const r = await fetch(url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    if (!r.ok) {
      const txt = await r.text();
      throw new Error(`${r.status}: ${txt}`);
    }
    return r.json();
  }

  async function putJSON(url, body) {
    const r = await fetch(url, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    if (!r.ok) {
      const txt = await r.text();
      throw new Error(`${r.status}: ${txt}`);
    }
    return r.json();
  }

  // ── Load stage 0: editable transcript ─────────
  // Always shows a textarea — empty if no transcript, filled if one exists.
  // User can edit and save; future: generate stages 1-2 from this text.
  async function loadTranscript() {
    const content = document.getElementById('stage-content');
    content.innerHTML = '<div class="loading">⏳ Lade Transkript…</div>';
    try {
      const data = await fetchJSON(`${API}/topics/${currentTopicId}/transcript`);
      const currentText = data.transcript_yaml || '';
      const hint = currentText ? '' : ' — <em>Noch kein Transkript vorhanden. Hier eingeben und speichern.</em>';
      content.innerHTML = `
        <div class="transcript-info">
           <strong>Stufe 0: Rohdaten / Transkript</strong>${hint}
        </div>
        <textarea id="transcript-textarea" class="transcript-edit" spellcheck="false">${esc(currentText)}</textarea>
        <div class="transcript-actions">
          <button onclick="saveTranscript()"> Speichern</button>
          <button class="btn-secondary" onclick="openSrtImportModal()"> SRT importieren</button>
          <span id="save-status" class="save-status"></span>
        </div>`;
    } catch (e) {
      content.innerHTML = `<div class="error">❌ ${esc(e.message)}</div>`;
    }
  }

  async function saveTranscript() {
    const textarea = document.getElementById('transcript-textarea');
    const statusEl = document.getElementById('save-status');
    if (!textarea || !currentTopicId) return;
    statusEl.textContent = '⏳ Speichern…';
    try {
      await putJSON(`${API}/topics/${currentTopicId}/transcript`, {
        transcript_yaml: textarea.value || null,
      });
      statusEl.textContent = '✅ Gespeichert';
      setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2500);
    } catch (e) {
      statusEl.textContent = `❌ ${esc(e.message)}`;
    }
  }

  // ── SRT Import Modal ──────────────────────────────
  function openSrtImportModal() {
    // Remove existing modal if any
    const existing = document.getElementById('srt-modal-backdrop');
    if (existing) existing.remove();

    const backdrop = document.createElement('div');
    backdrop.id = 'srt-modal-backdrop';
    backdrop.className = 'srt-modal-backdrop';
    backdrop.innerHTML = `
      <div class="srt-modal">
        <h3> SRT-Datei importieren</h3>
        <label for="srt-textarea">SRT-Inhalt einfügen:</label>
        <textarea id="srt-textarea" placeholder="1\n00:00:00,080 --> 00:00:03,439\nHello world this is a test\n\n2\n00:00:03,439 --> 00:00:06,960\nof the subtitle parser"></textarea>
        <label for="srt-source-url">YouTube-URL (optional):</label>
        <input type="text" id="srt-source-url" placeholder="https://www.youtube.com/watch?v=..." />
        <label for="srt-title">Titel (optional, sonst Topic-Titel):</label>
        <input type="text" id="srt-title" placeholder="z.B. Diskussion über Quotenregelungen" />
        <div class="srt-modal-actions">
          <button class="btn-import" id="srt-btn-import" onclick="doSrtImport()"> Importieren</button>
          <button class="btn-close" onclick="closeSrtImportModal()">Abbrechen</button>
          <span class="srt-modal-status" id="srt-import-status"></span>
        </div>
      </div>`;
    // Close on backdrop click (not on modal body)
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeSrtImportModal();
    });
    document.body.appendChild(backdrop);
    document.getElementById('srt-textarea').focus();
  }

  function closeSrtImportModal() {
    const backdrop = document.getElementById('srt-modal-backdrop');
    if (backdrop) backdrop.remove();
  }

  async function doSrtImport() {
    const textarea = document.getElementById('srt-textarea');
    const statusEl = document.getElementById('srt-import-status');
    const importBtn = document.getElementById('srt-btn-import');
    const srtContent = textarea?.value?.trim();

    if (!srtContent) {
      statusEl.textContent = '⚠️ Bitte SRT-Inhalt einfügen';
      return;
    }
    if (!currentTopicId) return;

    importBtn.disabled = true;
    statusEl.textContent = '⏳ Importiere…';

    try {
      const body = { srt_content: srtContent };
      const sourceUrl = document.getElementById('srt-source-url')?.value?.trim();
      const title = document.getElementById('srt-title')?.value?.trim();
      if (sourceUrl) body.source_url = sourceUrl;
      if (title) body.title = title;

      await postJSON(`${API}/topics/${currentTopicId}/import-srt`, body);
      closeSrtImportModal();
      // Reload transcript to show imported content
      await loadTranscript();
    } catch (e) {
      statusEl.textContent = `❌ ${esc(e.message)}`;
      importBtn.disabled = false;
    }
  }


  async function loadTopics() {
    const topics = await fetchJSON(`${API}/topics/`);
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = '';
    const hashState = parseHash();
    const wantedTopicId = hashState.topic ? parseInt(hashState.topic) : null;
    let selectedBtn = null;
    let selectedTopicId = null;
    topics.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'topic-tab';
      btn.dataset.topicId = String(t.id);
      btn.textContent = t.title;
      btn.onclick = () => selectTopic(t.id, btn);
      tabs.appendChild(btn);
      if (wantedTopicId != null ? t.id === wantedTopicId : i === 0) {
        selectedBtn = btn;
        selectedTopicId = t.id;
      }
    });
    // Fallback if hash references a topic that no longer exists.
    if (!selectedBtn && topics.length) {
      selectedBtn = tabs.firstChild;
      selectedTopicId = topics[0].id;
    }
    if (selectedBtn) {
      selectedBtn.classList.add('active');
      await selectTopic(selectedTopicId, selectedBtn);
    }
  }

  async function selectTopic(topicId, btn) {
    document.querySelectorAll('.topic-tab').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    currentTopicId = topicId;
    updateHash();
    // Reset polygon groups when switching topics (node IDs are topic-specific)
    customPolygonGroups = [];
    polygonGroupVisibility = {};
    activePolygonGroups = [];
    revealedSplitOrigins.clear();
    if (isSelectingPolygon) exitPolygonSelection();
    if (currentStage === 0) {
      await loadTranscript();
    } else if (currentStage >= 4) {
      showStagePlaceholder(currentStage);
    } else {
      await loadZigzag();
    }
  }

  // ── Load zigzag data ───────────────────────────
  async function loadZigzag() {
    if (!currentTopicId) return;
    showCanvas();
    const canvas = document.getElementById('canvas');
    canvas.innerHTML = '<svg id="zz-svg"></svg><div class="loading">⏳ Lade…</div>';
    try {
      // Stages 2 and 3 both use ?stage=2 from the API — difference is frontend filtering
      const apiStage = currentStage >= 2 ? 2 : currentStage;
      currentData = await fetchJSON(`${API}/topics/${currentTopicId}/zigzag?stage=${apiStage}`);
      render();
    } catch (e) {
      canvas.innerHTML = `<svg id="zz-svg"></svg><div class="error">❌ ${esc(e.message)}</div>`;
    }
  }

  function showCanvas() {
    const content = document.getElementById('stage-content');
    if (!content.querySelector('.zz-canvas')) {
      content.innerHTML = '<div class="zz-frame"><div class="zz-canvas" id="canvas"><svg id="zz-svg"></svg></div><div class="legend-panel hidden" id="legend-panel"></div></div>';
    }
    renderLegendPanel();
  }

  function showStagePlaceholder(stage) {
    const content = document.getElementById('stage-content');
    const configs = {
      4: { icon: '⚙️', title: 'Stufe 4: Einordnung', desc: 'Bewertungen und argumentative Verfeinerungen. Nur auf Argumente (kein Edge-Kommentieren). Noch nicht implementiert.' },
      5: { icon: '⚙️', title: 'Stufe 5: Meta-Einordnung', desc: 'Argumentgruppen markieren, Klassifizierung als Quelle / Grundannahme. Noch nicht implementiert.' },
      6: { icon: '', title: 'Stufe 6: Diskussionsnetz', desc: 'Konkrete Diskussion in allgemeines Argumentationsnetz einordnen. Erfordert separate Spezifikation (AbstractArgument-Modell, Cross-Topic-Links).' },
    };
    const c = configs[stage] || { icon: '❓', title: `Stufe ${stage}`, desc: 'Unbekannte Stufe.' };
    content.innerHTML = `
      <div class="stage-placeholder">
        <div class="ph-icon">${c.icon}</div>
        <div class="ph-title">${c.title}</div>
        <div class="ph-desc">${c.desc}</div>
      </div>`;
  }

  // ── Stage selector ─────────────────────────────
  function applyStage(stage, { skipLoad = false } = {}) {
    const btn = document.querySelector(`.stage-btn[data-stage="${stage}"]`);
    if (!btn || btn.classList.contains('deferred')) return false;
    document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStage = stage;
    revealedSplitOrigins.clear();
    updateHash();
    updateStageDescription();
    renderLegendPanel();
    document.getElementById('mode-toggle').style.display = currentStage >= 4 ? 'flex' : 'none';
    if (skipLoad) return true;
    if (currentStage === 0) return loadTranscript();
    if (currentStage >= 4) { showStagePlaceholder(currentStage); return true; }
    return loadZigzag();
  }

  document.querySelectorAll('.stage-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (btn.classList.contains('deferred')) return;
      await applyStage(parseInt(btn.dataset.stage));
    });
  });

  // Apply initial stage from hash before topics load (so the first selectTopic
  // call already uses the correct stage).
  (function initStageFromHash() {
    const hashState = parseHash();
    const wanted = hashState.stage ? parseInt(hashState.stage) : NaN;
    if (!Number.isNaN(wanted)) {
      const btn = document.querySelector(`.stage-btn[data-stage="${wanted}"]`);
      if (btn && !btn.classList.contains('deferred')) {
        document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStage = wanted;
      }
    }
  })();

  // Back/forward navigation between deep-linked states.
  window.addEventListener('hashchange', async () => {
    if (_suppressHashHandler) return;
    const s = parseHash();
    const wantedStage = s.stage ? parseInt(s.stage) : currentStage;
    const wantedTopic = s.topic ? parseInt(s.topic) : currentTopicId;
    if (wantedStage !== currentStage) applyStage(wantedStage, { skipLoad: true });
    if (wantedTopic !== currentTopicId) {
      const btn = document.querySelector(`.topic-tab[data-topic-id="${wantedTopic}"]`);
      if (btn) await selectTopic(wantedTopic, btn);
    } else {
      // Stage changed but topic didn't: trigger reload of current stage view.
      if (currentStage === 0) await loadTranscript();
      else if (currentStage >= 4) showStagePlaceholder(currentStage);
      else await loadZigzag();
    }
  });

  // ── Load users for selector ────────────────────
  async function loadUsers() {
    try {
      const users = await fetchJSON(`${API}/users/`);
      const sel = document.getElementById('user-select');
      sel.innerHTML = '';
      users.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id; opt.textContent = u.username;
        sel.appendChild(opt);
      });
    } catch(e) { /* keep default */ }
  }

  // ── Mode toggle (disabled — chrono only) ────
  // TODO: post-dev – re-enable when fan layout is ready
  // document.querySelectorAll('.mode-btn').forEach(btn => {
  //   btn.addEventListener('click', () => {
  //     document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  //     btn.classList.add('active');
  //     currentMode = btn.dataset.mode;
  //     render();
  //   });
  // });

  // ── Render dispatcher ──────────────────────────
  function render() {
    if (!currentData) return;
    const canvas = document.getElementById('canvas');
    if (!canvas) return;
    renderChrono(currentData);
    renderLegendPanel(); // Update legend with computed polygon groups
  }

  // ══════════════════════════════════════════════════════════════
  //  CHRONOLOGICAL VIEW (zigzag layout, API-backed)
  // ══════════════════════════════════════════════════════════════

  function createCardEl(step, isSibling) {
    const side = step.position === 'PRO' ? 'L' : (step.position === 'CONTRA' ? 'R' : 'L');
    const card = document.createElement('div');
    card.className = `zz-card ${side}`;
    card.dataset.stepId = step.id;
    if (isSibling) card.classList.add('sibling-card');
    if (step.is_edge_attack && currentStage >= 4) card.classList.add('edge-attack');
    // Stage 1: all cards raw. Stage 2 (Split-Prozess): stage_added=1 cards stay raw.
    if (currentStage === 1 || (currentStage === 2 && step.stage_added === 1)) card.classList.add('stage-raw');

    const isStage2Raw = currentStage === 2 && step.stage_added === 1;
    const isStage2Split = currentStage === 2 && step.stage_added === 2;
    const shouldHaveToggle = currentStage >= 3;
    // Z.2b: a split-origin revealed by the user in Stage 3 should start
    // expanded — they explicitly asked to see its content.
    const isRevealedOrigin = currentStage === 3 && revealedSplitOrigins.has(step.id);
    const shouldStartCollapsed = (currentStage === 3 && !isRevealedOrigin) || (isSibling && currentStage >= 4);
    const collapseIcon = shouldStartCollapsed ? '▸' : '▾';

    // Stage 1: single merged text block — no title/body distinction, no interactive features.
    // Stage 2: Split-Prozess — originals in raw style + splits with badge (working step).
    // Stage 3: Verfeinerung — only splits visible (originals filtered out before card creation).
    // Stage 4+: full features (TODO: post-dev).
    let html = '';

    if (currentStage === 1) {
      // Raw style: merge title and description into one continuous text
      const fullText = step.description
        ? `${step.title} — ${step.description}`
        : step.title;
      html += `<div class="card-text">${esc(fullText)}</div>`;
    } else if (isStage2Raw) {
      // Stage 2 originals stay visually raw and open by default, like a direct
      // carry-over from the basis step.
      const fullText = step.description
        ? `${step.title} — ${step.description}`
        : step.title;
      html += `<div class="card-text">${esc(fullText)}</div>`;
    } else {
      // Stage 2 split cards are title-only. Stage 3+ shows title + body.
      html += `<div class="card-header">`;
      if (shouldHaveToggle) html += `<span class="collapse-toggle">${collapseIcon}</span>`;
      html += `<div class="card-title">${esc(step.title)}</div>`;
      html += `</div>`;
      if (!isStage2Split) {
        html += `<div class="card-content">`;
        if (step.description) html += `<div class="card-body">${esc(step.description)}</div>`;
      }

      // Stage 3+: split badge
      if (step.stage_added === 2 && currentStage >= 3) {
        html += `<span style="display:inline-block;margin-top:3px;padding:0 5px;border-radius:6px;font-size:0.52rem;font-weight:600;background:#1e2a1e;color:#3fb950" title="Stufe-2-Split">✂ Split</span>`;
      }

      // Z.2b — Split-Toggle (Stage 3 only):
      // - On a split card: button "🔄 Original" reveals the origin and hides
      //   all sibling splits of the same set.
      // - On a revealed-origin card: button "↩ Splits" restores the split view.
      // The toggle button is also rendered when the card is collapsed because
      // it sits in the card header area (added to .card-header below — but for
      // simplicity we append after badges; clicks stop propagation).
      if (currentStage === 3) {
        if (step.split_from_id) {
          html += `<button class="split-toggle" data-origin-id="${step.split_from_id}" title="Original-Argument anzeigen" style="display:inline-block;margin:3px 0 0 4px;padding:1px 6px;border-radius:6px;font-size:0.52rem;font-weight:600;background:#1f2937;color:#93c5fd;border:1px solid #374151;cursor:pointer">🔄 Original</button>`;
        } else if (currentData && currentData.steps && currentData.steps.some(s => s.split_from_id === step.id)) {
          // This is a split-origin currently being shown (i.e. revealed by user)
          html += `<button class="split-toggle" data-origin-id="${step.id}" data-mode="restore" title="Splits zurückholen" style="display:inline-block;margin:3px 0 0 4px;padding:1px 6px;border-radius:6px;font-size:0.52rem;font-weight:600;background:#1f2937;color:#fcd34d;border:1px solid #374151;cursor:pointer">↩ Splits</button>`;
        }
      }

      // Stage 4+: conflict zone, opens_conflict (TODO: post-dev)
      if (currentStage >= 4) {
        const zone = step.conflict_zone;
        if (zone) {
          html += `<span class="card-zone" style="background:${ZONE_BG[zone]||'#161b22'};color:${ZONE_COLORS[zone]||'#8b949e'}">${ZONE_LABEL[zone]||''}</span>`;
        }
        if (step.opens_conflict) html += `<div class="new-conflict">→ ${esc(step.opens_conflict)}</div>`;
      }

      // Stage 2/3 split cards should remain visually identical full cards.
      // No collapsed or "alternative stub" treatment in the refined/work views.

      // Stage 4+: action buttons (TODO: post-dev)
      if (currentStage >= 4) {
        html += `<div class="card-actions">`;
        html += `<button class="btn-vote-up" data-id="${step.id}" title="Upvote">▲</button>`;
        html += `<span class="vote-score">${step.vote_score || 0}</span>`;
        html += `<button class="btn-vote-down" data-id="${step.id}" title="Downvote">▼</button>`;
        html += `<button class="btn-reply" data-id="${step.id}" title="Antworten">＋</button>`;
        html += `<button class="btn-comment" data-id="${step.id}" title="Kommentar"></button>`;
        html += `</div>`;
      }
      if (!isStage2Split) html += `</div>`;
    }

    card.innerHTML = html;
    if (shouldStartCollapsed) {
      card.classList.add('collapsed');
    }

    // Collapse toggle (Stage-3+ cards)
    const collapseToggle = card.querySelector('.collapse-toggle');
    if (collapseToggle) {
      collapseToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        card.classList.toggle('collapsed');
        collapseToggle.textContent = card.classList.contains('collapsed') ? '▸' : '▾';
        if (typeof relayout === 'function') relayout();
      });
    }

    // Action handlers (only stages 3+)
    card.querySelector('.btn-vote-up')?.addEventListener('click', (e) => { e.stopPropagation(); vote(step.id, 1); });
    card.querySelector('.btn-vote-down')?.addEventListener('click', (e) => { e.stopPropagation(); vote(step.id, -1); });
    card.querySelector('.btn-reply')?.addEventListener('click', (e) => { e.stopPropagation(); showReplyForm(step.id, card); });
    card.querySelector('.btn-comment')?.addEventListener('click', (e) => { e.stopPropagation(); showCommentForm(step.id, card); });

    // Z.2b — Split toggle click handler
    card.querySelector('.split-toggle')?.addEventListener('click', (e) => {
      e.stopPropagation();
      const originId = parseInt(e.currentTarget.dataset.originId);
      if (!Number.isFinite(originId)) return;
      if (revealedSplitOrigins.has(originId)) revealedSplitOrigins.delete(originId);
      else revealedSplitOrigins.add(originId);
      render();
    });

    return card;
  }

  // ── Helper functions for layout ────────────────
  function getVisibleTopY(item) {
    const canvas = document.getElementById('canvas');
    return item.el.getBoundingClientRect().top - canvas.getBoundingClientRect().top - canvas.clientTop;
  }
  function getVisibleBotY(item) {
    const canvas = document.getElementById('canvas');
    return item.el.getBoundingClientRect().bottom - canvas.getBoundingClientRect().top - canvas.clientTop;
  }

  // ── Shared anchor / connection helpers ─────────
  // DESIGN: The zigzag UI has one shared geometric core across stages.
  // Stages differ in WHICH connections they render, but anchor resolution and
  // SVG updates should be centralized so drag behaviour stays stable.
  function getCenterAnchor(item, CARD_W, CX, topicBottom) {
    if (!item) return { x: CX, y: topicBottom };
    return {
      x: item.x + CARD_W / 2,
      y: item.topY + (item.height || 40) / 2,
    };
  }

  function getLogicalSourceAnchor(item, CX, topicBottom) {
    if (!item) return { x: CX, y: topicBottom };
    return { x: item.edgeX, y: item.botY - 4 };
  }

  function getLogicalTargetAnchor(item) {
    return { x: item.edgeX, y: item.topY + 8 };
  }

  function setCurvedFlowPath(pathEl, sourceAnchor, targetAnchor) {
    const cpY1 = sourceAnchor.y + (targetAnchor.y - sourceAnchor.y) * 0.4;
    const cpY2 = sourceAnchor.y + (targetAnchor.y - sourceAnchor.y) * 0.6;
    pathEl.setAttribute(
      'd',
      `M${sourceAnchor.x},${sourceAnchor.y} C${sourceAnchor.x},${cpY1} ${targetAnchor.x},${cpY2} ${targetAnchor.x},${targetAnchor.y}`,
    );
  }

  function setStraightLine(lineEl, sourceAnchor, targetAnchor) {
    lineEl.setAttribute('x1', sourceAnchor.x);
    lineEl.setAttribute('y1', sourceAnchor.y);
    lineEl.setAttribute('x2', targetAnchor.x);
    lineEl.setAttribute('y2', targetAnchor.y);
  }

  // ── Polygon overlay helpers ─────────────────────
  // DESIGN: Polygon overlays highlight argumentative branches/sub-discussions.
  // Stage 2: groups are split-sets (same split_from_id + origin).
  // Stage 3: groups are subtrees from branching points (parent with 2+ children).
  // Visual: very subtle convex hull with rounded corners — like a highlighter pen.

  function cross2D(O, A, B) {
    return (A.x - O.x) * (B.y - O.y) - (A.y - O.y) * (B.x - O.x);
  }

  function convexHull(points) {
    if (points.length < 3) return points.slice();
    points.sort((a, b) => a.x - b.x || a.y - b.y);
    const lower = [];
    for (const p of points) {
      while (lower.length >= 2 && cross2D(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
      lower.push(p);
    }
    const upper = [];
    for (let i = points.length - 1; i >= 0; i--) {
      const p = points[i];
      while (upper.length >= 2 && cross2D(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
      upper.push(p);
    }
    lower.pop(); upper.pop();
    return lower.concat(upper);
  }

  function computePaddedHull(itemList, cardW, padding) {
    const pts = [];
    itemList.forEach(it => {
      const x = it.x, y = it.topY, h = it.height || 40, w = cardW;
      pts.push(
        { x: x - padding, y: y - padding },
        { x: x + w + padding, y: y - padding },
        { x: x - padding, y: y + h + padding },
        { x: x + w + padding, y: y + h + padding },
      );
    });
    return convexHull(pts);
  }

  function smoothHullPath(hull, r = 14) {
    if (hull.length < 3) return '';
    const n = hull.length;
    let d = '';
    for (let i = 0; i < n; i++) {
      const prev = hull[(i - 1 + n) % n], curr = hull[i], next = hull[(i + 1) % n];
      const dxP = prev.x - curr.x, dyP = prev.y - curr.y, lenP = Math.hypot(dxP, dyP);
      const dxN = next.x - curr.x, dyN = next.y - curr.y, lenN = Math.hypot(dxN, dyN);
      const cr = Math.min(r, lenP / 3, lenN / 3);
      const p1x = curr.x + dxP / lenP * cr, p1y = curr.y + dyP / lenP * cr;
      const p2x = curr.x + dxN / lenN * cr, p2y = curr.y + dyN / lenN * cr;
      d += i === 0 ? `M${p1x.toFixed(1)},${p1y.toFixed(1)}` : ` L${p1x.toFixed(1)},${p1y.toFixed(1)}`;
      d += ` Q${curr.x.toFixed(1)},${curr.y.toFixed(1)} ${p2x.toFixed(1)},${p2y.toFixed(1)}`;
    }
    return d + ' Z';
  }

  function computePolygonGroups(displaySteps, allItemById, stage) {
    if (stage < 2) return [];
    const groups = [];
    let ci = 0;

    // Helper: readable short name from a node ID
    function nodeName(id) {
      const it = allItemById[id];
      if (!it) return '?';
      const t = it.step.title || '';
      return t.length > 28 ? t.substring(0, 25) + '…' : t;
    }

    if (stage === 2) {
      // Stage 2: group by split_from_id (split-sets + their origin)
      const splitGroups = {};
      displaySteps.forEach(s => {
        if (s.split_from_id) {
          if (!splitGroups[s.split_from_id]) splitGroups[s.split_from_id] = [];
          splitGroups[s.split_from_id].push(s.id);
        }
      });
      Object.entries(splitGroups).forEach(([oid, sids]) => {
        if (sids.length < 2) return;
        const nids = [...sids];
        const oidNum = parseInt(oid);
        if (allItemById[oidNum]) nids.push(oidNum);
        const originName = nodeName(oidNum);
        groups.push({
          key: `auto_s2_${oidNum}`,
          name: `Splits: ${originName}`,
          nodeIds: nids,
          color: POLYGON_COLORS[ci++ % POLYGON_COLORS.length],
          isAuto: true,
        });
      });
    } else {
      // Stage 3+: group by parent_id branching (subtrees from branch points)
      const displayedIds = new Set(Object.keys(allItemById).map(Number));
      const childrenOf = {};
      displaySteps.forEach(s => {
        if (s.parent_id && displayedIds.has(s.parent_id)) {
          if (!childrenOf[s.parent_id]) childrenOf[s.parent_id] = [];
          childrenOf[s.parent_id].push(s.id);
        }
      });
      function subtree(id) {
        const res = [id];
        (childrenOf[id] || []).forEach(c => res.push(...subtree(c)));
        return res;
      }
      Object.values(childrenOf).forEach(children => {
        if (children.length < 2) return;
        children.forEach(cid => {
          const ids = subtree(cid);
          if (ids.length < 2) return;
          groups.push({
            key: `auto_s3_${cid}`,
            name: nodeName(cid),
            nodeIds: ids,
            color: POLYGON_COLORS[ci++ % POLYGON_COLORS.length],
            isAuto: true,
          });
        });
      });
    }
    return groups;
  }

  function renderChrono(data) {
    const canvas = document.getElementById('canvas');
    canvas.querySelectorAll('.zz-card,.zz-topic,.zz-deadend,.edge-marker,.zz-side-label,.inline-form,.loading,.error').forEach(e => e.remove());

    const W = Math.max(canvas.clientWidth, 700);
    const CX = W / 2;
    const CARD_W = 220;
    const GAP = 20;
    const MAX_OFFSET = 50;
    const V_PAD = 12;
    const TOPIC_Y = 35;

    // Topic pill
    const topicEl = document.createElement('div');
    topicEl.className = 'zz-topic';
    topicEl.style.left = CX + 'px';
    topicEl.style.top = TOPIC_Y + 'px';
    topicEl.textContent = data.topic.title;
    canvas.appendChild(topicEl);
    const topicH = topicEl.getBoundingClientRect().height;
    const topicBottom = TOPIC_Y + topicH / 2 + 4;

    // Side labels
    const sideL = document.createElement('div');
    sideL.className = 'zz-side-label';
    sideL.style.left = '16px'; sideL.style.top = '10px'; sideL.style.color = PRO_C;
    sideL.textContent = '◀ PRO';
    canvas.appendChild(sideL);

    const sideR = document.createElement('div');
    sideR.className = 'zz-side-label';
    sideR.style.right = '16px'; sideR.style.top = '10px'; sideR.style.color = CON_C;
    sideR.style.textAlign = 'right';
    sideR.textContent = 'CONTRA ▶';
    canvas.appendChild(sideR);

    // Build step map
    const steps = data.steps;
    const stepMap = {};
    steps.forEach(s => { stepMap[s.id] = s; });

    // ── Stage 3 (Verfeinerung): filter out originals that have been split ──
    // Build set of IDs that are referenced by split_from_id
    const splitOriginIds = new Set();
    if (currentStage === 3) {
      steps.forEach(s => { if (s.split_from_id) splitOriginIds.add(s.split_from_id); });
    }

    // Filter steps for display
    // Z.2b: a split-origin can be temporarily revealed by the user. While
    // revealed, the origin is shown and its splits are hidden — preserving the
    // "never show original + splits simultaneously" rule from the design doc.
    const displaySteps = currentStage === 3
      ? steps.filter(s => {
          if (splitOriginIds.has(s.id)) {
            // It's a split-origin: show only if user revealed it
            return revealedSplitOrigins.has(s.id);
          }
          if (s.split_from_id && revealedSplitOrigins.has(s.split_from_id)) {
            // It's a split whose origin is currently revealed → hide
            return false;
          }
          return true;
        })
      : steps;

    // ── Stage 1: simple linear chain — every step is primary, no siblings ──
    // ── Stage 2 (Split-Prozess): originals are primary chain, splits are siblings of their origin ──
    // ── Stage 3 (Verfeinerung): split originals filtered out, remaining grouped by parent_id ──
    const primarySteps = [];
    const siblingSteps = {};

    if (currentStage === 1) {
      // Stage 1: ALL steps form a single chronological chain, no siblings
      displaySteps.forEach(s => primarySteps.push(s));
    } else if (currentStage === 2) {
      // Stage 2 (Split-Prozess): originals are primary, splits group by split_from_id
      displaySteps.forEach(s => {
        if (s.split_from_id) {
          // Split → sibling of its origin (grouped under origin's ID)
          if (!siblingSteps[s.split_from_id]) siblingSteps[s.split_from_id] = [];
          siblingSteps[s.split_from_id].push(s);
        } else {
          primarySteps.push(s);
        }
      });
    } else {
      // Stage 2+: group by parent_id — first = primary, rest = siblings
      const seenParents = new Set();
      displaySteps.forEach(s => {
        const key = s.parent_id ?? '__root__';
        if (!seenParents.has(key)) {
          seenParents.add(key);
          primarySteps.push(s);
        } else {
          if (!siblingSteps[key]) siblingSteps[key] = [];
          siblingSteps[key].push(s);
        }
      });
    }

    // Create card items
    const items = [];

    primarySteps.forEach((s, i) => {
      const card = createCardEl(s, false);
      card.style.width = CARD_W + 'px';
      card.style.position = 'absolute';
      card.style.visibility = 'hidden';
      canvas.appendChild(card);
      const h = card.getBoundingClientRect().height;

      const side = s.position === 'PRO' ? 'L' : 'R';
      const item = { el: card, step: s, side, index: i, height: h, siblings: [] };

      // Siblings for this step
      // Stage 2: splits grouped by split_from_id = this item's id
      // Stage 3+: grouped by parent_id
      const key = currentStage === 2 ? s.id : (s.parent_id ?? '__root__');
      const sibs = siblingSteps[key] || [];
      sibs.forEach(sib => {
        const sibCard = createCardEl(sib, true);
        sibCard.style.width = CARD_W + 'px';
        sibCard.style.position = 'absolute';
        sibCard.style.visibility = 'hidden';
        canvas.appendChild(sibCard);
        const sibH = sibCard.getBoundingClientRect().height;
        const sibSide = sib.position === 'PRO' ? 'L' : 'R';
        item.siblings.push({ el: sibCard, step: sib, side: sibSide, height: sibH });
      });

      items.push(item);
    });

    // Calculate positions
    let currentY = topicBottom + V_PAD;

    items.forEach((item) => {
      const weight = item.step.position_score ?? 0.5;
      const offset = weight * MAX_OFFSET;
      let cardX = item.side === 'L'
        ? CX - GAP - CARD_W - offset
        : CX + GAP + offset;

      item.el.style.left = cardX + 'px';
      item.el.style.top = currentY + 'px';
      item.el.style.visibility = 'visible';

      item.x = cardX;
      item.y = currentY;
      item.edgeX = item.side === 'L' ? cardX + CARD_W : cardX;
      item.topY = currentY;
      item.botY = currentY + item.height;

      let blockHeight = item.height;

      // Position siblings
      let sibCurY = currentY + item.height + 24;
      item.siblings.forEach((sibItem) => {
        const sibWeight = sibItem.step.position_score ?? 0.3;
        const sibOffset = sibWeight * MAX_OFFSET;
        let sibX;
        if (currentStage === 3) {
          // Refined Stage 3 keeps split cards directly underneath each other
          // in the same semantic side column.
          sibX = cardX;
        } else {
          sibX = sibItem.side === 'L'
            ? CX - GAP - CARD_W - sibOffset - 40
            : CX + GAP + sibOffset + 40;
        }

        sibItem.el.style.left = sibX + 'px';
        sibItem.el.style.top = sibCurY + 'px';
        sibItem.el.style.visibility = 'visible';

        sibItem.x = sibX;
        sibItem.y = sibCurY;
        sibItem.edgeX = sibItem.side === 'L' ? sibX + CARD_W : sibX;
        sibItem.topY = sibCurY;
        sibItem.botY = sibCurY + sibItem.height;

        sibCurY += sibItem.height + 4;
      });

      if (item.siblings.length > 0) {
        blockHeight = sibCurY - 4 - currentY;
      }

      currentY += blockHeight + V_PAD;
    });

    // Draw SVG
    const totalHeight = currentY + 80;
    const svg = document.getElementById('zz-svg');
    svg.innerHTML = '';
    svg.setAttribute('width', W);
    svg.setAttribute('height', totalHeight);
    svg.setAttribute('viewBox', `0 0 ${W} ${totalHeight}`);

    svg.innerHTML =
      `<rect x="0" y="0" width="${CX}" height="${totalHeight}" fill="${PRO_C}" opacity="0.04"/>` +
      `<rect x="${CX}" y="0" width="${CX}" height="${totalHeight}" fill="${CON_C}" opacity="0.04"/>` +
      `<line x1="${CX}" y1="${topicBottom}" x2="${CX}" y2="${totalHeight - 30}" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>`;

    // Build item-by-id map for connection lookups (primaries only)
    const itemById = {};
    items.forEach(item => { itemById[item.step.id] = item; });

    // Comprehensive lookup including siblings (for Stage 2 split-to-split connections)
    const allItemById = {};
    items.forEach(item => {
      allItemById[item.step.id] = item;
      item.siblings.forEach(sib => { allItemById[sib.step.id] = sib; });
    });

    // ── Polygon overlays (argumentative branches) ────────────────────
    // Merge auto-computed groups with user-created custom groups.
    // Each group has per-group visibility via polygonGroupVisibility.
    const autoGroups = computePolygonGroups(displaySteps, allItemById, currentStage);
    const allGroups = [
      ...autoGroups,
      ...customPolygonGroups.map((g, i) => ({
        ...g,
        color: g.color || POLYGON_COLORS[(autoGroups.length + i) % POLYGON_COLORS.length],
        isAuto: false,
      })),
    ];
    activePolygonGroups = allGroups;

    const polygonState = [];
    allGroups.forEach(g => {
      const isVisible = polygonGroupVisibility[g.key] ?? true;
      if (!isVisible) return;
      const gItems = g.nodeIds.map(id => allItemById[id]).filter(Boolean);
      if (gItems.length < 2) return;
      const hull = computePaddedHull(gItems, CARD_W, 18);
      if (hull.length < 3) return;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', smoothHullPath(hull));
      path.setAttribute('fill', g.color);
      path.setAttribute('fill-opacity', '0.10');
      path.setAttribute('stroke', g.color);
      path.setAttribute('stroke-opacity', '0.30');
      path.setAttribute('stroke-width', '2');
      path.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(path);
      polygonState.push({ el: path, nodeIds: g.nodeIds, color: g.color });
    });

    items.forEach((item, idx) => {
      const color = item.side === 'L' ? PRO_C : CON_C;
      const toX = item.edgeX;
      const toY = item.topY + 8;

      // Stage 1: connect to PREVIOUS card (simple zigzag chain)
      // Stage 2+: connect to parent_id (structural reference)
      let srcItem = null;
      if (currentStage === 1) {
        srcItem = idx > 0 ? items[idx - 1] : null;
      } else {
        if (item.step.parent_id && itemById[item.step.parent_id]) {
          srcItem = itemById[item.step.parent_id];
        }
      }
      const fromX = srcItem ? srcItem.edgeX : CX;
      const fromY = srcItem ? (srcItem.botY - 4) : topicBottom;
      item.srcItem = srcItem;

      // Stage 2: raw connections (between stage_added=1 items) are thicker and dimmer
      // to represent proportionally more consolidated information
      const isRawConn = currentStage === 2 && item.step.stage_added === 1
        && (!srcItem || srcItem.step.stage_added === 1);
      const lineWidth = isRawConn ? 4 : 2;
      const lineOpacity = isRawConn ? 0.18 : 0.4;

      // Stage 3 renders its own dual-connection system below.
      if (currentStage !== 3) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', fromX); line.setAttribute('y1', fromY);
        line.setAttribute('x2', toX); line.setAttribute('y2', toY);
        line.setAttribute('stroke', color);
        line.setAttribute('stroke-width', String(lineWidth));
        line.setAttribute('stroke-opacity', String(lineOpacity));
        svg.appendChild(line);
        item.mainLine = line;
      } else {
        item.mainLine = null;
      }

      // Edge type marker (only stages 3+, clean stages have no edge annotations)
      const et = currentStage >= 4 && item.step.edge_type && EDGE_TYPES[item.step.edge_type];
      if (et) {
        const eMidX = (fromX + toX) / 2;
        const eMidY = (fromY + toY) / 2;
        const marker = document.createElement('div');
        marker.className = 'edge-marker collapsed';
        marker.style.left = eMidX + 'px'; marker.style.top = eMidY + 'px';
        marker.innerHTML =
          `<span class="edge-marker-emoji">${et.emoji}</span>` +
          `<span class="edge-marker-plus">⊕</span>` +
          `<span class="edge-marker-label">${esc(et.label)}</span>`;
        canvas.appendChild(marker);
        item.markerEl = marker;
        marker.addEventListener('click', (ev) => { ev.stopPropagation(); marker.classList.toggle('collapsed'); });
      }

      // Sibling lines — branch FROM the primary card's edge, not the connection midpoint.
      // Splits are attached to their base argument, not to the connection between arguments.
      // Stage 2: sibling lines become "Ursprungs-Argument" connections (neutral grey),
      // attaching slightly lower on the origin card to distinguish from parent connections.
      if (currentStage === 2 && item.siblings.length > 0) {
        const defaultSibColor = item.side === 'L' ? PRO_C : CON_C;
        // Dock point = bottom of the primary card (where splits branch off)
        const dockX = item.edgeX;
        // Stage 2: attach a bit lower than parent connections (botY instead of botY-4)
        const dockY = (currentStage === 2) ? item.botY + 2 : item.botY;

        item.siblings.forEach((sibItem) => {
          const sibToX = sibItem.edgeX;
          const sibToY = sibItem.y + 8;
          // Stage 2 + split: neutral grey = Ursprungs-Argument connection
          const sibColor = (currentStage === 2 && sibItem.step.split_from_id)
            ? '#8b949e'
            : defaultSibColor;
          // Curved dashed path: base card → sibling card
          const cx1 = dockX, cy1 = (dockY + sibToY) / 2;
          const cx2 = sibToX, cy2 = (dockY + sibToY) / 2;
          const sibPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          sibPath.setAttribute('d', `M${dockX},${dockY} C${cx1},${cy1} ${cx2},${cy2} ${sibToX},${sibToY}`);
          sibPath.setAttribute('stroke', sibColor);
          sibPath.setAttribute('stroke-width', '1.5');
          sibPath.setAttribute('stroke-opacity', (currentStage === 2 && sibItem.step.split_from_id) ? '0.45' : '0.35');
          sibPath.setAttribute('stroke-dasharray', '5,3');
          sibPath.setAttribute('fill', 'none');
          // Only add to SVG if showOriginLines is enabled
          if (showOriginLines) svg.appendChild(sibPath);
          sibItem.line = sibPath;
        });
      }
    });

    // ── Stage 2/3: additional semantic connections ─────────────────────────────
    // Stage 2 = work view with origin + raw-chain + chrono + split references.
    // Stage 3 = refined view with two connection types only:
    //   - chronological flow (topic-blue, dashed, through card centers)
    //   - logical reference (green/red, straight, side-docked)
    // TODO: post-dev — smooth branching from chronological line to source argument in split view
    const extraLines = [];

    // ── Stage 2: Blue chronological flow + split-to-split connections ──────────
    // Four connection types in Stage 2:
    //   1. Raw chain (thick, dimmed) — handled above in main lines
    //   2. Ursprungs-Argument (grey dashed) — handled above in sibling lines
    //   3. Blue chronological flow: curvy path through card CENTERS (not edges)
    //      Topic → R1 → L2.1 → L2.2 → R3.1 → R3.2 → L4.1 → ...
    //      Semantically separated from argument connections by running through midpoints.
    //   4. Split-to-split: bright green/red STRAIGHT lines — specific connections via parent_id
    if (currentStage === 2) {
      // ─ 3. Blue chronological flow (curvy, through card centers) ─
      // Build the unfolded sequence: for each stage-1 original, substitute with its splits (if any)
      const originals = items.filter(it => it.step.stage_added === 1);
      const chronoSequence = []; // array of item refs (from allItemById)
      originals.forEach(orig => {
        if (orig.siblings.length > 0 && orig.siblings.some(s => s.step.split_from_id)) {
          // Has splits → insert splits in order (they are already ordered from API)
          orig.siblings.forEach(sib => {
            if (sib.step.split_from_id) chronoSequence.push(sib);
          });
        } else {
          // No splits → keep original in sequence
          chronoSequence.push(orig);
        }
      });

      if (showBlueChronoFlow) {
        const TOPIC_BLUE = '#1f6feb';
        for (let i = 0; i < chronoSequence.length; i++) {
          const target = chronoSequence[i];
          const bLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const sourceAnchor = getCenterAnchor(i > 0 ? chronoSequence[i - 1] : null, CARD_W, CX, topicBottom);
          const targetAnchor = getCenterAnchor(target, CARD_W, CX, topicBottom);
          setCurvedFlowPath(bLine, sourceAnchor, targetAnchor);
          bLine.setAttribute('stroke', TOPIC_BLUE);
          bLine.setAttribute('stroke-width', '2.5');
          bLine.setAttribute('stroke-opacity', '0.45');
          bLine.setAttribute('stroke-dasharray', '6,4');
          bLine.setAttribute('fill', 'none');
          svg.appendChild(bLine);
          extraLines.push({
            el: bLine, type: 'chrono',
            srcItem: i > 0 ? chronoSequence[i - 1] : null,
            tgtItem: target,
          });
        }
      }

      // ─ 4. Split-to-split connections (bright green/red, straight) ─
      // Each split's parent_id points to the specific opponent split it responds to.
      // Drawn as bright, straight lines — the core argumentative connections.
      const allSplits = [];
      items.forEach(it => {
        it.siblings.forEach(sib => {
          if (sib.step.stage_added === 2 && sib.step.parent_id) allSplits.push(sib);
        });
      });

      allSplits.forEach(splitItem => {
        const targetItem = allItemById[splitItem.step.parent_id];
        if (!targetItem) return;
        // Draw connection to parent_id target — whether it's a split or an unsplit original.
        // Example: L2.1 responds to R1 (unsplit), R3.1 responds to L2.1 (split).

        const color = splitItem.side === 'L' ? PRO_C : CON_C;
        const sLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        setStraightLine(
          sLine,
          getLogicalSourceAnchor(targetItem, CX, topicBottom),
          getLogicalTargetAnchor(splitItem),
        );
        sLine.setAttribute('stroke', color);
        sLine.setAttribute('stroke-width', '2');
        sLine.setAttribute('stroke-opacity', '0.6');
        svg.appendChild(sLine);
        extraLines.push({
          el: sLine, type: 'split',
          srcItem: targetItem,
          tgtItem: splitItem,
        });
      });
    }

    // ── Stage 3: refined dual-connection view ─────────────────────────────────
    if (currentStage === 3) {
      const visibleSequence = displaySteps
        .map(step => allItemById[step.id])
        .filter(Boolean);

      if (showBlueChronoFlow) {
        const TOPIC_BLUE = '#1f6feb';
        visibleSequence.forEach((target, idx) => {
          const chronoPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          setCurvedFlowPath(
            chronoPath,
            getCenterAnchor(idx > 0 ? visibleSequence[idx - 1] : null, CARD_W, CX, topicBottom),
            getCenterAnchor(target, CARD_W, CX, topicBottom),
          );
          chronoPath.setAttribute('stroke', TOPIC_BLUE);
          chronoPath.setAttribute('stroke-width', '2');
          chronoPath.setAttribute('stroke-opacity', '0.38');
          chronoPath.setAttribute('stroke-dasharray', '6,4');
          chronoPath.setAttribute('fill', 'none');
          svg.appendChild(chronoPath);
          extraLines.push({
            el: chronoPath, type: 'chrono',
            srcItem: idx > 0 ? visibleSequence[idx - 1] : null,
            tgtItem: target,
          });
        });
      }

      visibleSequence.forEach(item => {
        const src = item.step.parent_id ? allItemById[item.step.parent_id] : null;
        const refLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        setStraightLine(
          refLine,
          getLogicalSourceAnchor(src, CX, topicBottom),
          getLogicalTargetAnchor(item),
        );
        refLine.setAttribute('stroke', item.side === 'L' ? PRO_C : CON_C);
        refLine.setAttribute('stroke-width', '2');
        refLine.setAttribute('stroke-opacity', '0.58');
        svg.appendChild(refLine);
        extraLines.push({
          el: refLine, type: 'logical',
          srcItem: src,
          tgtItem: item,
        });
      });
    }

    // Dead end pill
    const deY = currentY + 6;
    const de = document.createElement('div');
    de.className = 'zz-deadend';
    de.style.left = CX + 'px'; de.style.top = deY + 'px';
    de.innerHTML = `<div class="de-icon"></div>
      <div class="de-label">Ende des Strangs</div>
      <div class="de-desc">${steps.length} Argumente</div>`;
    canvas.appendChild(de);

    const finalH = deY + 70;
    canvas.style.minHeight = finalH + 'px';
    svg.setAttribute('height', finalH);
    svg.setAttribute('viewBox', `0 0 ${W} ${finalH}`);

    renderState = { items, CX, topicBottom, CARD_W, V_PAD, mode: 'chrono', allItemById, extraLines, polygonState };
  }
