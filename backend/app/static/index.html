res<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌳 Dialectree</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #1a237e; color: #fff; padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 1.5rem; }
    header p { font-size: 0.85rem; opacity: 0.8; }

    #app { max-width: 1100px; margin: 0 auto; padding: 24px; }

    #topic-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
    .topic-btn {
      padding: 8px 18px; border-radius: 20px; border: 2px solid #1a237e;
      background: #fff; cursor: pointer; font-size: 0.95rem; transition: all .15s;
    }
    .topic-btn.active { background: #1a237e; color: #fff; }
    .topic-btn:hover:not(.active) { background: #e8eaf6; }

    #tree-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
    #tree-desc { color: #555; font-size: 0.9rem; margin-bottom: 20px; }

    .tree-container { overflow-x: auto; padding-bottom: 16px; }

    /* Node cards */
    .node {
      display: inline-block; vertical-align: top;
      background: #fff; border-radius: 10px;
      border-left: 5px solid #ccc; box-shadow: 0 2px 6px rgba(0,0,0,.12);
      padding: 12px 16px; margin: 6px; min-width: 220px; max-width: 280px;
      font-size: 0.85rem;
    }
    .node.PRO    { border-color: #388e3c; }
    .node.CONTRA { border-color: #d32f2f; }
    .node.NEUTRAL{ border-color: #f57c00; }

    .node-badge {
      display: inline-block; border-radius: 4px; padding: 1px 7px;
      font-size: 0.72rem; font-weight: 700; color: #fff; margin-bottom: 6px;
    }
    .PRO .node-badge    { background: #388e3c; }
    .CONTRA .node-badge { background: #d32f2f; }
    .NEUTRAL .node-badge{ background: #f57c00; }

    .node-title { font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
    .node-desc  { color: #555; font-size: 0.8rem; margin-bottom: 6px; }
    .node-meta  { font-size: 0.75rem; color: #777; }
    .node-score { font-weight: 700; }
    .node-score.pos { color: #388e3c; }
    .node-score.neg { color: #d32f2f; }

    .children {
      border-left: 3px solid #ddd; margin-left: 20px;
      padding-left: 12px; margin-top: 4px;
    }

    #loading { color: #888; font-style: italic; padding: 20px 0; }
    #error   { color: #d32f2f; padding: 20px 0; }
    #empty   { color: #888; padding: 20px 0; }

    .legend {
      display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
      font-size: 0.82rem;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot  { width: 12px; height: 12px; border-radius: 50%; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>🌳 Dialectree</h1>
    <p>Strukturierte Argumentationsbäume für bessere Diskussionen</p>
  </div>
</header>

<div id="app">
  <div id="topic-list"><em>Lade Topics…</em></div>
  <div id="tree-title"></div>
  <div id="tree-desc"></div>
  <div class="legend" id="legend" style="display:none">
    <div class="legend-item"><div class="legend-dot" style="background:#388e3c"></div> PRO</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d32f2f"></div> CONTRA</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f57c00"></div> NEUTRAL</div>
    <span style="color:#888">| 👍/👎 = Vote-Score &nbsp; 🏷 = Tags &nbsp; 📄 = Belege &nbsp; 💬 = Kommentare</span>
  </div>
  <div id="loading" style="display:none">Lade Argumentationsbaum…</div>
  <div id="error"   style="display:none"></div>
  <div id="empty"   style="display:none">Keine Argumente für dieses Topic vorhanden.</div>
  <div class="tree-container" id="tree"></div>
</div>

<script>
  const BASE = '';   // same origin, proxied through FastAPI

  async function loadTopics() {
    const res = await fetch(`${BASE}/api/topics/`);
    if (!res.ok) throw new Error('Backend nicht erreichbar – läuft der Server?');
    return res.json();
  }

  async function loadTree(topicId) {
    const res = await fetch(`${BASE}/api/topics/${topicId}/tree`);
    if (!res.ok) throw new Error('Baum konnte nicht geladen werden.');
    return res.json();
  }

  function scoreClass(score) {
    if (score > 0) return 'pos';
    if (score < 0) return 'neg';
    return '';
  }

  function renderNode(node) {
    const tags    = node.tags?.length   ? `🏷 ${node.tags.join(', ')} ` : '';
    const labels  = node.labels?.length ? `⚠️ ${node.labels.join(', ')} ` : '';
    const evidence= node.evidence_count ? `📄 ${node.evidence_count} ` : '';
    const comments= node.comment_count  ? `💬 ${node.comment_count}` : '';
    const meta    = [tags, labels, evidence, comments].join('').trim();
    const scoreSign = node.vote_score > 0 ? '+' : '';

    const el = document.createElement('div');
    el.className = `node ${node.position}`;
    el.innerHTML = `
      <span class="node-badge">${node.position}</span>
      <div class="node-title">${escHtml(node.title)}</div>
      ${node.description ? `<div class="node-desc">${escHtml(node.description)}</div>` : ''}
      <div class="node-meta">
        <span class="node-score ${scoreClass(node.vote_score)}">👍 ${scoreSign}${node.vote_score}</span>
        ${meta ? ` &nbsp;|&nbsp; ${meta}` : ''}
      </div>
    `;

    if (node.children?.length) {
      const childWrap = document.createElement('div');
      childWrap.className = 'children';
      node.children.forEach(c => childWrap.appendChild(renderNode(c)));
      el.appendChild(childWrap);
    }
    return el;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function selectTopic(topic, btn) {
    document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.getElementById('tree-title').textContent = topic.title;
    document.getElementById('tree-desc').textContent  = topic.description || '';
    document.getElementById('legend').style.display = 'flex';
    document.getElementById('tree').innerHTML  = '';
    document.getElementById('error').style.display  = 'none';
    document.getElementById('empty').style.display  = 'none';
    document.getElementById('loading').style.display = 'block';

    try {
      const nodes = await loadTree(topic.id);
      document.getElementById('loading').style.display = 'none';
      if (!nodes.length) {
        document.getElementById('empty').style.display = 'block';
        return;
      }
      const container = document.getElementById('tree');
      nodes.forEach(n => container.appendChild(renderNode(n)));
    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      const errEl = document.getElementById('error');
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    }
  }

  async function init() {
    const listEl = document.getElementById('topic-list');
    try {
      const topics = await loadTopics();
      listEl.innerHTML = '';
      if (!topics.length) {
        listEl.innerHTML = '<em>Keine Topics gefunden.</em>';
        return;
      }
      topics.forEach(topic => {
        const btn = document.createElement('button');
        btn.className = 'topic-btn';
        btn.textContent = topic.title;
        btn.onclick = () => selectTopic(topic, btn);
        listEl.appendChild(btn);
      });
      // Auto-select first topic
      listEl.querySelector('.topic-btn').click();
    } catch(e) {
      listEl.innerHTML = `<span style="color:#d32f2f">${e.message}</span>`;
    }
  }

  init();
</script>
</body>
</html>
