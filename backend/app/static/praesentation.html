<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 Dialectree – Argumentationsstruktur</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #fafafa; color: #222; overflow-x: hidden; }

    header {
      background: #1a237e; color: #fff; padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.15rem; }
    header p  { font-size: 0.72rem; opacity: 0.8; }
    header nav { display: flex; gap: 8px; flex-wrap: wrap; }
    header a {
      color: #bbdefb; font-size: 0.72rem; text-decoration: none;
      padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,.25);
    }
    header a:hover { background: rgba(255,255,255,.12); }

    .mm {
      position: relative;
      width: 100%; min-height: 95vh;
      overflow: visible;
    }
    .mm svg {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    .mm-node {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 1;
      border-radius: 7px;
      padding: 6px 10px;
      text-align: left;
      line-height: 1.25;
      font-size: 0.72rem;
      max-width: 280px;
      transition: opacity .3s;
    }

    .mm-node.topic {
      background: #1a237e; color: #fff;
      max-width: 400px; font-size: 0.88rem; font-weight: 600;
      padding: 10px 18px;
      border-radius: 10px; text-align: center;
      box-shadow: 0 3px 16px rgba(26,35,126,.22);
    }
    .mm-node.topic small {
      display: block; margin-top: 3px;
      font-weight: 400; font-size: 0.66rem; opacity: 0.7;
    }

    .mm-node.arg {
      background: #fff;
      border: 1.5px solid #ddd;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    .mm-node.arg.pro  { border-left: 4px solid #43a047; }
    .mm-node.arg.con  { border-left: 4px solid #e53935; }

    .mm-node.arg .arg-title { font-weight: 600; font-size: 0.76rem; margin-bottom: 2px; }
    .mm-node.arg .arg-body  { font-size: 0.66rem; color: #666; }

    .mm-node.alt {
      background: #f8f8f8;
      border: 1px dashed #ccc;
      opacity: 0.42;
      box-shadow: none;
      font-size: 0.64rem;
      color: #999;
      max-width: 200px;
    }
    .mm-node.alt.pro { border-left: 3px solid #a5d6a7; }
    .mm-node.alt.con { border-left: 3px solid #ef9a9a; }
    .mm-node.alt .alt-label {
      font-size: 0.52rem; color: #bbb; font-style: italic;
      margin-top: 2px;
    }

    .mm-node.status {
      background: #fff; border: 1.5px solid #f57c00;
      border-radius: 16px; text-align: center;
      padding: 6px 14px; font-size: 0.7rem;
      box-shadow: 0 1px 6px rgba(245,124,0,.12);
    }

    .edge-emoji {
      position: absolute; transform: translate(-50%, -50%);
      z-index: 2; font-size: 14px;
      pointer-events: none;
    }

    .mm-tag {
      display: inline-block; margin-top: 2px;
      background: #e8eaf6; color: #3949ab;
      border-radius: 6px; padding: 0 4px;
      font-size: 0.52rem; font-weight: 500;
    }
    .mm-tag.warn { background: #fff3e0; color: #e65100; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>🧠 Argumentationsstruktur</h1>
    <p>Klimapolitik & Energiewende</p>
  </div>
  <nav>
    <a href="/">🌳 Baum</a>
    <a href="/entscheidung">⚖️ Waage</a>
    <a href="/dialog">💬 Dialog</a>
    <a href="/zickzack">⚡ Zickzack</a>
    <a href="/konflikt">🔍 Konflikt</a>
  </nav>
</header>

<div class="mm" id="mindmap">
  <svg id="mm-svg"></svg>
</div>

<script>
  // ── Dialectical tree data ────────────────────────
  // Main pursued strand = type 'arg', greyed alternatives = type 'alt'
  // Edge emojis: 🛢️=Ressource, 🌱=Hoffnung, ❌=Widerspruch, 🏭=Systemfrage,
  //              📊=Evidenz, 💡=Idee, 🔗=Kausal, ⚠️=Warnung

  const TREE = {
    id: 'topic', type: 'topic',
    text: 'Kann der Klimawandel von Menschen verhindert werden?',
    sub: 'Nicht ob er menschengemacht ist — sondern ob Handeln realistisch etwas ändert.',
    children: [
      // ── Opening: Hauptargument (CON) ───────────────
      {
        id: 'con1', type: 'arg', side: 'con',
        title: 'Wir können gar nicht verhindern, dass das gesamte Öl gefördert wird',
        body: 'Globaler Markt: Was einer nicht kauft, kauft der nächste. Kein realistischer Weg, auch nur einen Tropfen nicht zu fördern.',
        edgeEmoji: '🛢️',
        children: [
          // ── Antwort PRO (verfolgt) ────────────────────
          {
            id: 'pro1', type: 'arg', side: 'pro',
            title: 'Ja, aber wir müssen es trotzdem versuchen',
            body: 'Wenn wir jetzt nicht probieren, haben wir gar keine Chance. Und die anderen ziehen dann vielleicht mit — Vorbildfunktion.',
            edgeEmoji: '🌱',
            children: [
              // ── Gegenrede CON (verfolgt) ──────────────
              {
                id: 'con2', type: 'arg', side: 'con',
                title: 'Dann ist es ja nur noch Planwirtschaft',
                body: 'Die Unternehmen werden schon wissen, wo investiert werden muss. Der Staat kann diese Entscheidung nicht treffen.',
                edgeEmoji: '🏭',
                children: [
                  // ── Gegenrede PRO (verfolgt) ────────────
                  {
                    id: 'pro3', type: 'arg', side: 'pro',
                    title: 'Das ist kein freier Markt — Marktversagen bei Externalitäten',
                    body: 'CO₂-Schäden werden nicht bepreist. Das ist Marktversagen, kein freier Markt. Korrektur durch CO₂-Preis ist keine Planwirtschaft.',
                    edgeEmoji: '📊',
                    children: [
                      { id: 'deadend', type: 'status',
                        text: '🔀 Struktureller Dissens: Rolle des Staates vs. Markt',
                        children: [] }
                    ]
                  },
                  // Alternativen zu con2 (nicht verfolgt)
                  { id: 'con2-alt1', type: 'alt', side: 'pro',
                    text: 'Subventionen für Erneuerbare gibt es auch in marktwirtschaftlichen Ländern',
                    children: [] },
                  { id: 'con2-alt2', type: 'alt', side: 'pro',
                    text: 'CO₂-Steuer ist ein marktbasiertes Instrument — keine Planwirtschaft',
                    children: [] },
                ]
              },
              // Alternativen zu pro1 (nicht verfolgt, con-Seite antwortet)
              { id: 'pro1-alt1', type: 'alt', side: 'con',
                text: '2% globaler Emissionen — Deutschlands Beitrag ist global irrelevant',
                children: [] },
              { id: 'pro1-alt2', type: 'alt', side: 'con',
                text: 'Erneuerbare können die Grundlast nicht decken (Speicherproblem)',
                children: [] },
            ]
          },
          // ── Zweite Antwort PRO (nicht verfolgt) ───────
          { id: 'pro2', type: 'alt', side: 'pro',
            text: 'Die Transformation ist eine Investition, die eh irgendwann getätigt werden muss. Je früher desto besser.',
            children: [] },
        ]
      },
      // ── Alternative Eröffnungsargumente (nicht verfolgt) ──
      { id: 'con-alt1', type: 'alt', side: 'con',
        text: 'Erneuerbare = Speicherproblem. Pumpspeicher begrenzt, P2G = 60% Verlust',
        children: [] },
      { id: 'con-alt2', type: 'alt', side: 'con',
        text: 'Windenergie schwächt Windzirkulation → lokale Dürren (Studien vorhanden)',
        children: [] },
    ]
  };

  // ── Layout ──────────────────────────────────────
  // Alts are positioned at the SAME y-level as their parent, fanned sideways.
  // Main args alternate left/right and advance downward.
  let POS = {}, EDGES = [];

  function layout() {
    POS = {}; EDGES = [];
    const W = window.innerWidth;
    const CX = W / 2;
    const PRO_X = W * 0.22;
    const CON_X = W * 0.78;
    const STEP_Y = 130;
    let curY = 55;

    function placeNode(node, parentId) {
      if (node.type === 'topic') {
        POS[node.id] = { x: CX, y: curY };
        if (parentId) EDGES.push({ from: parentId, to: node.id, alt: false, edgeEmoji: null });
        curY += 85;
      } else if (node.type === 'status') {
        curY += 15;
        POS[node.id] = { x: CX, y: curY };
        EDGES.push({ from: parentId, to: node.id, alt: false, edgeEmoji: null });
        curY += 55;
        return;
      } else if (node.type === 'arg') {
        const x = node.side === 'pro' ? PRO_X : CON_X;
        POS[node.id] = { x, y: curY };
        if (parentId) EDGES.push({ from: parentId, to: node.id, alt: false, edgeEmoji: node.edgeEmoji || null });
        curY += STEP_Y;
      } else if (node.type === 'alt') {
        return; // placed after main children
      }

      const mainKids = (node.children || []).filter(c => c.type !== 'alt');
      const altKids  = (node.children || []).filter(c => c.type === 'alt');

      mainKids.forEach(c => placeNode(c, node.id));

      // Alts: fan out from parent's position, same y but pushed outward
      const pPos = POS[node.id];
      if (pPos && altKids.length > 0) {
        altKids.forEach((alt, ai) => {
          // Push alts toward the SAME side as the alt's own side
          const dir = alt.side === 'pro' ? -1 : 1;
          const spread = 155 + ai * 55;
          const ax = pPos.x + dir * spread;
          // Stagger vertically: each alt slightly lower than previous
          const ay = pPos.y + 30 + ai * 55;
          POS[alt.id] = { x: Math.max(80, Math.min(W - 80, ax)), y: ay };
          EDGES.push({ from: node.id, to: alt.id, alt: true, edgeEmoji: null });
        });
      }
    }

    placeNode(TREE, null);
    return curY + 60;
  }

  // ── Render ──────────────────────────────────────
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function makeNode(node) {
    const el = document.createElement('div');
    if (node.type === 'topic') {
      el.className = 'mm-node topic';
      el.innerHTML = `<div>${esc(node.text)}</div><small>${esc(node.sub||'')}</small>`;
    } else if (node.type === 'status') {
      el.className = 'mm-node status';
      el.innerHTML = esc(node.text);
    } else if (node.type === 'arg') {
      el.className = `mm-node arg ${node.side}`;
      el.innerHTML = `<div class="arg-title">${esc(node.title)}</div>`
        + (node.body ? `<div class="arg-body">${esc(node.body)}</div>` : '');
    } else if (node.type === 'alt') {
      el.className = `mm-node alt ${node.side||''}`;
      el.innerHTML = `<div>${esc(node.text)}</div><div class="alt-label">↳ nicht weiter verfolgt</div>`;
    }
    el.dataset.id = node.id;
    return el;
  }

  function renderAll() {
    const ct = document.getElementById('mindmap');
    ct.querySelectorAll('.mm-node,.edge-emoji').forEach(n => n.remove());
    const totalH = layout();
    ct.style.minHeight = totalH + 'px';

    (function addAll(node) {
      const el = makeNode(node);
      const p = POS[node.id];
      if (p) { el.style.left = p.x+'px'; el.style.top = p.y+'px'; }
      ct.appendChild(el);
      (node.children||[]).forEach(addAll);
    })(TREE);

    drawEdges(totalH, ct);
  }

  function drawEdges(totalH, ct) {
    const svg = document.getElementById('mm-svg');
    svg.innerHTML = '';
    svg.setAttribute('width', window.innerWidth);
    svg.setAttribute('height', totalH);
    const cR = ct.getBoundingClientRect();

    ct.querySelectorAll('.edge-emoji').forEach(e => e.remove());

    EDGES.forEach(e => {
      const fEl = ct.querySelector(`[data-id="${e.from}"]`);
      const tEl = ct.querySelector(`[data-id="${e.to}"]`);
      if (!fEl || !tEl) return;

      const fR = fEl.getBoundingClientRect();
      const tR = tEl.getBoundingClientRect();
      const fx = fR.left - cR.left + fR.width/2;
      const fy = fR.bottom - cR.top;
      const tx = tR.left - cR.left + tR.width/2;
      const ty = tR.top - cR.top;

      const isA = e.alt;
      const col = isA ? '#ccc' : '#888';
      const w   = isA ? 1 : 2;
      const op  = isA ? 0.3 : 0.45;
      const dy  = Math.abs(ty - fy) * 0.4;

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M${fx},${fy} C${fx},${fy+dy} ${tx},${ty-dy} ${tx},${ty}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke', col);
      path.setAttribute('stroke-width', w);
      path.setAttribute('stroke-opacity', op);
      if (isA) path.setAttribute('stroke-dasharray','4,3');
      svg.appendChild(path);

      if (e.edgeEmoji && !isA) {
        const em = document.createElement('div');
        em.className = 'edge-emoji';
        em.style.left = (fx+tx)/2 + 'px';
        em.style.top  = (fy+ty)/2 + 'px';
        em.textContent = e.edgeEmoji;
        ct.appendChild(em);
      }
    });
  }

  renderAll();
  window.addEventListener('resize', renderAll);
</script>
</body>
</html>
