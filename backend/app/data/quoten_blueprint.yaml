stage_4:
  status: "TODO: post-dev"
  label: "Meta-Einordnung"
  description: >
    Argumentgruppen als zu klärende Unterpunkte zusammenfassen.
    Argumente können als Quelle, Grundannahme, These etc. klassifiziert werden.
    Entspricht konzeptuell Stufe 3.2.
  planned_additions:
    - "ArgumentGroup: 'Definitionsstreit' (A3, A4, A4a, A4b, A4c)"
    - "Klassifizierung: B1 als normative These, R1_alt1 als Faktenquelle"
    - "Hierarchische Unterpunkte: Definitionsstreit als eigene Sub-Diskussion"

# ══════════════════════════════════════════════════════════════════════
# STUFE 5 — Diskussionsnetz  [GEPLANT — separate Spezifikation nötig]
# Konkrete Diskussion in allgemeines Argumentationsnetz einordnen.
# ══════════════════════════════════════════════════════════════════════

stage_5:
  status: "PLANNED - needs separate specification"
  label: "Diskussionsnetz / Meta-Diskussion"
  description: >
    Die konkrete Diskussion wird in ein allgemeines Argumentationsnetz eingeordnet.
    Bereits durchgeführte Diskussionen werden zusammengeführt.
  open_questions:
    - >
      Auswählbare Versionen pro Argument: Steelman-Version / neutrale Version /
      radikale Version / häufigste Version / erste Version?
    - >
      Meta-Streit: Kann es Uneinigkeit über die korrekte abstrakte Zuordnung geben?
    - >
      AbstractArgument-Modell: Wie referenziert ein abstraktes Argument konkrete
      Instances aus verschiedenen Diskussionen?
    - >
      Cross-Topic-Links: Wie werden Argumente aus verschiedenen Topics verknüpft?
  required_new_models:
    - "AbstractArgument (topic-übergreifend)"
    - "ConcreteToAbstractLink (concrete_argument_id → abstract_argument_id)"
    - "DiscussionVersion (steelman / neutral / radical / most_common / first)"

